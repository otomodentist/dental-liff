<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>集中度ダッシュボード</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #5de8b0;
    --accent2: #4da6ff;
    --accent3: #ff6b8a;
    --text: #e8eaf2;
    --text-muted: #5a6080;
    --text-dim: #8890b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .greeting { font-size: 13px; color: var(--text-dim); }
  .username { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

  .title-block {
    margin: 20px 20px 0;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .title-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .title-main {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
  }

  /* ローディング */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 科目タブ */
  .tabs-wrapper {
    padding: 20px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* サマリーカード */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 20px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.accent1::before { background: var(--accent); }
  .summary-card.accent2::before { background: var(--accent2); }
  .summary-card.accent3::before { background: var(--accent3); }
  .summary-card.accent4::before { background: #ffd666; }

  .summary-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .summary-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .summary-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 3px;
  }

  /* セクション */
  .section {
    padding: 0 20px 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* チャート */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-card-title {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .chart-card-title span {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    display: block;
  }

  .chart-wrap {
    position: relative;
    height: 160px;
  }

  /* セッション一覧 */
  .session-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .session-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .session-item.expanded {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .session-item:active { opacity: 0.8; }

  .session-info { flex: 1; }

  .session-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .session-meta {
    font-size: 12px;
    color: var(--text-dim);
  }

  .session-score {
    text-align: right;
  }

  .score-badge {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .score-badge.high { color: var(--accent); }
  .score-badge.mid { color: #ffd666; }
  .score-badge.low { color: var(--accent3); }

  .score-label {
    font-size: 10px;
    color: var(--text-muted);
  }

  /* セッション詳細チャート */
  .session-detail {
    display: none;
    padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .session-detail.open { display: block; }

  .session-detail-wrap {
    position: relative;
    height: 120px;
  }

  /* エラー */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .error-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* フッター余白 */
  .footer-pad { height: 40px; }

  /* アカウント管理セクション */
  .account-section {
    padding: 0 20px 20px;
    margin-top: 8px;
  }
  .account-section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .cancel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: rgba(255,107,138,0.12);
    border: 1px solid rgba(255,107,138,0.4);
    border-radius: 14px;
    color: var(--accent3);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cancel-btn:active { opacity: 0.8; }

  /* 解約確認モーダル */
  .cancel-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
  .cancel-modal.open { display: flex; }
  .cancel-modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; }
  .cancel-modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--accent3); }
  .cancel-modal-body { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 24px; }
  .cancel-modal-body ul { padding-left: 20px; margin-top: 8px; }
  .cancel-modal-btns { display: flex; gap: 10px; }
  .cancel-modal-btns .btn-keep { flex: 1; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .cancel-modal-btns .btn-confirm-cancel { flex: 1; padding: 14px; background: var(--accent3); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* 今日の学習セクション */
  .today-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .today-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  .today-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .today-item.done { opacity: 0.45; }
  .today-item-info { flex: 1; }
  .today-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .today-item-meta { font-size: 11px; color: var(--text-muted); }
  .today-complete-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; }
  .today-complete-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: default; }

  /* 試験対策セクション */
  .exam-section { padding: 0 20px 20px; }
  .exam-section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }
  .exam-btn { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text); width: 100%; margin-bottom: 8px; }
  .exam-btn.primary { background: rgba(93,232,176,0.12); border-color: rgba(93,232,176,0.4); color: var(--accent); }
  .exam-btn.disabled { opacity: 0.4; cursor: default; }
  .exam-btn-badge { font-size: 11px; background: var(--border); border-radius: 6px; padding: 2px 8px; color: var(--text-muted); }

  /* 進捗ブロック */
  .progress-section { padding: 0 20px 16px; }
  .progress-subj { margin-bottom: 16px; }
  .progress-subj-name { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .progress-count { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .progress-count span { font-size: 12px; font-weight: 400; color: var(--text-dim); margin-left: 4px; }
  .blocks-row { display: flex; gap: 3px; }
  .block { flex: 1; height: 24px; border-radius: 3px; min-width: 0; }
  .block.reviewed { background: var(--border); }
  .block.pending { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .block.unattended { background: var(--surface); border: 1px solid var(--border); }

  /* 学習計画ビュー */
  .plan-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .plan-back-btn { background: none; border: none; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; }
  .plan-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .plan-exam-card { margin: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .plan-exam-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .plan-exam-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .plan-exam-date { font-size: 12px; color: var(--accent3); margin-top: 2px; }
  .plan-generate-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 12px; font-weight: 700; padding: 6px 14px; cursor: pointer; }
  .plan-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .plan-item:last-child { border-bottom: none; }
  .plan-item-date { font-size: 11px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .plan-item-info { flex: 1; }
  .plan-item-name { font-size: 13px; font-weight: 600; }
  .plan-item-type { font-size: 11px; color: var(--text-muted); }
  .plan-item.done .plan-item-name { text-decoration: line-through; opacity: 0.5; }
  .plan-item-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .plan-item-btn.done { background: var(--surface2); color: var(--text-muted); cursor: default; }
  .plan-alert { margin: 0 20px 12px; padding: 12px 16px; background: rgba(255,107,138,0.12); border: 1px solid rgba(255,107,138,0.3); border-radius: 12px; font-size: 13px; color: var(--accent3); }
  .theory-card { margin: 0 20px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .theory-title { font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; }
  .theory-step { font-size: 12px; color: var(--text-dim); line-height: 1.6; padding-left: 10px; border-left: 2px solid var(--accent2); margin-bottom: 6px; }

  /* 直近授業ボタン */
  .latest-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 0 20px 16px;
    cursor: pointer;
    width: calc(100% - 40px);
    text-align: left;
    transition: border-color 0.2s;
  }
  .latest-btn:active { opacity: 0.8; }
  .latest-btn-icon { font-size: 22px; }
  .latest-btn-text { flex: 1; }
  .latest-btn-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .latest-btn-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  /* 直近授業ポップアップ */
  .latest-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
  .latest-popup.open { display: flex; }
  .latest-popup-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; }
  .latest-popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }
</style>
</head>
<body>

<div id="cancelModal" class="cancel-modal">
  <div class="cancel-modal-sheet">
    <div class="cancel-modal-title">サブスクリプションを解約しますか？</div>
    <div class="cancel-modal-body">
      解約すると：
      <ul>
        <li>すぐにサービスが利用できなくなります</li>
        <li>授業データは保持されます</li>
        <li>再度契約する場合は再度決済が必要です</li>
      </ul>
      <br>本当に解約しますか？
    </div>
    <div class="cancel-modal-btns">
      <button class="btn-keep" onclick="hideCancelModal()">キャンセル</button>
      <button class="btn-confirm-cancel" onclick="confirmCancel()">解約する</button>
    </div>
  </div>
</div>

<div id="latestPopup" class="latest-popup">
  <div class="latest-popup-sheet">
    <button class="latest-popup-close" onclick="closeLatestPopup()">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px">直近終了した授業</div>
    <div id="latestPopupContent"></div>
  </div>
</div>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-dim)">読み込み中...</div>
  </div>
</div>

<script>
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec';
const LIFF_ID = '2009739219-dSnPUVFj';

let userId = null;
let profileData = null;
let dashboardData = null;
let activeSubjectIndex = 0;
const chartInstances = {};

// 学習計画
let currentView = 'dashboard'; // 'dashboard' | 'studyPlan'
let todayStudyItems = [];
let studyPlanData = null;
let examScheduleData = [];
let progressBlocksData = {};

// ===== 初期化 =====
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    userId = profile.userId;
    profileData = profile;

    dashboardData = await fetchDashboard(userId);

    // 今日の学習項目を取得（計画がなければ空配列）
    try {
      const r = await fetch(`${GAS_URL}?action=getTodayStudyItems&userId=${encodeURIComponent(userId)}`);
      const d = await r.json();
      todayStudyItems = d.todayItems || [];
    } catch (e) { todayStudyItems = []; }

    renderApp();
  } catch (err) {
    showError(err.message);
  }
}

async function fetchDashboard(uid) {
  const res = await fetch(`${GAS_URL}?action=getDashboard&userId=${encodeURIComponent(uid)}`);
  return await res.json();
}

// ===== レンダリング =====
function renderApp() {
  if (currentView === 'studyPlan') { renderStudyPlanView(); return; }
  const app = document.getElementById('app');
  const subjects = dashboardData.subjects || [];

  if (subjects.length === 0) {
    app.innerHTML = `
      <div class="header">
        <div class="header-top">
          <div class="avatar"><img src="${profileData.pictureUrl}" onerror="this.style.display='none'" /></div>
          <div>
            <div class="greeting">こんにちは</div>
            <div class="username">${profileData.displayName}</div>
          </div>
        </div>
      </div>
      <div class="error-state">
        <div class="icon">📚</div>
        <div>まだ回答データがありません</div>
        <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">授業で問題に回答すると<br>ここに集中度が表示されます</div>
      </div>`;
    return;
  }

  const subject = subjects[activeSubjectIndex];
  const allSessions = subject.sessions;
  const avgScore = subject.averageScore;

  const latestSession = allSessions[allSessions.length - 1];

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="avatar"><img src="${profileData.pictureUrl}" onerror="this.style.display='none'" /></div>
        <div>
          <div class="greeting">こんにちは</div>
          <div class="username">${profileData.displayName}</div>
        </div>
      </div>
      <div class="title-block">
        <div class="title-label">Concentration Monitor</div>
        <div class="title-main">集中度<br>ダッシュボード</div>
      </div>
    </div>

    <div class="tabs-wrapper">
      <div class="tabs">
        ${subjects.map((s, i) => `
          <button class="tab ${i === activeSubjectIndex ? 'active' : ''}" onclick="switchSubject(${i})">${s.name}</button>
        `).join('')}
      </div>
    </div>

    ${renderTodaySection()}

    <button class="latest-btn" onclick="checkLatestSession()">
      <div class="latest-btn-icon">🔔</div>
      <div class="latest-btn-text">
        <div class="latest-btn-label">LATEST CLASS</div>
        <div class="latest-btn-title">直近終了した授業を確認する</div>
      </div>
      <div style="font-size:13px;color:var(--text-muted)">▶</div>
    </button>

    <div class="summary-grid">
      <div class="summary-card accent1">
        <div class="summary-label">総合スコア</div>
        <div class="summary-value">${avgScore}<span class="summary-unit">点</span></div>
      </div>
      <div class="summary-card accent2">
        <div class="summary-label">回答数</div>
        <div class="summary-value">${subject.totalAnswers}<span class="summary-unit">問</span></div>
      </div>
      <div class="summary-card accent3">
        <div class="summary-label">授業回数</div>
        <div class="summary-value">${allSessions.length}<span class="summary-unit">回</span></div>
      </div>
      <div class="summary-card accent4">
        <div class="summary-label">最新スコア</div>
        <div class="summary-value">${latestSession ? latestSession.averageScore : '-'}<span class="summary-unit">点</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">最新授業の集中度推移</div>
      ${latestSession ? `
        <div class="chart-card">
          <div class="chart-card-title">
            <span>第${latestSession.sessionNumber}回授業</span>
            授業経過時間ごとの集中度
          </div>
          <div class="chart-wrap">
            <canvas id="latestChart"></canvas>
          </div>
        </div>
      ` : ''}
    </div>

    <div class="section">
      <div class="section-title">授業別スコア履歴</div>
      <div class="chart-card">
        <div class="chart-card-title">
          <span>${subject.name}</span>
          授業回ごとの平均集中度
        </div>
        <div class="chart-wrap">
          <canvas id="historyChart"></canvas>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">授業詳細</div>
      <div class="session-list" id="sessionList">
        ${allSessions.slice().reverse().map(s => `
          <div class="session-item" id="session-${s.sessionNumber}" onclick="toggleSession(${s.sessionNumber})">
            <div class="session-info">
              <div class="session-name">第${s.sessionNumber}回授業</div>
              <div class="session-meta">${s.timeline.length}問回答</div>
            </div>
            <div class="session-score">
              <div class="score-badge ${s.averageScore >= 70 ? 'high' : s.averageScore >= 40 ? 'mid' : 'low'}">${s.averageScore}</div>
              <div class="score-label">平均点</div>
            </div>
            <div class="session-detail" id="detail-${s.sessionNumber}">
              <div class="session-detail-wrap">
                <canvas id="sessionChart-${s.sessionNumber}"></canvas>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="exam-section">
      <div class="exam-section-title">Study Plan</div>
      <button class="exam-btn primary" onclick="openStudyPlanView()">
        定期試験対策
        <span style="font-size:13px">▶</span>
      </button>
      <button class="exam-btn disabled" disabled>
        CBT対策
        <span class="exam-btn-badge">開発中</span>
      </button>
      <button class="exam-btn disabled" disabled>
        国試対策
        <span class="exam-btn-badge">開発中</span>
      </button>
    </div>

    <div class="account-section">
      <div class="account-section-title">Account</div>
      <button class="cancel-btn" onclick="showCancelModal()">
        サブスクリプションを解約する
      </button>
    </div>

    <div class="footer-pad"></div>
  `;

  // チャート描画
  requestAnimationFrame(() => {
    if (latestSession) drawTimelineChart('latestChart', latestSession.timeline);
    drawHistoryChart('historyChart', allSessions);
  });
}

function switchSubject(index) {
  activeSubjectIndex = index;
  // 既存チャート破棄
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
  renderApp();
}

function toggleSession(sessionNumber) {
  const subject = dashboardData.subjects[activeSubjectIndex];
  const session = subject.sessions.find(s => s.sessionNumber === sessionNumber);
  const detailEl = document.getElementById(`detail-${sessionNumber}`);
  const itemEl = document.getElementById(`session-${sessionNumber}`);

  const isOpen = detailEl.classList.contains('open');

  if (isOpen) {
    detailEl.classList.remove('open');
    itemEl.classList.remove('expanded');
    if (chartInstances[`session-${sessionNumber}`]) {
      chartInstances[`session-${sessionNumber}`].destroy();
      delete chartInstances[`session-${sessionNumber}`];
    }
  } else {
    detailEl.classList.add('open');
    itemEl.classList.add('expanded');
    requestAnimationFrame(() => {
      drawTimelineChart(`sessionChart-${sessionNumber}`, session.timeline, `session-${sessionNumber}`);
    });
  }
}

// ===== チャート描画 =====
const CHART_DEFAULTS = {
  plugins: { legend: { display: false } },
  scales: {
    x: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 } },
    },
    y: {
      min: 0, max: 100,
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 }, stepSize: 25 },
    },
  },
  animation: { duration: 600, easing: 'easeOutCubic' },
  responsive: true,
  maintainAspectRatio: false,
};

function drawTimelineChart(canvasId, timeline, instanceKey) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const key = instanceKey || canvasId;
  if (chartInstances[key]) chartInstances[key].destroy();

  const labels = timeline.map(t => `${t.minutesElapsed}分`);
  const scores = timeline.map(t => t.concentrationScore);

  chartInstances[key] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: scores,
        borderColor: '#5de8b0',
        backgroundColor: 'rgba(93,232,176,0.08)',
        pointBackgroundColor: '#5de8b0',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        fill: true,
        tension: 0.4,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '経過時間', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '集中度', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

function drawHistoryChart(canvasId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const labels = sessions.map(s => `第${s.sessionNumber}回`);
  const scores = sessions.map(s => s.averageScore);

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s =>
          s >= 70 ? 'rgba(93,232,176,0.7)' :
          s >= 40 ? 'rgba(255,214,102,0.7)' :
                    'rgba(255,107,138,0.7)'
        ),
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '授業回', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '平均集中度', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

            <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">回答問題数</div>

function closeLatestPopup() {

}

// ===== 今日の学習セクション =====
function renderTodaySection() {
  if (todayStudyItems.length === 0) return '';
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  const items = todayStudyItems.map(item => `
    <div class="today-item ${item.status === 'done' ? 'done' : ''}" id="today-${item.planId}">
      <div class="today-item-info">
        <div class="today-item-name">${item.subject} 第${item.sessionNumber}回</div>
        <div class="today-item-meta">${typeLabel[item.type] || item.type}・${item.durationMin}分</div>
      </div>
      <button class="today-complete-btn" ${item.status === 'done' ? 'disabled' : ''}
        onclick="completeTodayItem('${item.planId}', this)">
        ${item.status === 'done' ? '完了済み' : '学習済み'}
      </button>
    </div>`).join('');
  return `<div class="today-section"><div class="today-label">Today's Study</div>${items}</div>`;
}

async function completeTodayItem(planId, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    const r = await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
    const d = await r.json();
    if (d.success) {
      const el = document.getElementById('today-' + planId);
      if (el) { el.classList.add('done'); btn.textContent = '完了済み'; }
      // planDataも更新
      const item = todayStudyItems.find(i => i.planId === planId);
      if (item) item.status = 'done';
    } else {
      btn.disabled = false; btn.textContent = '学習済み';
    }
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}

// ===== 学習計画ビュー =====
let studyPlanInitData = null; // { grade, semester, activeSubjects, exams, attendedBySubject, plan, progressBlocks }

async function openStudyPlanView() {
  currentView = 'studyPlan';
  studyPlanInitData = null;
  renderStudyPlanView();
  try {
    const res = await fetch(`${GAS_URL}?action=getStudyPlanInitData&userId=${encodeURIComponent(userId)}`);
    studyPlanInitData = await res.json();
    examScheduleData = studyPlanInitData.exams || [];
    studyPlanData    = studyPlanInitData.plan  || [];
    progressBlocksData = studyPlanInitData.progressBlocks || {};
  } catch (e) {
    studyPlanInitData = null;
  }
  renderStudyPlanView();
}

function closeStudyPlanView() {
  currentView = 'dashboard';
  renderApp();
}

function renderStudyPlanView() {
  const app = document.getElementById('app');

  // ローディング中
  if (!studyPlanInitData) {
    app.innerHTML = `
      <div class="plan-header">
        <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
        <div class="plan-title">定期試験対策</div>
      </div>
      <div class="loading" style="height:50vh"><div class="spinner"></div><div style="font-size:13px;color:var(--text-dim)">読み込み中...</div></div>`;
    return;
  }

  const { grade, semester, exams, attendedBySubject, plan, progressBlocks } = studyPlanInitData;
  const semLabel = semester === 'spring' ? '春学期' : '秋学期';
  const typeLabel = { 'review': '復習', 're-review': '再復習' };

  const planByExam = {};
  (plan || []).forEach(item => {
    if (!planByExam[item.examId]) planByExam[item.examId] = [];
    planByExam[item.examId].push(item);
  });

  // 試験科目カード
  const examCardsHTML = exams.length === 0
    ? '<div style="padding:24px 20px;text-align:center;color:var(--text-dim);font-size:13px">この学期の試験日程は管理者が設定します</div>'
    : exams.map(exam => {
        const attended = (attendedBySubject[exam.subjectName] || []);
        const attendedHTML = attended.length > 0
          ? attended.map(n => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">第${n}回</span>`).join(' ')
          : '<span style="font-size:12px;color:var(--text-muted)">まだ参加した授業がありません</span>';

        const entries = planByExam[exam.examId] || [];
        const hasPlan = entries.length > 0;
        const doneCount = entries.filter(e => e.status === 'done').length;

        // 1日超過アラート
        const dayMap = {};
        entries.filter(e => e.status === 'pending').forEach(e => {
          dayMap[e.date] = (dayMap[e.date] || 0) + e.durationMin;
        });
        const alertsHTML = Object.entries(dayMap)
          .filter(([, m]) => m > 240)
          .map(([d, m]) => `<div class="plan-alert">⚠️ ${d.slice(5)}：1日${Math.round(m/6)/10}時間が必要です。リプランを検討してください</div>`)
          .join('');

        const planItemsHTML = hasPlan
          ? entries.map(e => `
              <div class="plan-item ${e.status === 'done' ? 'done' : ''}" id="plan-${e.planId}">
                <div class="plan-item-date">${e.date.slice(5)}</div>
                <div class="plan-item-info">
                  <div class="plan-item-name">第${e.sessionNumber}回授業</div>
                  <div class="plan-item-type">${typeLabel[e.type] || e.type}・${e.durationMin}分</div>
                </div>
                <button class="plan-item-btn ${e.status === 'done' ? 'done' : ''}"
                  ${e.status === 'done' ? 'disabled' : ''}
                  onclick="completePlanItem('${e.planId}', this)">
                  ${e.status === 'done' ? '完了' : '学習済み'}
                </button>
              </div>`).join('')
          : `<div style="padding:12px 16px;font-size:13px;color:var(--text-dim)">計画を生成してください</div>`;

        const replanBtn = hasPlan
          ? `<button onclick="replanStudyPlan()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px;padding:5px 10px;cursor:pointer;margin-right:6px">リプラン</button>`
          : '';

        const progressBlock = progressBlocks[exam.subjectName];
        const progressHTML = progressBlock
          ? `<div style="padding:10px 16px;border-top:1px solid var(--border);background:var(--bg)">
               <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">復習進捗：残り${progressBlock.remaining}コマ / ${progressBlock.attended}コマ参加済み</div>
               <div class="blocks-row">
                 ${Array.from({length: progressBlock.total}, (_, i) => {
                   if (i < progressBlock.reviewed) return '<div class="block reviewed"></div>';
                   if (i < progressBlock.attended) return '<div class="block pending"></div>';
                   return '<div class="block unattended"></div>';
                 }).join('')}
               </div>
             </div>`
          : '';

        return `
          ${alertsHTML}
          <div class="plan-exam-card">
            <div class="plan-exam-header">
              <div style="flex:1;min-width:0">
                <div class="plan-exam-name">${exam.subjectName}</div>
                <div class="plan-exam-date">試験日: ${exam.examDate}　復習: ${exam.reviewMinutes}分/回</div>
                <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${attendedHTML}</div>
                ${hasPlan ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">${doneCount}/${entries.length}コマ完了</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;margin-left:10px">
                ${replanBtn}
                <button class="plan-generate-btn" onclick="generatePlan('${exam.examId}', event)">
                  ${hasPlan ? '再生成' : '計画生成'}
                </button>
              </div>
            </div>
            ${progressHTML}
            ${planItemsHTML}
          </div>`;
      }).join('');

  app.innerHTML = `
    <div class="plan-header">
      <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
      <div class="plan-title">定期試験対策</div>
    </div>
    <div style="padding:10px 20px 4px;font-size:12px;color:var(--text-muted)">
      表示中：${grade}年生 ${semLabel}の科目（${exams.length}件）
    </div>
    <div class="theory-card">
      <div class="theory-title">反復学習による効率化の根拠</div>
      <div class="theory-step">ステップ1（授業）：集中度スコアで授業の質を向上</div>
      <div class="theory-step">ステップ2（復習）：復習時間を約1/2に短縮しつつ定着の質を向上</div>
      <div class="theory-step">ステップ3（再復習）：復習時間を約1/3に短縮しながらさらに定着を強化</div>
    </div>
    ${examCardsHTML}
    <div class="footer-pad"></div>
  `;
}

async function generatePlan(examId) {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const r = await fetch(`${GAS_URL}?action=generateStudyPlan&userId=${encodeURIComponent(userId)}&examId=${encodeURIComponent(examId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      studyPlanData = (await (await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`)).json()).plan || [];
      renderStudyPlanView();
    } else {
      btn.disabled = false; btn.textContent = '計画生成';
      alert('エラー: ' + (d.error || '不明'));
    }
  } catch (e) { btn.disabled = false; btn.textContent = '計画生成'; }
}

async function completePlanItem(planId, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    const r = await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
    const d = await r.json();
    if (d.success) {
      const el = document.getElementById('plan-' + planId);
      if (el) { el.classList.add('done'); btn.classList.add('done'); btn.textContent = '完了'; }
      const item = studyPlanData.find(i => i.planId === planId);
      if (item) item.status = 'done';
    } else { btn.disabled = false; btn.textContent = '学習済み'; }
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}

async function replanStudyPlan() {
  if (!confirm('未完了の計画を今日から再スケジュールしますか？')) return;
  try {
    const r = await fetch(`${GAS_URL}?action=replanStudy&userId=${encodeURIComponent(userId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      studyPlanData = (await (await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`)).json()).plan || [];
      if (d.alerts && d.alerts.length > 0) {
        alert('⚠️ リプラン完了。一部の日で4時間を超える学習が必要です。計画を確認してください。');
      }
      renderStudyPlanView();
    }
  } catch (e) { alert('通信エラーが発生しました'); }
}

function showCancelModal() {
  document.getElementById('cancelModal').classList.add('open');
}
function hideCancelModal() {
  document.getElementById('cancelModal').classList.remove('open');
}
async function confirmCancel() {
  const btn = document.querySelector('.btn-confirm-cancel');
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const res = await fetch(`${GAS_URL}?action=cancelSubscription&userId=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data.success) {
      hideCancelModal();
      document.getElementById('app').innerHTML = `
        <div class="error-state" style="padding-top:80px">
          <div class="icon">✅</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px">解約完了</div>
          <div style="font-size:13px;color:var(--text-muted)">サブスクリプションの解約が完了しました。<br>ご利用ありがとうございました。</div>
        </div>`;
    } else {
      btn.disabled = false;
      btn.textContent = '解約する';
      alert('エラーが発生しました: ' + (data.error || '不明なエラー'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '解約する';
    alert('通信エラーが発生しました');
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state" style="padding-top:80px">
      <div class="icon">⚠️</div>
      <div>読み込みに失敗しました</div>
      <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">${msg}</div>
    </div>`;
}
