<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>集中度ダッシュボード</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #5de8b0;
    --accent2: #4da6ff;
    --accent3: #ff6b8a;
    --text: #e8eaf2;
    --text-muted: #5a6080;
    --text-dim: #8890b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .greeting { font-size: 13px; color: var(--text-dim); }
  .username { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

  .title-block {
    margin: 20px 20px 0;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .title-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .title-main {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
  }

  /* ローディング */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 科目タブ */
  .tabs-wrapper {
    padding: 20px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* サマリーカード */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 20px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.accent1::before { background: var(--accent); }
  .summary-card.accent2::before { background: var(--accent2); }
  .summary-card.accent3::before { background: var(--accent3); }
  .summary-card.accent4::before { background: #ffd666; }

  .summary-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .summary-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .summary-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 3px;
  }

  /* セクション */
  .section {
    padding: 0 20px 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* チャート */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-card-title {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .chart-card-title span {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    display: block;
  }

  .chart-wrap {
    position: relative;
    height: 160px;
  }

  /* セッション一覧 */
  .session-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .session-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .session-item.expanded {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .session-item:active { opacity: 0.8; }

  .session-info { flex: 1; }

  .session-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .session-meta {
    font-size: 12px;
    color: var(--text-dim);
  }

  .session-score {
    text-align: right;
  }

  .score-badge {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .score-badge.high { color: var(--accent); }
  .score-badge.mid { color: #ffd666; }
  .score-badge.low { color: var(--accent3); }

  .score-label {
    font-size: 10px;
    color: var(--text-muted);
  }

  /* セッション詳細チャート */
  .session-detail {
    display: none;
    padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .session-detail.open { display: block; }

  .session-detail-wrap {
    position: relative;
    height: 120px;
  }

  /* エラー */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .error-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* フッター余白 */
  .footer-pad { height: 40px; }

  /* アカウント管理セクション */
  .account-section {
    padding: 0 20px 20px;
    margin-top: 8px;
  }
  .account-section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .cancel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: rgba(255,107,138,0.12);
    border: 1px solid rgba(255,107,138,0.4);
    border-radius: 14px;
    color: var(--accent3);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cancel-btn:active { opacity: 0.8; }

  /* 解約確認モーダル */
  .cancel-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
  .cancel-modal.open { display: flex; }
  .cancel-modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; }
  .cancel-modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--accent3); }
  .cancel-modal-body { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-bottom: 24px; }
  .cancel-modal-body ul { padding-left: 20px; margin-top: 8px; }
  .cancel-modal-btns { display: flex; gap: 10px; }
  .cancel-modal-btns .btn-keep { flex: 1; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .cancel-modal-btns .btn-confirm-cancel { flex: 1; padding: 14px; background: var(--accent3); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* 今日の学習セクション */
  .today-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .today-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  .today-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .today-item.done { opacity: 0.45; }
  .today-item-info { flex: 1; }
  .today-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .today-item-meta { font-size: 11px; color: var(--text-muted); }
  .today-complete-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; }
  .today-complete-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: default; }

  /* 試験対策セクション */
  .exam-section { padding: 0 20px 20px; }
  .exam-section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }
  .exam-btn { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text); width: 100%; margin-bottom: 8px; }
  .exam-btn.primary { background: rgba(93,232,176,0.12); border-color: rgba(93,232,176,0.4); color: var(--accent); }
  .exam-btn.disabled { opacity: 0.4; cursor: default; }
  .exam-btn-badge { font-size: 11px; background: var(--border); border-radius: 6px; padding: 2px 8px; color: var(--text-muted); }


  /* 学習計画ビュー */
  .plan-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .plan-back-btn { background: none; border: none; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; }
  .plan-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
  .plan-exam-card { margin: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .plan-exam-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .plan-exam-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .plan-exam-date { font-size: 12px; color: var(--accent3); margin-top: 2px; }
  .plan-generate-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 12px; font-weight: 700; padding: 6px 14px; cursor: pointer; }
  .plan-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .plan-item:last-child { border-bottom: none; }
  .plan-item-date { font-size: 11px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .plan-item-info { flex: 1; }
  .plan-item-name { font-size: 13px; font-weight: 600; }
  .plan-item-type { font-size: 11px; color: var(--text-muted); }
  .plan-item.done .plan-item-name { text-decoration: line-through; opacity: 0.5; }
  .plan-item-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .plan-item-btn.done { background: var(--surface2); color: var(--text-muted); cursor: default; }
  .plan-alert { margin: 0 20px 12px; padding: 12px 16px; background: rgba(255,107,138,0.12); border: 1px solid rgba(255,107,138,0.3); border-radius: 12px; font-size: 13px; color: var(--accent3); }

  /* 直近授業ボタン */
  .latest-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 0 20px 16px;
    cursor: pointer;
    width: calc(100% - 40px);
    text-align: left;
    transition: border-color 0.2s;
  }
  .latest-btn:active { opacity: 0.8; }
  .latest-btn-icon { font-size: 22px; }
  .latest-btn-text { flex: 1; }
  .latest-btn-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .latest-btn-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

  /* 授業中ランキング */
  .live-card { margin: 0 20px 16px; background: var(--surface); border: 1.5px solid var(--accent); border-radius: 16px; overflow: hidden; }
  .live-card-header { background: var(--accent); padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
  .live-badge { background: #000; color: var(--accent); font-family: 'Syne',sans-serif; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }
  .live-question { font-size: 13px; font-weight: 600; color: #000; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .rank-row:last-child { border-bottom: none; }
  .rank-row.me { background: rgba(197,255,0,0.06); }
  .rank-num { font-family: 'Syne',sans-serif; font-weight: 800; font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
  .rank-num.gold { color: #ffd700; }
  .rank-num.silver { color: #b0b8c1; }
  .rank-num.bronze { color: #cd7f32; }
  .rank-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-sub { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .rank-score { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 800; flex-shrink: 0; }
  .rank-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* 直近授業ポップアップ */
  .latest-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; }
  .latest-popup.open { display: flex; }
  .latest-popup-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; }
  .latest-popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }

  /* ユーザー名エリア & ニックネーム編集 */
  .username-row { display: flex; align-items: center; gap: 6px; }
  .username { font-size: 16px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .edit-nick-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 0; line-height: 1; }
  .edit-nick-btn:active { opacity: 0.6; }

  /* ニックネームモーダル */
  .nickname-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
  .nickname-modal.open { display: flex; }
  .nickname-modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; }
  .nickname-modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .nickname-warning { font-size: 12px; color: var(--accent3); background: rgba(255,107,138,0.1); border: 1px solid rgba(255,107,138,0.25); border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; line-height: 1.5; }
  .nickname-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; font-family: inherit; margin-bottom: 14px; outline: none; }
  .nickname-input:focus { border-color: var(--accent); }
  .nickname-save-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; color: #000; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; margin-bottom: 10px; }
  .nickname-skip-btn { width: 100%; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>

<div id="nicknameModal" class="nickname-modal">
  <div class="nickname-modal-card">
    <div class="nickname-modal-title">ニックネームを設定</div>
    <div class="nickname-warning">⚠️ 他の受講者が不快に感じるような表現は使用しないでください</div>
    <input id="nicknameInput" class="nickname-input" type="text" maxlength="20" placeholder="例: タロ、ヒロシ" />
    <button class="nickname-save-btn" onclick="saveNickname()">保存する</button>
    <button class="nickname-skip-btn" onclick="closeNicknameModal()">あとで設定する</button>
  </div>
</div>

<div id="cancelModal" class="cancel-modal">
  <div class="cancel-modal-sheet">
    <div class="cancel-modal-title">サブスクリプションを解約しますか？</div>
    <div class="cancel-modal-body">
      解約すると：
      <ul>
        <li>すぐにサービスが利用できなくなります</li>
        <li>授業データは保持されます</li>
        <li>再度契約する場合は再度決済が必要です</li>
      </ul>
      <br>本当に解約しますか？
    </div>
    <div class="cancel-modal-btns">
      <button class="btn-keep" onclick="hideCancelModal()">キャンセル</button>
      <button class="btn-confirm-cancel" onclick="confirmCancel()">解約する</button>
    </div>
  </div>
</div>

<div id="latestPopup" class="latest-popup">
  <div class="latest-popup-sheet">
    <button class="latest-popup-close" onclick="closeLatestPopup()">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px">直近終了した授業</div>
    <div id="latestPopupContent"></div>
  </div>
</div>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-dim)">読み込み中...</div>
  </div>
</div>

<script>
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec';
const LIFF_ID = '2009739219-dSnPUVFj';

let userId = null;
let profileData = null;
let dashboardData = null;
let activeSubjectIndex = 0;
const chartInstances = {};

// 学習計画
let currentView = 'dashboard'; // 'dashboard' | 'studyPlan'
let todayStudyItems = [];
let tomorrowStudyItems = [];
let selectedExamId = null;
let studyPlanData = null;

// ランキング
let activeSessionState = null;   // getActiveSession() の結果
let questionRankingData = null;  // getQuestionRanking() の結果
let rankingPollTimer = null;

// ニックネーム
let myNickname = '';

// ===== 初期化 =====
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    userId = profile.userId;
    profileData = profile;

    [dashboardData] = await Promise.all([
      fetchDashboard(userId),
      refreshActiveSession(),
      fetchNickname(userId),
    ]);

    // 今日の学習項目を取得（計画がなければ空配列）
    try {
      const r = await fetch(`${GAS_URL}?action=getTodayStudyItems&userId=${encodeURIComponent(userId)}`);
      const d = await r.json();
      todayStudyItems    = d.todayItems    || [];
      tomorrowStudyItems = d.tomorrowItems || [];
    } catch (e) { todayStudyItems = []; tomorrowStudyItems = []; }

    renderApp();
    startRankingPoll();
    if (!myNickname) openNicknameModal();
  } catch (err) {
    showError(err.message);
  }
}

async function fetchNickname(uid) {
  try {
    const r = await fetch(`${GAS_URL}?action=getNickname&userId=${encodeURIComponent(uid)}`);
    const d = await r.json();
    myNickname = d.nickname || '';
  } catch (e) { myNickname = ''; }
}

function openNicknameModal() {
  const modal = document.getElementById('nicknameModal');
  const input = document.getElementById('nicknameInput');
  if (input) input.value = myNickname || '';
  modal.classList.add('open');
}

function closeNicknameModal() {
  document.getElementById('nicknameModal').classList.remove('open');
}

async function saveNickname() {
  const input = document.getElementById('nicknameInput');
  const val = (input.value || '').trim();
  if (!val) { input.focus(); return; }
  try {
    await fetch(`${GAS_URL}?action=setNickname&userId=${encodeURIComponent(userId)}&nickname=${encodeURIComponent(val)}`);
    myNickname = val;
    closeNicknameModal();
    renderApp();
  } catch (e) { alert('保存に失敗しました。もう一度お試しください。'); }
}

async function refreshActiveSession() {
  try {
    const r = await fetch(`${GAS_URL}?action=getActiveSession`);
    activeSessionState = await r.json();
  } catch (e) { activeSessionState = { isActive: false }; }
}

function startRankingPoll() {
  if (rankingPollTimer) clearInterval(rankingPollTimer);
  rankingPollTimer = setInterval(async () => {
    const prevQId = activeSessionState?.session?.currentQuestionId;
    await refreshActiveSession();
    const curQId = activeSessionState?.session?.currentQuestionId;
    if (curQId) {
      try {
        const r = await fetch(`${GAS_URL}?action=getQuestionRanking&questionId=${encodeURIComponent(curQId)}`);
        questionRankingData = await r.json();
      } catch (e) {}
    } else {
      questionRankingData = null;
    }
    // 問題が切り替わったか授業状態が変わったときのみ再描画
    if (curQId !== prevQId || !activeSessionState?.isActive) renderApp();
    else updateRankingCard();
  }, 5000);
}

async function fetchDashboard(uid) {
  const res = await fetch(`${GAS_URL}?action=getDashboard&userId=${encodeURIComponent(uid)}`);
  return await res.json();
}

function rankNumClass(r) { return r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : ''; }

function buildRankRowHTML(item, highlightUserId) {
  const isMe = item.userId === highlightUserId;
  const numCls = rankNumClass(item.rank);
  const scoreColor = item.concentrationScore >= 70 ? 'var(--accent)' : item.concentrationScore >= 40 ? '#ffd666' : 'var(--accent3)';
  return `
    <div class="rank-row${isMe ? ' me' : ''}">
      <div class="rank-num ${numCls}">${item.rank}</div>
      <img class="rank-avatar" src="${item.pictureUrl}" onerror="this.style.display='none'" />
      <div class="rank-info">
        <div class="rank-name">${item.nickname || item.displayName}${isMe ? ' 👤' : ''}</div>
        <div class="rank-sub">${item.answerText ? item.answerText.slice(0, 40) + (item.answerText.length > 40 ? '…' : '') : ''}</div>
      </div>
      <div class="rank-score" style="color:${scoreColor}">${item.concentrationScore}</div>
    </div>`;
}

function buildSessionRankRowHTML(item, highlightUserId) {
  const isMe = item.userId === highlightUserId;
  const numCls = rankNumClass(item.rank);
  const scoreColor = item.sustainScore >= 70 ? 'var(--accent)' : item.sustainScore >= 40 ? '#ffd666' : 'var(--accent3)';
  return `
    <div class="rank-row${isMe ? ' me' : ''}">
      <div class="rank-num ${numCls}">${item.rank}</div>
      <img class="rank-avatar" src="${item.pictureUrl}" onerror="this.style.display='none'" />
      <div class="rank-info">
        <div class="rank-name">${item.nickname || item.displayName}${isMe ? ' 👤' : ''}</div>
        <div class="rank-sub">${item.answerCount}問回答</div>
      </div>
      <div class="rank-score" style="color:${scoreColor}">${item.sustainScore}</div>
    </div>`;
}

function buildLiveRankingCardHTML() {
  if (!activeSessionState?.isActive) return '';
  const sess = activeSessionState.session;
  if (!sess.currentQuestionId) {
    return `<div class="live-card">
      <div class="live-card-header">
        <span class="live-badge">NOW</span>
        <span class="live-question">${sess.subject} 第${sess.sessionNumber}回 授業中</span>
      </div>
      <div class="rank-empty">出題中の問題はありません</div>
    </div>`;
  }
  const rows = questionRankingData?.ranking || [];
  const rowsHTML = rows.length > 0
    ? rows.map(item => buildRankRowHTML(item, userId)).join('')
    : '<div class="rank-empty">まだ誰も回答していません</div>';
  return `<div class="live-card" id="liveRankCard">
    <div class="live-card-header">
      <span class="live-badge">LIVE</span>
      <span class="live-question">${sess.currentQuestionText || '問題出題中'}</span>
    </div>
    ${rowsHTML}
  </div>`;
}

function updateRankingCard() {
  const el = document.getElementById('liveRankCard');
  if (!el) return;
  const rows = questionRankingData?.ranking || [];
  const rowsHTML = rows.length > 0
    ? rows.map(item => buildRankRowHTML(item, userId)).join('')
    : '<div class="rank-empty">まだ誰も回答していません</div>';
  el.innerHTML = el.firstElementChild.outerHTML + rowsHTML;
}

function switchSubject(index) {
  activeSubjectIndex = index;
  // 既存チャート破棄
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
  renderApp();
}

function toggleSession(sessionNumber) {
  const subject = dashboardData.subjects[activeSubjectIndex];
  const session = subject.sessions.find(s => s.sessionNumber === sessionNumber);
  const detailEl = document.getElementById(`detail-${sessionNumber}`);
  const itemEl = document.getElementById(`session-${sessionNumber}`);

  const isOpen = detailEl.classList.contains('open');

  if (isOpen) {
    detailEl.classList.remove('open');
    itemEl.classList.remove('expanded');
    if (chartInstances[`session-${sessionNumber}`]) {
      chartInstances[`session-${sessionNumber}`].destroy();
      delete chartInstances[`session-${sessionNumber}`];
    }
  } else {
    detailEl.classList.add('open');
    itemEl.classList.add('expanded');
    requestAnimationFrame(() => {
      drawTimelineChart(`sessionChart-${sessionNumber}`, session.timeline, `session-${sessionNumber}`);
    });
  }
}

function addOneHour(t) {
  const [h, m] = t.split(':').map(Number);
  return `${String(h + 1).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function buildExamTimetableHTML(exams) {
  if (!exams || exams.length === 0) return '';
  const sortedDates = [...new Set(exams.map(e => e.examDate))].sort();
  const cellMap = {};
  exams.forEach(e => { cellMap[`${e.examDate}_${e.startTime || ''}`] = e; });
  const startTimes = [...new Set(exams.map(e => e.startTime || '').filter(Boolean))].sort();
  if (startTimes.length === 0) return '';
  const DAYS = ['日','月','火','水','木','金','土'];
  function fmtD(d) {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getMonth()+1}/${dt.getDate()}（${DAYS[dt.getDay()]}）`;
  }
  const STRONG = '2px solid var(--border)';
  const hBg = 'var(--surface2)';
  const dateHeaders = sortedDates.map(d =>
    `<th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;white-space:nowrap;font-weight:600;color:var(--text-dim)">${fmtD(d)}</th>`
  ).join('');
  const bodyRows = startTimes.map(st => {
    const cells = sortedDates.map(d => {
      const e = cellMap[`${d}_${st}`];
      if (!e) return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px"></td>`;
      return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px">
        <div style="font-size:10px;font-weight:600;line-height:1.4;color:var(--text)">${e.subjectName}</div>
      </td>`;
    }).join('');
    return `<tr>
      <td style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;font-weight:700;border-right:${STRONG};white-space:nowrap;color:var(--text-dim)">${st}〜${addOneHour(st)}</td>
      ${cells}
    </tr>`;
  }).join('');
  return `
    <div style="margin:0 20px 16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:6px">試験時間割</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;color:var(--text-muted);border-right:${STRONG};border-bottom:${STRONG};white-space:nowrap">時刻</th>
            ${dateHeaders}
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`;
}

function formatDuration(min) {
  if (min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `${h}時間` : `${h}時間${m}分`;
}

// ===== チャート描画 =====
const CHART_DEFAULTS = {
  plugins: { legend: { display: false } },
  scales: {
    x: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 } },
    },
    y: {
      min: 0, max: 100,
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 }, stepSize: 25 },
    },
  },
  animation: { duration: 600, easing: 'easeOutCubic' },
  responsive: true,
  maintainAspectRatio: false,
};

function drawTimelineChart(canvasId, timeline, instanceKey) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const key = instanceKey || canvasId;
  if (chartInstances[key]) chartInstances[key].destroy();

  const labels = ['0分', ...timeline.map(t => `${t.minutesElapsed}分`)];
  const scores = [null, ...timeline.map(t => t.concentrationScore)];

  chartInstances[key] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: scores,
        borderColor: '#5de8b0',
        backgroundColor: 'rgba(93,232,176,0.08)',
        pointBackgroundColor: '#5de8b0',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        fill: true,
        tension: 0.4,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '経過時間', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '集中度', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

function drawHistoryChart(canvasId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const labels = sessions.map(s => `第${s.sessionNumber}回`);
  const scores = sessions.map(s => s.sustainScore);

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s =>
          s >= 70 ? 'rgba(93,232,176,0.7)' :
          s >= 40 ? 'rgba(255,214,102,0.7)' :
                    'rgba(255,107,138,0.7)'
        ),
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '授業回', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '維持スコア', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

// ===== 今日・明日の学習セクション =====
function groupStudyItems(items) {
  const map = {};
  items.forEach(item => {
    const key = item.subject + '__' + item.type;
    if (!map[key]) map[key] = { subject: item.subject, type: item.type, sessions: [], totalMin: 0, planIds: [], allDone: true };
    map[key].sessions.push(item.sessionNumber);
    map[key].totalMin += item.durationMin;
    map[key].planIds.push(item.planId);
    if (item.status !== 'done') map[key].allDone = false;
  });
  return Object.values(map);
}

function renderDayRows(groups, withBtn) {
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  return groups.map(g => {
    const nums = g.sessions.sort((a, b) => a - b);
    const numStr = nums.length > 1 ? `第${nums[0]}〜${nums[nums.length - 1]}回` : `第${nums[0]}回`;
    const btn = withBtn
      ? `<button class="today-complete-btn${g.allDone ? ' done' : ''}" ${g.allDone ? 'disabled' : ''}
           onclick="completeTodayGroup(${JSON.stringify(g.planIds)}, this)">
           ${g.allDone ? '完了済み' : '学習済み'}
         </button>`
      : '';
    return `
      <div class="today-item${g.allDone ? ' done' : ''}">
        <div class="today-item-info">
          <div class="today-item-name">${g.subject}</div>
          <div class="today-item-meta">${numStr}　${typeLabel[g.type] || g.type}　${formatDuration(g.totalMin)}</div>
        </div>
        ${btn}
      </div>`;
  }).join('');
}

function renderTodaySection() {
  if (todayStudyItems.length === 0 && tomorrowStudyItems.length === 0) return '';
  const todayGroups    = groupStudyItems(todayStudyItems);
  const tomorrowGroups = groupStudyItems(tomorrowStudyItems);
  const todayTotal    = todayStudyItems.reduce((s, i) => s + i.durationMin, 0);
  const tomorrowTotal = tomorrowStudyItems.reduce((s, i) => s + i.durationMin, 0);

  const todayHTML = todayGroups.length > 0
    ? `<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
         <span>Today</span><span style="font-size:11px;letter-spacing:0;color:var(--text-muted);font-weight:400">計 ${formatDuration(todayTotal)}</span>
       </div>
       ${renderDayRows(todayGroups, true)}`
    : `<div style="font-size:12px;color:var(--text-muted);padding:8px 0">今日の予定はありません</div>`;

  const tomorrowHTML = tomorrowGroups.length > 0
    ? `<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);font-weight:600;margin-top:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
         <span>Tomorrow</span><span style="font-size:11px;letter-spacing:0;color:var(--text-muted);font-weight:400">計 ${formatDuration(tomorrowTotal)}</span>
       </div>
       ${renderDayRows(tomorrowGroups, false)}`
    : '';

  return `<div class="today-section">${todayHTML}${tomorrowHTML}</div>`;
}

async function completeTodayGroup(planIds, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    for (const planId of planIds) {
      await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
      const item = todayStudyItems.find(i => i.planId === planId);
      if (item) item.status = 'done';
    }
    const card = btn.closest('.today-item');
    if (card) card.classList.add('done');
    btn.classList.add('done'); btn.textContent = '完了済み';
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}

// ===== 学習計画ビュー =====
let studyPlanInitData = null; // { grade, semester, activeSubjects, exams, attendedBySubject, plan, progressBlocks }

async function openStudyPlanView() {
  currentView = 'studyPlan';
  studyPlanInitData = null;
  renderStudyPlanView();
  try {
    const res = await fetch(`${GAS_URL}?action=getStudyPlanInitData&userId=${encodeURIComponent(userId)}`);
    studyPlanInitData = await res.json();
    studyPlanData = studyPlanInitData.plan || [];
  } catch (e) {
    studyPlanInitData = null;
  }
  renderStudyPlanView();
}

function closeStudyPlanView() {
  currentView = 'dashboard';
  renderApp();
}

function formatExamDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}

function buildReviewBarChartHTML(exams, progressBlocks, onClickFn) {
  if (!exams || exams.length === 0) return '';
  const maxRemaining = Math.max(1, ...exams.map(e => {
    const p = progressBlocks[e.subjectName];
    return p ? p.remaining : 0;
  }));
  const MAX_H = 80;
  const cols = exams.map(exam => {
    const p = progressBlocks[exam.subjectName];
    const remaining = p ? p.remaining : 0;
    const total = p ? p.attended : 0;
    const barH = remaining > 0 ? Math.max(6, Math.round((remaining / maxRemaining) * MAX_H)) : 0;
    const color = remaining === 0 ? '#4ade80' : remaining >= total ? '#f87171' : '#fb923c';
    const label = exam.subjectName.replace(/[（(][^）)]+[）)]/g, '').slice(0, 6);
    const clickStyle = onClickFn ? `cursor:pointer;-webkit-tap-highlight-color:transparent` : '';
    const clickAttr  = onClickFn ? `onclick="${onClickFn}('${exam.examId}')" role="button" tabindex="0"` : '';
    return `<div ${clickAttr} style="width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;${clickStyle}">
        <div style="height:${MAX_H}px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;width:100%">
          ${barH > 0
            ? `<div style="font-size:9px;font-weight:700;color:var(--text-dim);margin-bottom:2px">${remaining}</div>
               <div style="width:34px;height:${barH}px;background:${color};border-radius:4px 4px 0 0"></div>`
            : `<div style="font-size:11px;color:#4ade80;margin-bottom:4px">✓</div>
               <div style="width:34px;height:3px;background:#4ade80;border-radius:4px 4px 0 0;opacity:0.4"></div>`
          }
        </div>
        <div style="width:52px;height:1px;background:var(--border)"></div>
        <div style="margin-top:5px;font-size:9px;color:var(--text-dim);text-align:center;line-height:1.4;word-break:break-all">${label}</div>
        <div style="font-size:10px;font-weight:600;color:var(--text-muted);margin-top:2px">${remaining}/${total}</div>
      </div>`;
  }).join('');
  return `<div style="margin:8px 20px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 14px 12px;overflow:hidden">
      <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:12px">復習残コマ数</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px">
        <div style="display:flex;gap:6px;min-width:max-content">
          ${cols}
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--text-muted)">
        <span><span style="display:inline-block;width:8px;height:8px;background:#4ade80;border-radius:2px;margin-right:3px;vertical-align:middle"></span>完了</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#fb923c;border-radius:2px;margin-right:3px;vertical-align:middle"></span>途中</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#f87171;border-radius:2px;margin-right:3px;vertical-align:middle"></span>未着手</span>
      </div>
    </div>`;
}

function openExamDetail(examId) {
  selectedExamId = examId;
  renderStudyPlanView();
}

function closeExamDetail() {
  selectedExamId = null;
  renderStudyPlanView();
}

function renderExamDetailHTML(app) {
  const { exams, attendedBySubject, plan, progressBlocks } = studyPlanInitData;
  const exam = exams.find(e => e.examId === selectedExamId);
  if (!exam) { selectedExamId = null; renderStudyPlanView(); return; }

  const entries = (plan || []).filter(e => e.examId === selectedExamId);
  const hasPlan = entries.length > 0;
  const doneCount = entries.filter(e => e.status === 'done').length;
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  const p = progressBlocks[exam.subjectName];
  const attended = attendedBySubject[exam.subjectName] || [];

  const dayMap = {};
  entries.filter(e => e.status === 'pending').forEach(e => {
    dayMap[e.date] = (dayMap[e.date] || 0) + e.durationMin;
  });
  const alertsHTML = Object.entries(dayMap)
    .filter(([, m]) => m > 240)
    .map(([d, m]) => `<div class="plan-alert">⚠️ ${d.slice(5)}：1日${Math.round(m/6)/10}時間必要です</div>`)
    .join('');

  const planItemsHTML = hasPlan
    ? entries.map(e => `
        <div class="plan-item ${e.status === 'done' ? 'done' : ''}" id="plan-${e.planId}">
          <div class="plan-item-date">${e.date.slice(5)}</div>
          <div class="plan-item-info">
            <div class="plan-item-name">第${e.sessionNumber}回授業</div>
            <div class="plan-item-type">${typeLabel[e.type] || e.type}・${formatDuration(e.durationMin)}</div>
          </div>
          <button class="plan-item-btn ${e.status === 'done' ? 'done' : ''}"
            ${e.status === 'done' ? 'disabled' : ''}
            onclick="completePlanItem('${e.planId}', this)">
            ${e.status === 'done' ? '完了' : '学習済み'}
          </button>
        </div>`).join('')
    : `<div style="padding:16px;font-size:13px;color:var(--text-dim);text-align:center">計画を生成してください</div>`;

  const attendedHTML = attended.length > 0
    ? attended.map(n => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">第${n}回</span>`).join(' ')
    : '<span style="font-size:12px;color:var(--text-muted)">まだ参加した授業がありません</span>';

  app.innerHTML = `
    <div class="plan-header">
      <button class="plan-back-btn" onclick="closeExamDetail()">← 一覧へ</button>
      <div style="flex:1;font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Syne',sans-serif">${exam.subjectName}</div>
    </div>
    <div style="padding:12px 20px;background:var(--surface2);border-bottom:1px solid var(--border)">
      <div style="font-size:12px;color:var(--accent3);margin-bottom:4px">試験日: ${formatExamDate(exam.examDate)}　復習: ${exam.reviewMinutes}分/回</div>
      <div style="font-size:12px;color:var(--text-muted)">
        ${p ? `残り <strong style="color:var(--text)">${p.remaining}</strong>コマ / ${p.attended}コマ参加済み　` : ''}
        ${hasPlan ? `${doneCount}/${entries.length}コマ完了` : ''}
      </div>
    </div>
    <div style="padding:10px 20px 8px;display:flex;gap:8px">
      <button onclick="replanExam('${exam.examId}', this)"
        style="flex:1;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-size:13px;font-weight:600;padding:10px;cursor:pointer">
        リプラン
      </button>
      <button onclick="generatePlan('${exam.examId}', event)"
        style="flex:1;background:var(--accent);border:none;border-radius:10px;color:#000;font-size:13px;font-weight:700;padding:10px;cursor:pointer">
        ${hasPlan ? '再生成' : '計画生成'}
      </button>
    </div>
    ${alertsHTML}
    <div style="padding:6px 20px 8px">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">参加済み授業</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${attendedHTML}</div>
    </div>
    <div class="plan-exam-card" style="margin:0 20px 20px">
      <div style="padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text-dim)">学習スケジュール</div>
      </div>
      ${planItemsHTML}
    </div>
    <div class="footer-pad"></div>`;
}

async function replanExam(examId, btn) {
  if (!confirm('この科目の未完了分を今日から再スケジュールしますか？')) return;
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    const r = await fetch(`${GAS_URL}?action=replanStudyForExam&userId=${encodeURIComponent(userId)}&examId=${encodeURIComponent(examId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      const res = await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`);
      const newPlan = (await res.json()).plan || [];
      studyPlanInitData.plan = newPlan;
      renderStudyPlanView();
    } else {
      btn.disabled = false; btn.textContent = 'リプラン';
      alert('エラー: ' + (d.error || '不明'));
    }
  } catch (e) { btn.disabled = false; btn.textContent = 'リプラン'; }
}

function renderStudyPlanView() {
  const app = document.getElementById('app');

  if (selectedExamId && studyPlanInitData) { renderExamDetailHTML(app); return; }

  // ローディング中
  if (!studyPlanInitData) {
    app.innerHTML = `
      <div class="plan-header">
        <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
        <div class="plan-title">定期試験対策</div>
      </div>
      <div class="loading" style="height:50vh"><div class="spinner"></div><div style="font-size:13px;color:var(--text-dim)">読み込み中...</div></div>`;
    return;
  }

  const { grade, semester, exams, progressBlocks } = studyPlanInitData;
  const semLabel = semester === 'spring' ? '春学期' : '秋学期';

  const noExamsHTML = exams.length === 0
    ? '<div style="padding:24px 20px;text-align:center;color:var(--text-dim);font-size:13px">この学期の試験日程は管理者が設定します</div>'
    : '';

  app.innerHTML = `
    <div class="plan-header">
      <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
      <div class="plan-title">定期試験対策</div>
    </div>
    <div style="padding:10px 20px 4px;font-size:12px;color:var(--text-muted)">
      表示中：${grade}年生 ${semLabel}の科目（${exams.length}件）
    </div>
    ${buildReviewBarChartHTML(exams, progressBlocks, 'openExamDetail')}
    ${noExamsHTML}
    ${buildExamTimetableHTML(exams)}
    <div class="footer-pad"></div>
  `;
}

async function generatePlan(examId) {
  const btn = event.target;
  const origText = btn.textContent;
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const r = await fetch(`${GAS_URL}?action=generateStudyPlan&userId=${encodeURIComponent(userId)}&examId=${encodeURIComponent(examId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      const newPlan = (await (await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`)).json()).plan || [];
      if (studyPlanInitData) studyPlanInitData.plan = newPlan;
      studyPlanData = newPlan;
      renderStudyPlanView();
    } else {
      btn.disabled = false; btn.textContent = origText;
      alert('エラー: ' + (d.error || '不明'));
    }
  } catch (e) { btn.disabled = false; btn.textContent = origText; }
}

async function completePlanItem(planId, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    const r = await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
    const d = await r.json();
    if (d.success) {
      const el = document.getElementById('plan-' + planId);
      if (el) { el.classList.add('done'); btn.classList.add('done'); btn.textContent = '完了'; }
      if (studyPlanInitData) {
        const item2 = studyPlanInitData.plan.find(i => i.planId === planId);
        if (item2) item2.status = 'done';
      }
      const item = studyPlanData.find(i => i.planId === planId);
      if (item) item.status = 'done';
    } else { btn.disabled = false; btn.textContent = '学習済み'; }
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}


function showCancelModal() {
  document.getElementById('cancelModal').classList.add('open');
}
function hideCancelModal() {
  document.getElementById('cancelModal').classList.remove('open');
}
async function confirmCancel() {
  const btn = document.querySelector('.btn-confirm-cancel');
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const res = await fetch(`${GAS_URL}?action=cancelSubscription&userId=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data.success) {
      hideCancelModal();
      document.getElementById('app').innerHTML = `
        <div class="error-state" style="padding-top:80px">
          <div class="icon">✅</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px">解約完了</div>
          <div style="font-size:13px;color:var(--text-muted)">サブスクリプションの解約が完了しました。<br>ご利用ありがとうございました。</div>
        </div>`;
    } else {
      btn.disabled = false;
      btn.textContent = '解約する';
      alert('エラーが発生しました: ' + (data.error || '不明なエラー'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '解約する';
    alert('通信エラーが発生しました');
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state" style="padding-top:80px">
      <div class="icon">⚠️</div>
      <div>読み込みに失敗しました</div>
      <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>
