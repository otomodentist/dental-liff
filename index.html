<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>授業のOtomo マイページ</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #faf7f2;
    --border: #e0d8cc;
    --accent: #2d5a3d;
    --accent-light: #e8f2eb;
    --ink: #1a1208;
    --ink2: #4a3f2f;
    --ink3: #8a7a68;
    --text: #1a1208;
    --text-muted: #8a7a68;
    --text-dim: #4a3f2f;
    --accent2: #1a6bbd;
    --accent3: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  /* ヘッダー */
  .header { background: var(--accent); color: white; padding: 16px 20px 12px; }
  .header-label { font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }
  .header-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; color: white; flex: 1; }

  /* タブナビ */
  .tab-nav { display: flex; background: var(--accent); border-top: 1px solid rgba(255,255,255,0.15); padding-bottom: 6px; }
  .tab-btn { flex: 1; padding: 10px 4px; background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab-btn.active { color: white; border-bottom-color: white; font-weight: 700; }

  /* ローディング */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 科目タブ（横スクロールピル） */
  .subj-tabs-wrapper { padding: 12px 16px 0; overflow-x: auto; scrollbar-width: none; }
  .subj-tabs-wrapper::-webkit-scrollbar { display: none; }
  .subj-tabs { display: flex; gap: 8px; min-width: max-content; }
  .subj-tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--ink3); cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
  .subj-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

  /* サマリーカード */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px 0; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; position: relative; overflow: hidden; }
  .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .summary-card.accent1::before { background: var(--accent); }
  .summary-card.accent2::before { background: var(--accent2); }
  .summary-card.accent3::before { background: var(--accent3); }
  .summary-card.accent4::before { background: #d97706; }
  .summary-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.05em; }
  .summary-value { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; margin-top: 4px; }
  .summary-unit { font-size: 13px; font-weight: 400; color: var(--ink3); margin-left: 2px; }

  /* セクション */
  .section { padding: 0 16px 16px; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--ink3); letter-spacing: 0.05em; margin-bottom: 10px; padding-top: 14px; }

  /* チャート */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; overflow: hidden; }
  .chart-card-title { font-size: 13px; color: var(--ink3); margin-bottom: 10px; }
  .chart-card-title span { font-weight: 700; font-size: 15px; color: var(--ink); display: block; }
  .chart-wrap { position: relative; height: 160px; }
  .chart-point-info { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-top: 8px; }
  .chart-point-info.open { display: block; }
  .chart-pi-time { color: var(--ink3); font-size: 11px; margin-bottom: 4px; }
  .chart-pi-score { font-size: 22px; font-weight: 700; margin-bottom: 3px; }
  .chart-pi-meta { color: var(--ink3); font-size: 11px; }

  /* セッション一覧 */
  .session-list { display: flex; flex-direction: column; gap: 8px; }
  .session-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .session-item.expanded { border-color: var(--accent); background: var(--accent-light); }
  .session-item:active { opacity: 0.8; }
  .session-info { flex: 1; }
  .session-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; color: var(--ink); }
  .session-meta { font-size: 12px; color: var(--ink3); }
  .session-score { text-align: right; }
  .score-badge { font-size: 22px; font-weight: 700; }
  .score-badge.high { color: var(--accent); }
  .score-badge.mid { color: #d97706; }
  .score-badge.low { color: var(--accent3); }
  .score-label { font-size: 10px; color: var(--ink3); }
  .session-detail { display: none; padding: 12px 0 4px; border-top: 1px solid var(--border); margin-top: 12px; }
  .session-detail.open { display: block; }
  .session-detail-wrap { position: relative; height: 120px; }

  /* エラー */
  .error-state { text-align: center; padding: 40px 20px; color: var(--ink3); }
  .error-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* フッター余白 */
  .footer-pad { height: 40px; }

  /* アカウント管理 */
  .account-section { padding: 0 16px 20px; margin-top: 8px; }
  .account-section-title { font-size: 11px; letter-spacing: 0.05em; color: var(--ink3); font-weight: 700; margin-bottom: 12px; padding-top: 14px; }
  .cancel-btn { display: inline-block; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--ink2); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; padding: 5px 10px; }
  .cancel-btn:active { opacity: 0.6; }

  /* 解約確認モーダル */
  .cancel-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
  .cancel-modal.open { display: flex; }
  .cancel-modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px max(40px,env(safe-area-inset-bottom)); width: 100%; }
  .cancel-modal-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--accent3); }
  .cancel-modal-body { font-size: 14px; color: var(--ink2); line-height: 1.7; margin-bottom: 24px; }
  .cancel-modal-body ul { padding-left: 20px; margin-top: 8px; }
  .cancel-modal-btns { display: flex; gap: 10px; }
  .cancel-modal-btns .btn-keep { flex: 1; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--ink); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .cancel-modal-btns .btn-confirm-cancel { flex: 1; padding: 14px; background: var(--accent3); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* 今日の学習 */
  .today-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .today-label { font-size: 11px; letter-spacing: 0.05em; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
  .today-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .today-item.done { opacity: 0.45; }
  .today-item-info { flex: 1; }
  .today-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; color: var(--ink); }
  .today-item-meta { font-size: 11px; color: var(--ink3); }
  .today-complete-btn { background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 12px; font-weight: 700; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .today-complete-btn:disabled { background: var(--surface2); color: var(--ink3); cursor: default; }

  /* 学習計画ビュー */
  .plan-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .plan-back-btn { background: none; border: none; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; font-family: inherit; }
  .plan-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; color: var(--ink); }
  .plan-exam-card { margin: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .plan-exam-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .plan-exam-name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .plan-exam-date { font-size: 12px; color: var(--accent3); margin-top: 2px; }
  .plan-generate-btn { background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 12px; font-weight: 700; padding: 6px 14px; cursor: pointer; font-family: inherit; }
  .plan-item { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .plan-item:last-child { border-bottom: none; }
  .plan-item-date { font-size: 11px; color: var(--ink3); width: 60px; flex-shrink: 0; }
  .plan-item-info { flex: 1; }
  .plan-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .plan-item-type { font-size: 11px; color: var(--ink3); }
  .plan-item.done .plan-item-name { text-decoration: line-through; opacity: 0.5; }
  .plan-item-btn { background: var(--accent); border: none; border-radius: 8px; color: white; font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .plan-item-btn.done { background: var(--surface2); color: var(--ink3); cursor: default; }
  .plan-alert { margin: 0 16px 12px; padding: 12px 16px; background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.25); border-radius: 12px; font-size: 13px; color: var(--accent3); }

  /* 直近授業ボタン */
  .latest-btn { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin: 12px 16px 0; cursor: pointer; width: calc(100% - 32px); text-align: left; transition: border-color 0.2s; font-family: inherit; }
  .latest-btn:active { opacity: 0.8; }
  .latest-btn-icon { font-size: 22px; }
  .latest-btn-text { flex: 1; }
  .latest-btn-label { font-size: 11px; color: var(--ink3); margin-bottom: 2px; }
  .latest-btn-title { font-size: 14px; font-weight: 700; color: var(--ink); }

  /* 授業中ランキング */
  .live-card { margin: 14px 16px 12px; background: var(--surface); border: 1.5px solid var(--accent); border-radius: 12px; overflow: hidden; }
  .live-card-header { background: var(--accent); padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
  .live-badge { background: rgba(255,255,255,0.2); color: white; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }
  .live-question { font-size: 13px; font-weight: 600; color: white; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .rank-row:last-child { border-bottom: none; }
  .rank-row.me { background: var(--accent-light); }
  .rank-row:active { background: var(--surface2); }
  .rank-num { font-weight: 700; font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; color: var(--ink2); }
  .rank-num.gold { color: #c8960c; }
  .rank-num.silver { color: #7a7a7a; }
  .rank-num.bronze { color: #9a5a28; }
  .rank-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .rank-sub { font-size: 10px; color: var(--ink3); margin-top: 1px; line-height: 1.4; word-break: break-all; }
  .rank-score { font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .rank-empty { padding: 20px; text-align: center; color: var(--ink3); font-size: 13px; }

  /* ポップアップ */
  .latest-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .latest-popup.open { display: flex; }
  .latest-popup-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .latest-popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
  .user-graph-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 110; align-items: flex-end; }
  .user-graph-popup.open { display: flex; }
  .user-graph-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-height: 70vh; overflow-y: auto; }

  /* ニックネームモーダル */
  .nickname-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .nickname-modal.open { display: flex; }
  .nickname-modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 480px; padding-bottom: max(24px,env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; }
  .nickname-modal-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
  .nickname-warning { font-size: 12px; color: var(--accent3); background: rgba(192,57,43,0.07); border: 1px solid rgba(192,57,43,0.2); border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; line-height: 1.5; }
  .nickname-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--ink); font-size: 15px; font-family: inherit; margin-bottom: 14px; outline: none; }
  .nickname-input:focus { border-color: var(--accent); }
  .nickname-save-btn { width: 100%; background: var(--accent); border: none; border-radius: 10px; color: white; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; margin-bottom: 10px; font-family: inherit; }
  .nickname-skip-btn { width: 100%; background: none; border: none; color: var(--ink3); font-size: 13px; cursor: pointer; padding: 4px; font-family: inherit; }
</style>
</head>
<body>

<div id="nicknameModal" class="nickname-modal">
  <div class="nickname-modal-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="nickname-modal-title" style="margin-bottom:0">ニックネームを設定</div>
      <button onclick="closeNicknameModal()" style="background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer;line-height:1;padding:2px 4px">×</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">ランキング表示時に他のユーザーに表示されます</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <label style="position:relative;cursor:pointer;flex-shrink:0">
        <img id="avatarPreview" style="width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--surface2);border:2px solid var(--border)" src="" onerror="this.style.background='var(--surface2)'" />
        <div style="position:absolute;bottom:0;right:0;background:var(--accent);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px">📷</div>
        <input type="file" accept="image/*" style="display:none" onchange="onAvatarFileSelected(this)" />
      </label>
      <input id="nicknameInput" class="nickname-input" type="text" maxlength="20" placeholder="例: タロ、ヒロシ" style="margin-bottom:0;flex:1" />
    </div>
    <div class="nickname-warning">⚠️ 他の受講者が不快に感じるような表現は使用しないでください</div>
    <button class="nickname-save-btn" onclick="saveNickname()">決定</button>
    <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:8px">ユーザーネームは後から変更できます</div>
  </div>
</div>

<div id="avatarCropModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.88);flex-direction:column;align-items:center;justify-content:center">
  <div style="color:#fff;font-size:13px;margin-bottom:14px;opacity:.8">ドラッグで移動 ／ ピンチで拡大縮小</div>
  <div id="cropCircle" style="width:260px;height:260px;border-radius:50%;overflow:hidden;position:relative;border:3px solid rgba(255,255,255,0.7);cursor:grab;flex-shrink:0;touch-action:none">
    <img id="cropImg" style="position:absolute;user-select:none;pointer-events:none;touch-action:none" draggable="false" />
  </div>
  <div style="display:flex;gap:16px;margin-top:28px">
    <button onclick="cancelAvatarCrop()" style="padding:11px 28px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:#fff;font-size:14px;font-weight:600;cursor:pointer">キャンセル</button>
    <button onclick="confirmAvatarCrop()" style="padding:11px 28px;border-radius:10px;border:none;background:#fff;color:#1a3a6b;font-size:14px;font-weight:700;cursor:pointer">確定</button>
  </div>
</div>

<div id="cancelModal" class="cancel-modal">
  <div class="cancel-modal-sheet">
    <div class="cancel-modal-title">登録解除しますか？</div>
    <div class="cancel-modal-body">
      登録解除すると：
      <ul>
        <li>サービスが利用できなくなります</li>
        <li>授業データは保持されます</li>
        <li>再度ご利用の場合はデモ画面から登録できます</li>
      </ul>
      <br>本当に登録解除しますか？
    </div>
    <div class="cancel-modal-btns">
      <button class="btn-keep" onclick="hideCancelModal()">戻る</button>
      <button class="btn-confirm-cancel" onclick="confirmCancel()">登録解除する</button>
    </div>
  </div>
</div>

<div id="latestPopup" class="latest-popup">
  <div class="latest-popup-sheet">
    <button class="latest-popup-close" onclick="closeLatestPopup()">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px">直近終了した授業</div>
    <div id="latestPopupContent"></div>
  </div>
</div>

<div id="userGraphPopup" class="user-graph-popup">
  <div class="user-graph-sheet">
    <button class="latest-popup-close" onclick="closeUserGraphPopup()">✕</button>
    <div id="userGraphTitle" style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px"></div>
    <div id="userGraphContent" style="position:relative;height:220px"></div>
  </div>
</div>

<div id="app">
  <div class="loading" id="loading">
    <img src="otomo_logo.png" style="width:140px;margin-bottom:16px" alt="授業のOtomo" />
    <div style="width:180px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
      <div id="progressBar" style="height:100%;width:5%;background:var(--accent);border-radius:2px;transition:width 0.5s ease"></div>
    </div>
    <div id="progressLabel" style="font-size:12px;color:var(--text-dim);margin-top:10px">起動中...</div>
  </div>
</div>

<script>
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec';
const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23c0c8d0'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Cpath d='M20 21a8 8 0 1 0-16 0'/%3E%3C/svg%3E";
const LIFF_ID = '2009739219-dSnPUVFj';

let userId = null;
let profileData = null;
let dashboardData = null;
let activeSubjectIndex = 0;
const chartInstances = {};

// 学習計画
let currentView = 'dashboard'; // 'dashboard' | 'studyPlan' | 'settings'
let todayStudyItems = [];
let tomorrowStudyItems = [];
let selectedExamId = null;
let studyPlanData = null;

// ランキング
let activeSessionState = null;
let questionRankingData = null;
let liveSessionTimeline = [];
let latestSessionData = null;
let latestSessionRanking = [];

// ===== 初期化 =====
async function checkVersion() {
  try {
    const r = await fetch('version.json?_=' + Date.now(), { cache: 'no-store' });
    const { v } = await r.json();
    const stored = localStorage.getItem('appVersion');
    localStorage.setItem('appVersion', v);
    if (stored && stored !== v) {
      const url = new URL(location.href);
      url.searchParams.set('_', Date.now());
      location.replace(url.toString());
      return false;
    }
  } catch (e) {}
  return true;
}

// ===== プログレスバー =====
function setProgress(pct, label) {
  const bar = document.getElementById('progressBar');
  const lbl = document.getElementById('progressLabel');
  if (bar) bar.style.width = pct + '%';
  if (lbl && label) lbl.textContent = label;
}

// ===== 初期化キャッシュ（stale-while-revalidate）=====
const CACHE_KEY = 'otomo_init_v1_';
function saveInitCache(uid, d) {
  try { localStorage.setItem(CACHE_KEY + uid, JSON.stringify({ ...d, _at: Date.now() })); } catch (e) {}
}
function loadInitCache(uid) {
  try {
    const raw = localStorage.getItem(CACHE_KEY + uid);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d._at > 3600 * 1000) return null; // 1時間で失効
    return d;
  } catch (e) { return null; }
}
function applyInitCache(c) {
  if (c.dashboard) dashboardData = c.dashboard;
  if (c.activeSession) activeSessionState = c.activeSession;
  myNickname    = c.nickname    || '';
  myBillingStatus = c.billingStatus || '';
  myAvatarUrl   = c.avatarUrl   || '';
  todayStudyItems    = c.todayItems    || [];
  tomorrowStudyItems = c.tomorrowItems || [];
}

async function init() {
  if (!await checkVersion()) return;

  // プレビューモード
  const previewUserId = new URLSearchParams(location.search).get('preview');
  if (previewUserId) {
    userId = previewUserId;
    profileData = { userId: previewUserId, displayName: '', pictureUrl: '' };
    try {
      const res = await fetch(`${GAS_URL}?action=getUserInitData&userId=${encodeURIComponent(userId)}`);
      const d = await res.json();
      dashboardData = d.dashboard || null;
      activeSessionState = d.activeSession || { isActive: false };
      myNickname = d.nickname || ''; myBillingStatus = d.billingStatus || ''; myAvatarUrl = d.avatarUrl || '';
      todayStudyItems = d.todayItems || []; tomorrowStudyItems = d.tomorrowItems || [];
    } catch (e) {}
    renderApp();
    if (!activeSessionState?.isActive) { await fetchLatestRanking(); renderApp(); }
    else { scheduleLiveRefreshes(); }
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1208cc;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:6px;z-index:9999;backdrop-filter:blur(4px)';
    banner.textContent = '👁 管理者プレビューモード';
    document.body.appendChild(banner);
    return;
  }

  setProgress(5, '起動中...');
  let step = 'liff.init';
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    setProgress(25, 'プロフィール取得中...');
    step = 'liff.getProfile';
    const profile = await liff.getProfile();
    userId = profile.userId;
    profileData = profile;

    // キャッシュがあれば即座に表示してからバックグラウンドで最新データ取得
    const cache = loadInitCache(userId);
    if (cache) {
      applyInitCache(cache);
      setProgress(50, '最新データを取得中...');
      renderApp();
    } else {
      setProgress(45, 'データ取得中...');
    }

    step = 'getUserInitData';
    const res = await fetch(`${GAS_URL}?action=getUserInitData&userId=${encodeURIComponent(userId)}`);
    const d = await res.json();

    setProgress(90, '画面を構築中...');
    dashboardData      = d.dashboard      || null;
    activeSessionState = d.activeSession  || { isActive: false };
    myNickname         = d.nickname       || '';
    myBillingStatus    = d.billingStatus  || '';
    myAvatarUrl        = d.avatarUrl      || '';
    todayStudyItems    = d.todayItems     || [];
    tomorrowStudyItems = d.tomorrowItems  || [];

    saveInitCache(userId, d);
    setProgress(100, '');
    renderApp();

    if (!activeSessionState?.isActive) { await fetchLatestRanking(); renderApp(); }
    else { scheduleLiveRefreshes(); }

    const isPaid = myBillingStatus === '契約中' || myBillingStatus === '管理者承認';
    if (!myNickname && isPaid) openNicknameModal();
    // 課金済みのリッチメニューをセッションごとに1回だけ自動修正（切り替え漏れを自己修復）
    if (isPaid && !sessionStorage.getItem('rmFixed')) {
      sessionStorage.setItem('rmFixed', '1');
      fetch(`${GAS_URL}?action=setRichMenuForPaid&userId=${encodeURIComponent(userId)}`).catch(() => {});
    }
  } catch (err) {
    showError(`[${step}] ${err.message}`);
  }
}

  try {

    if (currentView === 'settings') renderSettingsView();

}

let _cropImg = null, _cropOffsetX = 0, _cropOffsetY = 0, _cropScale = 1;
const _cropSize = 260;

function onAvatarFileSelected(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() { openAvatarCropModal(img); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function openAvatarCropModal(img) {
  _cropImg = img;
  _cropScale = _cropSize / Math.min(img.width, img.height);
  _cropOffsetX = 0;
  _cropOffsetY = 0;
  _updateCropImage();
  document.getElementById('avatarCropModal').style.display = 'flex';
  _setupCropEvents();
}

function _updateCropImage() {
  const el = document.getElementById('cropImg');
  const w = _cropImg.width * _cropScale;
  const h = _cropImg.height * _cropScale;
  el.src = _cropImg.src;
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.style.left = (_cropSize / 2 - w / 2 + _cropOffsetX) + 'px';
  el.style.top  = (_cropSize / 2 - h / 2 + _cropOffsetY) + 'px';
}

function _clampCrop() {
  const maxX = (_cropImg.width  * _cropScale - _cropSize) / 2;
  const maxY = (_cropImg.height * _cropScale - _cropSize) / 2;
  _cropOffsetX = Math.max(-maxX, Math.min(maxX, _cropOffsetX));
  _cropOffsetY = Math.max(-maxY, Math.min(maxY, _cropOffsetY));
}

function cancelAvatarCrop() {
  document.getElementById('avatarCropModal').style.display = 'none';
}

function confirmAvatarCrop() {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const srcSize = _cropSize / _cropScale;
  const srcX = -_cropOffsetX / _cropScale + _cropImg.width  / 2 - srcSize / 2;
  const srcY = -_cropOffsetY / _cropScale + _cropImg.height / 2 - srcSize / 2;
  ctx.drawImage(_cropImg, srcX, srcY, srcSize, srcSize, 0, 0, 64, 64);
  pendingAvatarDataUrl = canvas.toDataURL('image/jpeg', 0.65);
  const preview = document.getElementById('avatarPreview');
  if (preview) preview.src = pendingAvatarDataUrl;
  document.getElementById('avatarCropModal').style.display = 'none';
}

function _setupCropEvents() {
  const circle = document.getElementById('cropCircle');
  const fresh = circle.cloneNode(true);
  circle.parentNode.replaceChild(fresh, circle);
  // re-attach img reference after clone
  const imgEl = document.getElementById('cropImg');

  let dragging = false, lastX = 0, lastY = 0, lastDist = null;

  fresh.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    _cropOffsetX += e.clientX - lastX; _cropOffsetY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    _clampCrop(); _updateCropImage();
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  fresh.addEventListener('wheel', e => {
    e.preventDefault();
    const min = _cropSize / Math.min(_cropImg.width, _cropImg.height);
    _cropScale = Math.max(min, _cropScale * (e.deltaY > 0 ? 0.92 : 1.08));
    _clampCrop(); _updateCropImage();
  }, { passive: false });

  fresh.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true; lastDist = null;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      dragging = false;
      lastDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    }
    e.preventDefault();
  }, { passive: false });

  fresh.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && dragging) {
      _cropOffsetX += e.touches[0].clientX - lastX; _cropOffsetY += e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      _clampCrop(); _updateCropImage();
    } else if (e.touches.length === 2 && lastDist !== null) {
      const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
      const min = _cropSize / Math.min(_cropImg.width, _cropImg.height);
      _cropScale = Math.max(min, _cropScale * (d / lastDist));
      lastDist = d;
      _clampCrop(); _updateCropImage();
    }
    e.preventDefault();
  }, { passive: false });

  fresh.addEventListener('touchend', e => { if (e.touches.length < 2) lastDist = null; if (e.touches.length === 0) dragging = false; });
}

// ===== 手動更新・問題配信後タイマー =====
let liveRefreshTimers = [];

function clearLiveRefreshTimers() {
  liveRefreshTimers.forEach(t => clearInterval(t));
  liveRefreshTimers = [];
}

let _liveLastAnswerTs = '0';

function scheduleLiveRefreshes() {
  clearLiveRefreshTimers();
  if (!activeSessionState?.isActive || !activeSessionState.session?.currentQuestionId) return;
  const id = setInterval(async () => {
    if (!activeSessionState?.isActive) { clearLiveRefreshTimers(); return; }
    try {
      const r = await fetch(`${GAS_URL}?action=getLastAnswerTimestamp`);
      const d = await r.json();
      if (d.ts && d.ts !== _liveLastAnswerTs) {
        _liveLastAnswerTs = d.ts;
        refreshLiveCardSilent();
      }
    } catch (e) {}
  }, 10000);
  liveRefreshTimers.push(id);
}

async function refreshLiveCardSilent() {
  await refreshActiveSession();
  if (!activeSessionState?.isActive) {
    liveSessionTimeline = [];
    questionRankingData = null;
    await fetchLatestRanking();
    renderApp();
    return;
  }
  const sess = activeSessionState.session;
  if (sess.currentQuestionId) {
    try {
      const r = await fetch(`${GAS_URL}?action=getQuestionRanking&questionId=${encodeURIComponent(sess.currentQuestionId)}`);
      questionRankingData = await r.json();
    } catch (e) {}
  } else {
    questionRankingData = null;
  }
  try {
    const r = await fetch(`${GAS_URL}?action=getUserSessionGraph&sessionId=${encodeURIComponent(sess.sessionId)}&targetUserId=${encodeURIComponent(userId)}`);
    const d = await r.json();
    liveSessionTimeline = d.answers || [];
  } catch (e) {}
  renderApp();
}

async function refreshLiveCard() {
  await refreshLiveCardSilent();
  scheduleLiveRefreshes();
}



async function fetchDashboard(uid) {

async function fetchLatestRanking() {
  try {
    const res = await fetch(`${GAS_URL}?action=getLatestSessionRanking&userId=${encodeURIComponent(userId)}`);
    const d = await res.json();
    if (!d.found) { latestSessionData = null; latestSessionRanking = []; return; }
    latestSessionData = { found: true, sessionId: d.sessionId, subject: d.subject, sessionNumber: d.sessionNumber, sustainScore: d.sustainScore, answerCount: d.answerCount };
    latestSessionRanking = d.ranking || [];
    currentRankingSessionId = d.sessionId;
    currentRankingData = latestSessionRanking;
  } catch (e) { latestSessionData = null; latestSessionRanking = []; }
}

// ===== ランキング描画 =====
function rankNumClass(r) { return r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : ''; }

function buildRankRowHTML(item, highlightUserId) {
  const isMe = item.userId === highlightUserId;
  const unanswered = item.answered === false;
  const numCls = rankNumClass(item.rank);
  const scoreColor = item.concentrationScore >= 70 ? '#2d5a3d' : item.concentrationScore >= 40 ? '#d97706' : '#c0392b';
  return `
    <div class="rank-row${isMe ? ' me' : ''}" style="${unanswered ? 'opacity:0.45' : ''}">
      <div class="rank-num ${numCls}">${unanswered ? '—' : item.rank}</div>
      <img class="rank-avatar" src="${item.avatarUrl || DEFAULT_AVATAR}" onerror="this.src=DEFAULT_AVATAR" />
      <div class="rank-info">
        <div class="rank-name">${item.nickname || item.displayName}${isMe ? ' 👤' : ''}</div>
        <div class="rank-sub">${unanswered ? '未回答' : (item.answerText || '')}</div>
      </div>
      <div class="rank-score" style="color:${unanswered ? 'var(--ink3)' : scoreColor}">${unanswered ? '—' : item.concentrationScore}</div>
    </div>`;
}

function buildSessionRankRowHTML(item, highlightUserId) {
  const isMe = item.userId === highlightUserId;
  const unanswered = item.answered === false;
  const numCls = rankNumClass(item.rank);
  const scoreColor = item.sustainScore >= 70 ? '#2d5a3d' : item.sustainScore >= 40 ? '#d97706' : '#c0392b';
  return `
    <div class="rank-row${isMe ? ' me' : ''}" style="${unanswered ? 'opacity:0.45' : ''}">
      <div class="rank-num ${numCls}">${unanswered ? '—' : item.rank}</div>

      <div class="rank-info">

      </div>
      <div class="rank-score" style="color:${unanswered ? 'var(--ink3)' : scoreColor}">${unanswered ? '—' : item.sustainScore}</div>

          <button onclick="openSettingsView()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:6px;font-size:17px;cursor:pointer;padding:2px 9px;color:white;line-height:1.4">⚙</button>
        </div>
      </div>
      <div class="error-state">
        <div class="icon">📚</div>
        <div>まだ回答データがありません</div>

  }

  const name = myNickname || profileData.displayName;
  const avatarSrc = myAvatarUrl;

  const headerHTML = `
    <div class="header">
      <div style="display:flex;align-items:center;gap:7px"><div style="width:44px;height:44px;overflow:hidden;flex-shrink:0"><img src="otomo_logo_litegreen.png" style="width:125%;height:125%;margin:-12.5% 0 0 -12.5%;display:block" /></div><span style="font-family:'Kaisei Tokumin',serif;font-size:17px;font-weight:700;color:white;letter-spacing:0.02em">授業のOtomo</span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0">
          <img src="${avatarSrc || DEFAULT_AVATAR}" style="width:100%;height:100%;object-fit:cover" onerror="this.src=DEFAULT_AVATAR" />
        </div>
        <div class="header-title">${name}</div>
        <button onclick="openSettingsView()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:6px;font-size:17px;cursor:pointer;padding:2px 9px;color:white;line-height:1.4">⚙</button>
      </div>
    </div>
    <div class="tab-nav">
      <button class="tab-btn ${mainTab === 'dashboard' ? 'active' : ''}" onclick="switchMainTab('dashboard')">集中度スコア</button>
      <button class="tab-btn ${mainTab === 'plan' ? 'active' : ''}" onclick="switchMainTab('plan')">学習計画</button>
    </div>`;

  // 直近授業（全科目の中で最新）
  const topSubj = subjects[0];
  const topSess = topSubj?.sessions[topSubj.sessions.length - 1];

  // 科目アコーディオン
  const accordionHTML = subjects.map((subj, subjIdx) => {
    const isOpen = historySubjectOpen === subjIdx;
    const latestDelivered = subj.sessions.slice().reverse().find(s => !s.noDelivery);
    const latestScore = latestDelivered ? latestDelivered.sustainScore : null;
    const sessionRows = isOpen ? subj.sessions.slice().reverse().map(sess => {
      const isSessOpen = historySubjectOpen === subjIdx && historySessionOpen === sess.sessionNumber;
      const sc = sess.sustainScore;
      return `
        <div style="border-top:1px solid var(--border);background:#f0f6f1">
          <div onclick="${sess.noDelivery ? '' : `toggleHistorySession(${subjIdx},${sess.sessionNumber})`}" style="display:flex;align-items:center;gap:12px;padding:11px 14px 11px 20px;${sess.noDelivery ? 'cursor:default;opacity:0.55' : 'cursor:pointer'}">
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;color:var(--ink)">第${sess.sessionNumber}回授業</div>
              <div style="font-size:11px;color:var(--ink3);margin-top:1px">${sess.noDelivery ? '配信なし' : sess.timeline.length + '問回答'}</div>
            </div>
            ${sess.noDelivery
              ? `<div style="font-size:12px;color:var(--ink3);margin-right:4px">—</div>`
              : `<div class="score-badge ${sc>=70?'high':sc>=40?'mid':'low'}" style="font-size:18px;margin-right:4px">${sc}</div>`}
            ${sess.noDelivery ? '' : `<div style="font-size:12px;color:var(--ink3);transition:transform 0.2s;transform:${isSessOpen?'rotate(180deg)':'none'}">▼</div>`}
          </div>
          ${isSessOpen && !sess.noDelivery ? `
          <div style="background:var(--surface2);padding:0 0 10px">
            <div style="height:180px;position:relative;padding:8px 10px 0"><canvas id="hc-${subjIdx}-${sess.sessionNumber}"></canvas></div>
            <div id="hc-${subjIdx}-${sess.sessionNumber}-info" class="chart-point-info" style="margin:6px 12px 0"></div>
          </div>` : ''}
        </div>`;
    }).join('') : '';
    return `
      <div style="margin:0 16px 8px;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
        <div onclick="toggleHistorySubject(${subjIdx})" style="display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;background:#b8d9bd">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700;color:var(--accent)">${subj.name}</div>
            <div style="font-size:11px;color:var(--ink3);margin-top:2px">${subj.sessions.length}回授業</div>
          </div>
          <div style="text-align:right;margin-right:6px">
            <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">集中度維持スコア</div>
            <div style="font-size:20px;font-weight:700;color:${latestScore != null ? 'var(--accent)' : 'var(--ink3)'}">${latestScore != null ? latestScore : '—'}</div>
          </div>
          <div style="font-size:12px;color:var(--ink3);transition:transform 0.2s;transform:${isOpen?'rotate(180deg)':'none'}">▼</div>
        </div>
        ${sessionRows}
      </div>`;
  }).join('');

  const isLive = activeSessionState?.isActive;
  const liveSess = activeSessionState?.session;

  const topCardHTML = isLive ? `
    <div style="margin:8px 16px 0;background:var(--surface);border:1.5px solid var(--accent);border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--accent-light);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em">授業中</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-top:2px">${liveSess.subject}　第${liveSess.sessionNumber}回</div>
        </div>
        <div style="font-size:11px;color:var(--ink3)">${liveSessionTimeline.length}問回答済み</div>
      </div>
      <div style="height:190px;position:relative;padding:8px 8px 4px"><canvas id="liveChartCanvas"></canvas></div>
      <div id="liveChartCanvas-info" class="chart-point-info" style="margin:0 12px 10px"></div>
    </div>` : topSess ? `
    <div style="margin:8px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:0.05em">直近授業</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-top:2px">${topSubj.name}　第${topSess.sessionNumber}回</div>
        </div>
        <div style="font-size:11px;color:var(--ink3)">${topSess.timeline.length}問回答</div>
      </div>
      <div style="height:190px;position:relative;padding:8px 8px 4px"><canvas id="topChartCanvas"></canvas></div>
      <div id="topChartCanvas-info" class="chart-point-info" style="margin:0 12px 10px"></div>
    </div>` : '';

  const sessionRankingBodyHTML = myAdminRestricted
    ? `<div style="padding:16px;text-align:center;line-height:1.7">
        <div style="font-size:13px;font-weight:700;color:var(--ink)">ユーザーネーム/アイコンが不適切なため管理者によって表示を制限されています</div>
      </div>`
    : hideAnswerInRanking
    ? `<div style="padding:16px;text-align:center;line-height:1.7">
        <div style="font-size:13px;font-weight:700;color:var(--ink)">ランキングは非表示設定中です</div>
        <div style="font-size:12px;color:var(--ink3);margin-bottom:10px">設定から自分のランキング表示を許可すると見られます</div>
        <button onclick="openSettingsView()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--ink2);font-size:12px;font-weight:700;padding:7px 16px;cursor:pointer;font-family:inherit">設定を開く</button>
      </div>`
    : (() => {
        const visible = latestSessionRanking.filter(item => !item.restricted && !item.hideAnswer);
        return visible.length > 0
          ? visible.map(item => buildSessionRankRowHTML(item, userId)).join('')
          : '<div class="rank-empty">ランキングデータなし</div>';
      })();
  const sessionRankingCardHTML = latestSessionData ? `
    <div style="margin:8px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--ink3)">直近授業ランキング（集中度維持スコア）</div>
          <div style="font-size:14px;font-weight:700;color:var(--ink);margin-top:2px">${latestSessionData.subject}　第${latestSessionData.sessionNumber}回</div>
        </div>
        <button onclick="openSettingsView()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--ink3);font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;font-family:inherit;flex-shrink:0">設定</button>
      </div>
      ${sessionRankingBodyHTML}
    </div>` : '';

  const dashboardHTML = `
    ${buildLiveRankingCardHTML()}
    ${sessionRankingCardHTML}
    ${topCardHTML}
    <div style="padding:10px 16px 4px;font-size:12px;font-weight:700;color:var(--ink3)">授業履歴</div>
    ${accordionHTML}
    <div class="footer-pad"></div>`;

  const planHTML = `
    ${renderTodaySection()}
    ${renderPlanExamSection()}
    ${renderPlanQuizSection()}
    <div class="footer-pad"></div>`;

  app.innerHTML = headerHTML + (mainTab === 'plan' ? planHTML : dashboardHTML);

  requestAnimationFrame(() => {
    if (mainTab === 'dashboard') {
      if (isLive) {
        if (liveSessionTimeline.length) drawTimelineChart('liveChartCanvas', liveSessionTimeline, 'liveSessionChart');
      } else {
        if (topSess?.timeline?.length) drawTimelineChart('topChartCanvas', topSess.timeline, 'topChart');
      }
      if (historySubjectOpen !== null && historySessionOpen !== null) {
        const subj = subjects[historySubjectOpen];
        const sess = subj?.sessions.find(s => s.sessionNumber === historySessionOpen);
        const cid = `hc-${historySubjectOpen}-${historySessionOpen}`;
        if (sess?.timeline?.length) drawTimelineChart(cid, sess.timeline, cid);
      }
    }
  });
}

function switchMainTab(tab) {
  mainTab = tab;
  renderApp();
  if (tab === 'plan' && !planTabData) loadPlanTabData();
  if (tab === 'dashboard' && activeSessionState?.isActive) {
    refreshLiveCardSilent().then(() => renderApp()).catch(() => {});
  }
}

function renderPlanExamSection() {
  const loading = !planTabData;
  const exams = planTabData?.exams || [];
  const blocks = planTabData?.progressBlocks || {};
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = exams
    .filter(e => e.examDate && new Date(e.examDate + 'T00:00:00') >= today)
    .sort((a, b) => a.examDate.localeCompare(b.examDate));
  const rows = loading
    ? '<div style="padding:14px 16px;font-size:13px;color:var(--ink3)">読み込み中...</div>'
    : upcoming.length === 0
      ? '<div style="padding:14px 16px;font-size:13px;color:var(--ink3)">授業最終日以降ご利用可能です</div>'
      : upcoming.map(e => {
          const p = blocks[e.subjectName] || {};
          const done = p.done || 0;
          const total = p.attended || 0;
          const remain = p.remaining || 0;
          const pct = total > 0 ? Math.round(done / total * 100) : 0;
          const barColor = remain === 0 ? '#4ade80' : remain >= total ? '#f87171' : '#fb923c';
          return `<div onclick="openExamDetail('${e.examId}')" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.subjectName}</div>
              <div style="font-size:11px;color:var(--ink3);margin-top:2px">${formatExamDate(e.examDate)}</div>
              ${total > 0 ? `<div style="display:flex;align-items:center;gap:6px;margin-top:4px">
                <div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px"></div>
                </div>
                <span style="font-size:10px;color:var(--ink3)">${done}/${total}回</span>
              </div>` : ''}
            </div>
            <div style="font-size:18px;color:var(--ink3)">›</div>
          </div>`;
        }).join('');
  return `<div style="margin:8px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <div style="padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:0.05em">定期試験対策</div>
      ${!loading && upcoming.length > 0 ? `<button onclick="openStudyPlanView()" style="background:none;border:none;font-size:11px;color:var(--accent);cursor:pointer;font-weight:600;padding:0;font-family:inherit">詳細 ›</button>` : ''}
    </div>
    ${rows}
  </div>`;
}

function renderPlanQuizSection() {
  const loading = !planTabData;
  const quizzes = planTabData?.quizzes || [];
  if (!loading && quizzes.length === 0) return '';
  const rows = loading
    ? '<div style="padding:14px 16px;font-size:13px;color:var(--ink3)">読み込み中...</div>'
    : quizzes.map(q => {
          const d = new Date(q.examDate + 'T00:00:00');
          const days = ['日','月','火','水','木','金','土'];
          const dateLabel = `${d.getMonth()+1}/${d.getDate()}`;
          const dayLabel = `（${days[d.getDay()]}）`;
          return `
          <div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)">
            <div style="text-align:center;min-width:40px;flex-shrink:0">
              <div style="font-size:15px;font-weight:700;color:var(--accent);line-height:1.2">${dateLabel}</div>
              <div style="font-size:10px;color:var(--ink3)">${dayLabel}</div>
            </div>
            <div style="width:1px;height:32px;background:var(--border);flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:0.04em">${q.subjectName}</div>
              <div style="font-size:13px;font-weight:600;color:var(--ink);margin-top:1px">${q.quizName || 'テスト'}</div>
              ${q.scope ? `<div style="font-size:11px;color:var(--ink3);margin-top:1px">範囲：${q.scope}</div>` : ''}
            </div>
          </div>`;
        }).join('');
  return `<div style="margin:8px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <div style="padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:0.05em">小テスト</div>
    </div>
    ${rows}
  </div>`;
}

async function loadPlanTabData() {
  try {
    const [examRes, quizRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getStudyPlanInitData&userId=${encodeURIComponent(userId)}`),
      fetch(`${GAS_URL}?action=getQuizList`),
    ]);
    const examData = await examRes.json();
    const quizData = await quizRes.json();
    planTabData = {
      exams: examData.exams || [],
      progressBlocks: examData.progressBlocks || {},
      quizzes: quizData.quizzes || [],
    };
    if (mainTab === 'plan') renderApp();
  } catch (e) {}
}

function toggleHistorySubject(subjIdx) {
  if (historySubjectOpen === subjIdx) { historySubjectOpen = null; historySessionOpen = null; }
  else { historySubjectOpen = subjIdx; historySessionOpen = null; }
  renderApp();
}

function toggleHistorySession(subjIdx, sessNum) {
  if (historySubjectOpen === subjIdx && historySessionOpen === sessNum) historySessionOpen = null;
  else { historySubjectOpen = subjIdx; historySessionOpen = sessNum; }
  renderApp();
}

async function openSettingsView() {
  currentView = 'settings';
  renderSettingsView();
  if (!availableSemesters) {
    try {
      const r = await fetch(`${GAS_URL}?action=getAvailableSemesters&userId=${encodeURIComponent(userId)}`);
      availableSemesters = (await r.json()).semesters || [];
    } catch (e) { availableSemesters = []; }
    if (currentView === 'settings') renderSettingsView();
  }
}

function switchSubject(index) {
  activeSubjectIndex = index;
  // 既存チャート破棄
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
  renderApp();
}

function toggleSession(sessionNumber) {
  const subject = dashboardData.subjects[activeSubjectIndex];
  const session = subject.sessions.find(s => s.sessionNumber === sessionNumber);
  const detailEl = document.getElementById(`detail-${sessionNumber}`);
  const itemEl = document.getElementById(`session-${sessionNumber}`);

  const isOpen = detailEl.classList.contains('open');

  if (isOpen) {
    detailEl.classList.remove('open');
    itemEl.classList.remove('expanded');
    if (chartInstances[`session-${sessionNumber}`]) {
      chartInstances[`session-${sessionNumber}`].destroy();
      delete chartInstances[`session-${sessionNumber}`];
    }
  } else {
    detailEl.classList.add('open');
    itemEl.classList.add('expanded');
    requestAnimationFrame(() => {
      drawTimelineChart(`sessionChart-${sessionNumber}`, session.timeline, `session-${sessionNumber}`);
    });
  }
}

function addOneHour(t) {
  const [h, m] = t.split(':').map(Number);
  return `${String(h + 1).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function buildExamTimetableHTML(exams) {
  if (!exams || exams.length === 0) return '';
  const sortedDates = [...new Set(exams.map(e => e.examDate))].sort();
  const cellMap = {};
  exams.forEach(e => { cellMap[`${e.examDate}_${e.startTime || ''}`] = e; });
  const startTimes = [...new Set(exams.map(e => e.startTime || '').filter(Boolean))].sort();
  if (startTimes.length === 0) return '';
  const DAYS = ['日','月','火','水','木','金','土'];
  function fmtD(d) {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getMonth()+1}/${dt.getDate()}（${DAYS[dt.getDay()]}）`;
  }
  const STRONG = '2px solid var(--border)';
  const hBg = 'var(--surface2)';
  const dateHeaders = sortedDates.map(d =>
    `<th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;white-space:nowrap;font-weight:600;color:var(--text-dim)">${fmtD(d)}</th>`
  ).join('');
  const bodyRows = startTimes.map(st => {
    const cells = sortedDates.map(d => {
      const e = cellMap[`${d}_${st}`];
      if (!e) return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px"></td>`;
      return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px">
        <div style="font-size:10px;font-weight:600;line-height:1.4;color:var(--text)">${e.subjectName}</div>
      </td>`;
    }).join('');
    return `<tr>
      <td style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;font-weight:700;border-right:${STRONG};white-space:nowrap;color:var(--text-dim)">${st}〜${addOneHour(st)}</td>
      ${cells}
    </tr>`;
  }).join('');
  return `
    <div style="margin:0 20px 16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:6px">試験時間割</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;color:var(--text-muted);border-right:${STRONG};border-bottom:${STRONG};white-space:nowrap">時刻</th>
            ${dateHeaders}
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`;
}

function formatDuration(min) {
  if (min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `${h}時間` : `${h}時間${m}分`;
}

// ===== チャート描画 =====
const CHART_DEFAULTS = {
  plugins: { legend: { display: false } },
  scales: {
    x: {
      grid: { color: 'rgba(0,0,0,0.05)' },
      ticks: { color: '#8a7a68', font: { size: 10 } },
    },
    y: {
      min: 0, max: 100,
      grid: { color: 'rgba(0,0,0,0.05)' },
      ticks: { color: '#8a7a68', font: { size: 10 }, stepSize: 25 },
    },
  },
  animation: { duration: 600, easing: 'easeOutCubic' },
  responsive: true,
  maintainAspectRatio: false,
};

function drawTimelineChart(canvasId, timeline, instanceKey) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const key = instanceKey || canvasId;
  if (chartInstances[key]) chartInstances[key].destroy();

  // 情報パネルをcanvasの後に挿入（なければ作成）
  const infoId = `${canvasId}-info`;
  let infoEl = document.getElementById(infoId);
  if (!infoEl) {
    infoEl = document.createElement('div');
    infoEl.id = infoId;
    infoEl.className = 'chart-point-info';
    canvas.parentNode.appendChild(infoEl);
  } else {
    infoEl.className = 'chart-point-info'; // open クラスをリセット
  }

  const points = timeline.map(t => ({
    x: t.minutesElapsed,
    y: t.concentrationScore,
    accuracyScore: t.accuracyScore,
    responseTimeSec: t.responseTimeSec,
    questionText: t.questionText || '',
    modelAnswer: t.modelAnswer || '',
    answerText: t.answerText || '',
  }));

  function showPointInfo(idx) {
    const pt = points[idx];
    if (!pt) return;
    infoEl.style.display = 'block';
    infoEl.innerHTML = `
      <div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:4px">問${idx + 1}（${pt.x}分経過）</div>
      ${pt.questionText ? `<div style="color:var(--ink);font-size:13px;margin-bottom:4px;line-height:1.4">${pt.questionText}</div>` : ''}
      ${pt.modelAnswer ? `<div style="color:var(--ink3);font-size:11px;margin-bottom:3px"><span style="font-weight:700">模範解答：</span>${pt.modelAnswer}</div>` : ''}
      <div style="color:var(--ink2);font-size:11px;margin-bottom:6px"><span style="font-weight:700">あなたの回答：</span>${pt.answerText || '未回答'}</div>
      ${(() => {
        const mult = (pt.accuracyScore > 0) ? (pt.y / pt.accuracyScore).toFixed(2) : '—';
        const sec = pt.responseTimeSec != null ? `（${pt.responseTimeSec}秒）` : '';
        return `<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px">
          <span style="background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px">集中度 ${pt.y}</span>
          <span style="font-size:10px;color:var(--ink3)">=</span>
          <span style="background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--ink3);padding:2px 8px;border-radius:4px">正確性 ${pt.accuracyScore ?? '-'}</span>
          <span style="font-size:10px;color:var(--ink3)">×</span>
          <span style="background:var(--surface);border:1px solid var(--border);font-size:11px;color:var(--ink3);padding:2px 8px;border-radius:4px">回答速度 ${mult}${sec}</span>
        </div>`;
      })()}`;
    const chart = chartInstances[key];
    if (chart) {
      chart.data.datasets[0].pointBackgroundColor = points.map((_, i) => i === idx ? '#e65c00' : '#2d5a3d');
      chart.update('none');
    }
  }

  chartInstances[key] = new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [{
        data: points,
        showLine: true,
        borderColor: '#2d5a3d',
        backgroundColor: 'rgba(45,90,61,0.08)',
        pointBackgroundColor: points.map(() => '#2d5a3d'),
        pointRadius: 8,
        pointHoverRadius: 10,
        pointHitRadius: 20,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      onClick(event, elements) {
        if (!elements.length) return;
        showPointInfo(elements[0].index);
      },
      scales: {
        x: {
          type: 'linear', min: 0, max: 90,
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { color: '#8a7a68', font: { size: 10 }, stepSize: 15, callback: v => `${v}分` },
          title: { display: true, text: '経過時間（分）', color: '#8a7a68', font: { size: 10 } },
        },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '集中度', color: '#8a7a68', font: { size: 10 } } },
      },
    },
  });

  // デフォルトで1問目を選択状態に
  showPointInfo(0);
}

function drawHistoryChart(canvasId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const labels = sessions.map(s => `第${s.sessionNumber}回`);
  const scores = sessions.map(s => s.sustainScore);

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s =>
          s >= 70 ? 'rgba(45,90,61,0.75)' :
          s >= 40 ? 'rgba(217,119,6,0.75)' :
                    'rgba(192,57,43,0.75)'
        ),
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '授業回', color: '#8a7a68', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '集中度維持スコア', color: '#8a7a68', font: { size: 10 } } },
      },
    },
  });
}

// ===== 今日・明日の学習セクション =====
function groupStudyItems(items) {
  const map = {};
  items.forEach(item => {
    const key = item.subject + '__' + item.type;
    if (!map[key]) map[key] = { subject: item.subject, type: item.type, sessions: [], totalMin: 0, planIds: [], allDone: true };
    map[key].sessions.push(item.sessionNumber);
    map[key].totalMin += item.durationMin;
    map[key].planIds.push(item.planId);
    if (item.status !== 'done') map[key].allDone = false;
  });
  return Object.values(map);
}

function renderDayRows(groups, withBtn) {
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  return groups.map(g => {
    const nums = g.sessions.sort((a, b) => a - b);
    const numStr = nums.length > 1 ? `第${nums[0]}〜${nums[nums.length - 1]}回` : `第${nums[0]}回`;
    const btn = withBtn
      ? `<button class="today-complete-btn${g.allDone ? ' done' : ''}" ${g.allDone ? 'disabled' : ''}
           onclick="completeTodayGroup(${JSON.stringify(g.planIds)}, this)">
           ${g.allDone ? '完了済み' : '学習済み'}
         </button>`
      : '';
    return `
      <div class="today-item${g.allDone ? ' done' : ''}">
        <div class="today-item-info">
          <div class="today-item-name">${g.subject}</div>
          <div class="today-item-meta">${numStr}　${typeLabel[g.type] || g.type}　${formatDuration(g.totalMin)}</div>
        </div>
        ${btn}
      </div>`;
  }).join('');
}

function renderTodaySection() {
  if (todayStudyItems.length === 0 && tomorrowStudyItems.length === 0) return '';
  const todayGroups    = groupStudyItems(todayStudyItems);
  const tomorrowGroups = groupStudyItems(tomorrowStudyItems);
  const todayTotal    = todayStudyItems.reduce((s, i) => s + i.durationMin, 0);
  const tomorrowTotal = tomorrowStudyItems.reduce((s, i) => s + i.durationMin, 0);

  const todayHTML = todayGroups.length > 0
    ? `<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
         <span>Today</span><span style="font-size:11px;letter-spacing:0;color:var(--text-muted);font-weight:400">計 ${formatDuration(todayTotal)}</span>
       </div>
       ${renderDayRows(todayGroups, true)}`
    : `<div style="font-size:12px;color:var(--text-muted);padding:8px 0">今日の予定はありません</div>`;

  const tomorrowHTML = tomorrowGroups.length > 0
    ? `<div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);font-weight:600;margin-top:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
         <span>Tomorrow</span><span style="font-size:11px;letter-spacing:0;color:var(--text-muted);font-weight:400">計 ${formatDuration(tomorrowTotal)}</span>
       </div>
       ${renderDayRows(tomorrowGroups, false)}`
    : '';

  return `<div class="today-section">${todayHTML}${tomorrowHTML}</div>`;
}

async function completeTodayGroup(planIds, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    for (const planId of planIds) {
      await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
      const item = todayStudyItems.find(i => i.planId === planId);
      if (item) item.status = 'done';
    }
    const card = btn.closest('.today-item');
    if (card) card.classList.add('done');
    btn.classList.add('done'); btn.textContent = '完了済み';
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}

    studyPlanInitData = await res.json();
    studyPlanData = studyPlanInitData.plan || [];
    planTabData = { exams: studyPlanInitData.exams || [], progressBlocks: studyPlanInitData.progressBlocks || {}, quizzes: planTabData?.quizzes || [] };
  } catch (e) {
    studyPlanInitData = null;
  }
  renderStudyPlanView();
}

function closeStudyPlanView() {
  currentView = 'dashboard';
  renderApp();
}

function formatExamDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}

function buildReviewBarChartHTML(exams, progressBlocks, onClickFn) {
  if (!exams || exams.length === 0) return '';
  const maxRemaining = Math.max(1, ...exams.map(e => {
    const p = progressBlocks[e.subjectName];
    return p ? p.remaining : 0;
  }));
  const MAX_H = 80;
  const cols = exams.map(exam => {
    const p = progressBlocks[exam.subjectName];
    const remaining = p ? p.remaining : 0;
    const total = p ? p.attended : 0;
    const barH = remaining > 0 ? Math.max(6, Math.round((remaining / maxRemaining) * MAX_H)) : 0;
    const color = remaining === 0 ? '#4ade80' : remaining >= total ? '#f87171' : '#fb923c';
    const label = exam.subjectName.replace(/[（(][^）)]+[）)]/g, '').slice(0, 6);
    const clickStyle = onClickFn ? `cursor:pointer;-webkit-tap-highlight-color:transparent` : '';
    const clickAttr  = onClickFn ? `onclick="${onClickFn}('${exam.examId}')" role="button" tabindex="0"` : '';
    return `<div ${clickAttr} style="width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;${clickStyle}">
        <div style="height:${MAX_H}px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;width:100%">
          ${barH > 0
            ? `<div style="font-size:9px;font-weight:700;color:var(--text-dim);margin-bottom:2px">${remaining}</div>
               <div style="width:34px;height:${barH}px;background:${color};border-radius:4px 4px 0 0"></div>`
            : `<div style="font-size:11px;color:#4ade80;margin-bottom:4px">✓</div>
               <div style="width:34px;height:3px;background:#4ade80;border-radius:4px 4px 0 0;opacity:0.4"></div>`
          }
        </div>
        <div style="width:52px;height:1px;background:var(--border)"></div>
        <div style="margin-top:5px;font-size:9px;color:var(--text-dim);text-align:center;line-height:1.4;word-break:break-all">${label}</div>
        <div style="font-size:10px;font-weight:600;color:var(--text-muted);margin-top:2px">${remaining}/${total}</div>
      </div>`;
  }).join('');
  return `<div style="margin:8px 20px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 14px 12px;overflow:hidden">
      <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:12px">復習残コマ数</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px">
        <div style="display:flex;gap:6px;min-width:max-content">
          ${cols}
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--text-muted)">
        <span><span style="display:inline-block;width:8px;height:8px;background:#4ade80;border-radius:2px;margin-right:3px;vertical-align:middle"></span>完了</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#fb923c;border-radius:2px;margin-right:3px;vertical-align:middle"></span>途中</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#f87171;border-radius:2px;margin-right:3px;vertical-align:middle"></span>未着手</span>
      </div>
    </div>`;
}

function openExamDetail(examId) {
  selectedExamId = examId;
  renderStudyPlanView();
}

function closeExamDetail() {
  selectedExamId = null;
  renderStudyPlanView();
}

function renderExamDetailHTML(app) {
  const { exams, attendedBySubject, plan, progressBlocks } = studyPlanInitData;
  const exam = exams.find(e => e.examId === selectedExamId);
  if (!exam) { selectedExamId = null; renderStudyPlanView(); return; }

  const entries = (plan || []).filter(e => e.examId === selectedExamId);
  const hasPlan = entries.length > 0;
  const doneCount = entries.filter(e => e.status === 'done').length;
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  const p = progressBlocks[exam.subjectName];
  const attended = attendedBySubject[exam.subjectName] || [];

  const dayMap = {};
  entries.filter(e => e.status === 'pending').forEach(e => {
    dayMap[e.date] = (dayMap[e.date] || 0) + e.durationMin;
  });
  const alertsHTML = Object.entries(dayMap)
    .filter(([, m]) => m > 240)
    .map(([d, m]) => `<div class="plan-alert">⚠️ ${d.slice(5)}：1日${Math.round(m/6)/10}時間必要です</div>`)
    .join('');

  const planItemsHTML = hasPlan
    ? entries.map(e => `
        <div class="plan-item ${e.status === 'done' ? 'done' : ''}" id="plan-${e.planId}">
          <div class="plan-item-date">${e.date.slice(5)}</div>
          <div class="plan-item-info">
            <div class="plan-item-name">第${e.sessionNumber}回授業</div>
            <div class="plan-item-type">${typeLabel[e.type] || e.type}・${formatDuration(e.durationMin)}</div>
          </div>
          <button class="plan-item-btn ${e.status === 'done' ? 'done' : ''}"
            ${e.status === 'done' ? 'disabled' : ''}
            onclick="completePlanItem('${e.planId}', this)">
            ${e.status === 'done' ? '完了' : '学習済み'}
          </button>
        </div>`).join('')
    : `<div style="padding:16px;font-size:13px;color:var(--text-dim);text-align:center">計画を生成してください</div>`;

  const attendedHTML = attended.length > 0
    ? attended.map(n => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">第${n}回</span>`).join(' ')
    : '<span style="font-size:12px;color:var(--text-muted)">まだ参加した授業がありません</span>';

  app.innerHTML = `
    <div class="plan-header">
      <button class="plan-back-btn" onclick="closeExamDetail()">← 一覧へ</button>
      <div style="flex:1;font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Syne',sans-serif">${exam.subjectName}</div>
    </div>
    <div style="padding:12px 20px;background:var(--surface2);border-bottom:1px solid var(--border)">
      <div style="font-size:12px;color:var(--accent3);margin-bottom:4px">試験日: ${formatExamDate(exam.examDate)}　復習: ${exam.reviewMinutes}分/回</div>
      <div style="font-size:12px;color:var(--text-muted)">
        ${p ? `残り <strong style="color:var(--text)">${p.remaining}</strong>コマ / ${p.attended}コマ参加済み　` : ''}
        ${hasPlan ? `${doneCount}/${entries.length}コマ完了` : ''}
      </div>
    </div>
    <div style="padding:10px 20px 8px;display:flex;gap:8px">
      <button onclick="replanExam('${exam.examId}', this)"
        style="flex:1;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-size:13px;font-weight:600;padding:10px;cursor:pointer">
        リプラン
      </button>
      <button onclick="generatePlan('${exam.examId}', event)"
        style="flex:1;background:var(--accent);border:none;border-radius:10px;color:#000;font-size:13px;font-weight:700;padding:10px;cursor:pointer">
        ${hasPlan ? '再生成' : '計画生成'}
      </button>
    </div>
    ${alertsHTML}
    <div style="padding:6px 20px 8px">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">参加済み授業</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${attendedHTML}</div>
    </div>
    <div class="plan-exam-card" style="margin:0 20px 20px">
      <div style="padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text-dim)">学習スケジュール</div>
      </div>
      ${planItemsHTML}
    </div>
    <div class="footer-pad"></div>`;
}

async function replanExam(examId, btn) {
  if (!confirm('この科目の未完了分を今日から再スケジュールしますか？')) return;
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    const r = await fetch(`${GAS_URL}?action=replanStudyForExam&userId=${encodeURIComponent(userId)}&examId=${encodeURIComponent(examId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      const res = await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`);
      const newPlan = (await res.json()).plan || [];
      studyPlanInitData.plan = newPlan;
      renderStudyPlanView();
    } else {
      btn.disabled = false; btn.textContent = 'リプラン';
      alert('エラー: ' + (d.error || '不明'));
    }
  } catch (e) { btn.disabled = false; btn.textContent = 'リプラン'; }
}

function renderStudyPlanView() {
  const app = document.getElementById('app');

  if (selectedExamId && studyPlanInitData) { renderExamDetailHTML(app); return; }

  // ローディング中
  if (!studyPlanInitData) {
    app.innerHTML = `
      <div class="plan-header">
        <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
        <div class="plan-title">定期試験対策</div>
      </div>
      <div class="loading" style="height:50vh"><div class="spinner"></div><div style="font-size:13px;color:var(--text-dim)">読み込み中...</div></div>`;
    return;
  }

  const { grade, semester, exams, progressBlocks } = studyPlanInitData;
  const semLabel = semester === 'spring' ? '春学期' : '秋学期';

  const noExamsHTML = exams.length === 0
    ? '<div style="padding:24px 20px;text-align:center;color:var(--text-dim);font-size:13px">この学期の試験日程は管理者が設定します</div>'
    : '';

  app.innerHTML = `
    <div class="plan-header">
      <button class="plan-back-btn" onclick="closeStudyPlanView()">← 戻る</button>
      <div class="plan-title">定期試験対策</div>
    </div>
    <div style="padding:10px 20px 4px;font-size:12px;color:var(--text-muted)">
      表示中：${grade}年生 ${semLabel}の科目（${exams.length}件）
    </div>
    ${buildReviewBarChartHTML(exams, progressBlocks, 'openExamDetail')}
    ${noExamsHTML}
    ${buildExamTimetableHTML(exams)}
    <div class="footer-pad"></div>
  `;
}

async function generatePlan(examId) {
  const btn = event.target;
  const origText = btn.textContent;
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const r = await fetch(`${GAS_URL}?action=generateStudyPlan&userId=${encodeURIComponent(userId)}&examId=${encodeURIComponent(examId)}&dailyAvailableHours=4`);
    const d = await r.json();
    if (d.success) {
      const newPlan = (await (await fetch(`${GAS_URL}?action=getStudyPlan&userId=${encodeURIComponent(userId)}`)).json()).plan || [];
      if (studyPlanInitData) studyPlanInitData.plan = newPlan;
      studyPlanData = newPlan;
      renderStudyPlanView();
    } else {
      btn.disabled = false; btn.textContent = origText;
      alert('エラー: ' + (d.error || '不明'));
    }
  } catch (e) { btn.disabled = false; btn.textContent = origText; }
}

async function completePlanItem(planId, btn) {
  btn.disabled = true; btn.textContent = '記録中...';
  try {
    const r = await fetch(`${GAS_URL}?action=markStudyComplete&userId=${encodeURIComponent(userId)}&planId=${encodeURIComponent(planId)}`);
    const d = await r.json();
    if (d.success) {
      const el = document.getElementById('plan-' + planId);
      if (el) { el.classList.add('done'); btn.classList.add('done'); btn.textContent = '完了'; }
      if (studyPlanInitData) {
        const item2 = studyPlanInitData.plan.find(i => i.planId === planId);
        if (item2) item2.status = 'done';
      }
      const item = studyPlanData.find(i => i.planId === planId);
      if (item) item.status = 'done';
    } else { btn.disabled = false; btn.textContent = '学習済み'; }
  } catch (e) { btn.disabled = false; btn.textContent = '学習済み'; }
}


function showCancelModal() {
  document.getElementById('cancelModal').classList.add('open');
}
function hideCancelModal() {
  document.getElementById('cancelModal').classList.remove('open');
}
async function confirmCancel() {
  const btn = document.querySelector('.btn-confirm-cancel');
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const res = await fetch(`${GAS_URL}?action=cancelSubscription&userId=${encodeURIComponent(userId)}`);
    const data = await res.json();
    if (data.success) {
      hideCancelModal();
      document.getElementById('app').innerHTML = `
        <div class="error-state" style="padding-top:80px">
          <div class="icon">✅</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px">登録解除完了</div>
          <div style="font-size:13px;color:var(--text-muted)">登録解除が完了しました。<br>ご利用ありがとうございました。</div>
        </div>`;
    } else {
      btn.disabled = false;
      btn.textContent = '登録解除する';
      alert('エラーが発生しました: ' + (data.error || '不明なエラー'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '登録解除する';
    alert('通信エラーが発生しました');
  }
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state" style="padding-top:80px">
      <div class="icon">⚠️</div>
      <div>読み込みに失敗しました</div>
      <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">${msg}</div>
    </div>`;
}

init();

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && userId) {
    const prev = myBillingStatus;
    await fetchNickname(userId);
    if (myBillingStatus !== prev) renderApp();
  }
});
</script>
</body>
</html>
