<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>集中度ダッシュボード</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #5de8b0;
    --accent2: #4da6ff;
    --accent3: #ff6b8a;
    --text: #e8eaf2;
    --text-muted: #5a6080;
    --text-dim: #8890b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    overflow: hidden;
    flex-shrink: 0;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .greeting { font-size: 13px; color: var(--text-dim); }
  .username { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

  .title-block {
    margin: 20px 20px 0;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .title-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .title-main {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
  }

  /* ローディング */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 科目タブ */
  .tabs-wrapper {
    padding: 20px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* サマリーカード */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 20px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.accent1::before { background: var(--accent); }
  .summary-card.accent2::before { background: var(--accent2); }
  .summary-card.accent3::before { background: var(--accent3); }
  .summary-card.accent4::before { background: #ffd666; }

  .summary-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .summary-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .summary-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 3px;
  }

  /* セクション */
  .section {
    padding: 0 20px 20px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* チャート */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .chart-card-title {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .chart-card-title span {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    display: block;
  }

  .chart-wrap {
    position: relative;
    height: 160px;
  }

  /* セッション一覧 */
  .session-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .session-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .session-item.expanded {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .session-item:active { opacity: 0.8; }

  .session-info { flex: 1; }

  .session-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .session-meta {
    font-size: 12px;
    color: var(--text-dim);
  }

  .session-score {
    text-align: right;
  }

  .score-badge {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }

  .score-badge.high { color: var(--accent); }
  .score-badge.mid { color: #ffd666; }
  .score-badge.low { color: var(--accent3); }

  .score-label {
    font-size: 10px;
    color: var(--text-muted);
  }

  /* セッション詳細チャート */
  .session-detail {
    display: none;
    padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .session-detail.open { display: block; }

  .session-detail-wrap {
    position: relative;
    height: 120px;
  }

  /* エラー */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .error-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* フッター余白 */
  .footer-pad { height: 40px; }
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-dim)">読み込み中...</div>
  </div>
</div>

<script>
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec'; // GASデプロイ後のURLを設定
const LIFF_ID = '2009739219-dSnPUVFj';

let userId = null;
let profileData = null;
let dashboardData = null;
let activeSubjectIndex = 0;
const chartInstances = {};

// ===== 初期化 =====
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
    profileData = profile;

    dashboardData = await fetchDashboard(userId);
    renderApp();

  } catch (err) {
    showError(err.message);
  }
}

async function fetchDashboard(uid) {
  const res = await fetch(`${GAS_URL}?action=getDashboard&userId=${encodeURIComponent(uid)}`);
  return await res.json();
}

// ===== レンダリング =====
function renderApp() {
  const app = document.getElementById('app');
  const subjects = dashboardData.subjects || [];

  if (subjects.length === 0) {
    app.innerHTML = `
      <div class="header">
        <div class="header-top">
          <div class="avatar"><img src="${profileData.pictureUrl}" onerror="this.style.display='none'" /></div>
          <div>
            <div class="greeting">こんにちは</div>
            <div class="username">${profileData.displayName}</div>
          </div>
        </div>
      </div>
      <div class="error-state">
        <div class="icon">📚</div>
        <div>まだ回答データがありません</div>
        <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">授業で問題に回答すると<br>ここに集中度が表示されます</div>
      </div>`;
    return;
  }

  const subject = subjects[activeSubjectIndex];
  const allSessions = subject.sessions;
  const avgScore = subject.averageScore;

  // 全セッション平均の時系列（最新セッション）
  const latestSession = allSessions[allSessions.length - 1];

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="avatar"><img src="${profileData.pictureUrl}" onerror="this.style.display='none'" /></div>
        <div>
          <div class="greeting">こんにちは</div>
          <div class="username">${profileData.displayName}</div>
        </div>
      </div>
      <div class="title-block">
        <div class="title-label">Concentration Monitor</div>
        <div class="title-main">集中度<br>ダッシュボード</div>
      </div>
    </div>

    <div class="tabs-wrapper">
      <div class="tabs">
        ${subjects.map((s, i) => `
          <button class="tab ${i === activeSubjectIndex ? 'active' : ''}" onclick="switchSubject(${i})">${s.name}</button>
        `).join('')}
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card accent1">
        <div class="summary-label">総合スコア</div>
        <div class="summary-value">${avgScore}<span class="summary-unit">点</span></div>
      </div>
      <div class="summary-card accent2">
        <div class="summary-label">回答数</div>
        <div class="summary-value">${subject.totalAnswers}<span class="summary-unit">問</span></div>
      </div>
      <div class="summary-card accent3">
        <div class="summary-label">授業回数</div>
        <div class="summary-value">${allSessions.length}<span class="summary-unit">回</span></div>
      </div>
      <div class="summary-card accent4">
        <div class="summary-label">最新スコア</div>
        <div class="summary-value">${latestSession ? latestSession.averageScore : '-'}<span class="summary-unit">点</span></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">最新授業の集中度推移</div>
      ${latestSession ? `
        <div class="chart-card">
          <div class="chart-card-title">
            <span>第${latestSession.sessionNumber}回授業</span>
            授業経過時間ごとの集中度
          </div>
          <div class="chart-wrap">
            <canvas id="latestChart"></canvas>
          </div>
        </div>
      ` : ''}
    </div>

    <div class="section">
      <div class="section-title">授業別スコア履歴</div>
      <div class="chart-card">
        <div class="chart-card-title">
          <span>${subject.name}</span>
          授業回ごとの平均集中度
        </div>
        <div class="chart-wrap">
          <canvas id="historyChart"></canvas>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">授業詳細</div>
      <div class="session-list" id="sessionList">
        ${allSessions.slice().reverse().map(s => `
          <div class="session-item" id="session-${s.sessionNumber}" onclick="toggleSession(${s.sessionNumber})">
            <div class="session-info">
              <div class="session-name">第${s.sessionNumber}回授業</div>
              <div class="session-meta">${s.timeline.length}問回答</div>
            </div>
            <div class="session-score">
              <div class="score-badge ${s.averageScore >= 70 ? 'high' : s.averageScore >= 40 ? 'mid' : 'low'}">${s.averageScore}</div>
              <div class="score-label">平均点</div>
            </div>
            <div class="session-detail" id="detail-${s.sessionNumber}">
              <div class="session-detail-wrap">
                <canvas id="sessionChart-${s.sessionNumber}"></canvas>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="footer-pad"></div>
  `;

  // チャート描画
  requestAnimationFrame(() => {
    if (latestSession) drawTimelineChart('latestChart', latestSession.timeline);
    drawHistoryChart('historyChart', allSessions);
  });
}

function switchSubject(index) {
  activeSubjectIndex = index;
  // 既存チャート破棄
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
  renderApp();
}

function toggleSession(sessionNumber) {
  const subject = dashboardData.subjects[activeSubjectIndex];
  const session = subject.sessions.find(s => s.sessionNumber === sessionNumber);
  const detailEl = document.getElementById(`detail-${sessionNumber}`);
  const itemEl = document.getElementById(`session-${sessionNumber}`);

  const isOpen = detailEl.classList.contains('open');

  if (isOpen) {
    detailEl.classList.remove('open');
    itemEl.classList.remove('expanded');
    if (chartInstances[`session-${sessionNumber}`]) {
      chartInstances[`session-${sessionNumber}`].destroy();
      delete chartInstances[`session-${sessionNumber}`];
    }
  } else {
    detailEl.classList.add('open');
    itemEl.classList.add('expanded');
    requestAnimationFrame(() => {
      drawTimelineChart(`sessionChart-${sessionNumber}`, session.timeline, `session-${sessionNumber}`);
    });
  }
}

// ===== チャート描画 =====
const CHART_DEFAULTS = {
  plugins: { legend: { display: false } },
  scales: {
    x: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 } },
    },
    y: {
      min: 0, max: 100,
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5a6080', font: { size: 10 }, stepSize: 25 },
    },
  },
  animation: { duration: 600, easing: 'easeOutCubic' },
  responsive: true,
  maintainAspectRatio: false,
};

function drawTimelineChart(canvasId, timeline, instanceKey) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const key = instanceKey || canvasId;
  if (chartInstances[key]) chartInstances[key].destroy();

  const labels = timeline.map(t => `${t.minutesElapsed}分`);
  const scores = timeline.map(t => t.concentrationScore);

  chartInstances[key] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: scores,
        borderColor: '#5de8b0',
        backgroundColor: 'rgba(93,232,176,0.08)',
        pointBackgroundColor: '#5de8b0',
        pointRadius: 4,
        pointHoverRadius: 6,
        borderWidth: 2,
        fill: true,
        tension: 0.4,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '経過時間', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '集中度', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

function drawHistoryChart(canvasId, sessions) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const labels = sessions.map(s => `第${s.sessionNumber}回`);
  const scores = sessions.map(s => s.averageScore);

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s =>
          s >= 70 ? 'rgba(93,232,176,0.7)' :
          s >= 40 ? 'rgba(255,214,102,0.7)' :
                    'rgba(255,107,138,0.7)'
        ),
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        x: { ...CHART_DEFAULTS.scales.x, title: { display: true, text: '授業回', color: '#5a6080', font: { size: 10 } } },
        y: { ...CHART_DEFAULTS.scales.y, title: { display: true, text: '平均集中度', color: '#5a6080', font: { size: 10 } } },
      },
    },
  });
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state" style="padding-top:80px">
      <div class="icon">⚠️</div>
      <div>読み込みに失敗しました</div>
      <div style="font-size:12px;margin-top:8px;color:var(--text-muted)">${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>
