<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>授業管理</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
        --bg: #f5f0e8;
        --surface: #ffffff;
        --surface2: #faf7f2;
        --border: #e0d8cc;
        --ink: #1a1208;
        --ink2: #4a3f2f;
        --ink3: #8a7a68;
        --accent: #2d5a3d;
        --accent-light: #e8f2eb;
        --danger: #8b2020;
        --danger-light: #fdeaea;
        --warning: #7a5a10;
        --warning-light: #fef8e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Noto Sans JP', sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        padding-bottom: 40px;
    }
    .header {
        background: var(--accent);
        color: white;
        padding: 16px 20px 12px;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .header-label { font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }
    .header-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; }

    .semester-bar {
        background: var(--warning-light);
        border-bottom: 1px solid #e8d89a;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .semester-info {
        flex: 1;
        font-size: 13px;
        color: var(--warning);
        font-weight: 500;
    }
    .semester-info strong { font-weight: 700; }
    .btn-semester-change {
        padding: 5px 12px;
        background: var(--warning);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 500;
        cursor: pointer;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 100;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
        background: var(--surface);
        border-radius: 16px;
        padding: 24px 20px;
        width: calc(100% - 40px);
        max-width: 360px;
    }
    .modal-title {
        font-family: 'Kaisei Tokumin', serif;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 12px; color: var(--ink3); margin-bottom: 6px; }
    .modal-select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px;
        background: var(--surface2);
        color: var(--ink);
        -webkit-appearance: none;
        appearance: none;
        box-sizing: border-box;
        min-height: 44px;
        text-align: center;
        text-align-last: center;
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .modal-btn-cancel {
        flex: 1; padding: 12px; border: 1.5px solid var(--border);
        background: var(--surface); border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
        color: var(--ink2); cursor: pointer;
    }
    .modal-btn-save {
        flex: 1; padding: 12px; border: none;
        background: var(--accent); border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
        color: white; font-weight: 700; cursor: pointer;
    }

    .status-bar {
        display: flex; align-items: center; gap: 10px;
        background: var(--surface); margin: 12px 16px;
        padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
        transition: background 0.3s, border-color 0.3s;
    }
    .status-bar.active-session {
        background: rgba(34,197,94,0.1);
        border-color: rgba(34,197,94,0.4);
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.active  { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    .status-dot.inactive { background: var(--ink3); }
    .status-text { font-size: 13px; color: var(--ink2); flex: 1; line-height: 1.4; }

    .section { margin: 0 16px 12px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-left: 2px; }
    .section-num {
        width: 24px; height: 24px; border-radius: 50%;
        background: var(--accent); color: white;
        font-size: 12px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
    }
    .section-title { font-size: 14px; font-weight: 700; color: var(--ink2); }
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .disabled-section { opacity: 0.4; pointer-events: none; }

    .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
    .day-btn {
        padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .day-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
    .subject-btn {
        padding: 12px 8px; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 12px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; text-align: center; line-height: 1.3;
    }
    .subject-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

    .session-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
    .session-btn {
        aspect-ratio: 1; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .session-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

    .action-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .btn-start { background: var(--accent); color: white; }
    .btn-start:disabled { background: var(--border); color: var(--ink3); cursor: not-allowed; }
    .btn-end { background: var(--danger); color: white; }
    .btn-question { background: var(--ink); color: white; }

    .form-field { padding: 0 14px; }
    .form-label { font-size: 12px; color: var(--ink3); margin-bottom: 6px; }
    .form-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; background: var(--surface2); color: var(--ink); resize: vertical; line-height: 1.5; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--ink); color: white; padding: 12px 20px;
        border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 200;
        transition: transform 0.3s ease; white-space: nowrap; max-width: calc(100% - 40px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .admin-rank-row { display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer; }
    .admin-rank-row:last-child { border-bottom:none; }
    .admin-rank-row:active { opacity:0.7; }
    .admin-rank-row.me { background:var(--accent-light); }
    .admin-rank-num { font-weight:800;font-size:15px;width:22px;text-align:center;flex-shrink:0;color:var(--ink3); }
    .admin-rank-num.gold { color:#c49a00; } .admin-rank-num.silver { color:#7a8a99; } .admin-rank-num.bronze { color:#9b6b3a; }
    .admin-rank-avatar { width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--surface2);flex-shrink:0; }
    .admin-rank-info { flex:1;min-width:0; }
    .admin-rank-name { font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .admin-rank-line { font-size:10px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px; }
    .admin-rank-answer { font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px; }
    .admin-rank-scores { display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:2px; }
    .admin-rank-main { font-weight:800;font-size:16px; }
    .admin-rank-sub { font-size:10px;color:var(--ink3); }
    .student-line { font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

    /* 学生詳細パネル */
    .student-panel-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end; }
    .student-panel-overlay.open { display:flex; }
    .student-panel { background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto; }
    .student-panel-header { display:flex;align-items:center;gap:10px;margin-bottom:16px; }
    .student-panel-avatar { width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--surface2);flex-shrink:0; }
    .student-panel-avatar img { width:100%;height:100%;object-fit:cover; }
    .student-panel-name { font-size:15px;font-weight:700;flex:1; }
    .student-panel-close { background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer; }

    /* マイページセレクター */
    .mypage-selector-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end; }
    .mypage-selector-overlay.open { display:flex; }
    .mypage-selector-sheet { background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto; }
    .mypage-selector-title { font-family:'Kaisei Tokumin',serif;font-size:16px;font-weight:700;margin-bottom:14px; }
    .mypage-student-row { display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer; }
    .mypage-student-row:active { background:var(--surface2); }
    .mypage-student-avatar { width:34px;height:34px;border-radius:50%;background:var(--surface2);flex-shrink:0;object-fit:cover; }
    .tab-nav { display: flex; background: var(--accent); border-top: 1px solid rgba(255,255,255,0.15); }
    .tab-btn { flex: 1; padding: 10px 4px; background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab-btn.active { color: white; border-bottom-color: white; font-weight: 700; }

    .student-list { padding: 8px 16px 40px; }
    .student-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
    .student-item:active { opacity: 0.7; }
    .student-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .student-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .student-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .student-score { font-size: 20px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .student-score.mid { color: var(--warning); }
    .student-score.low { color: var(--danger); }

    .detail-header { display: flex; align-items: center; gap: 4px; padding: 8px 16px 0; }
    .back-btn { background: none; border: none; font-size: 13px; color: var(--ink2); cursor: pointer; padding: 8px 4px; display: flex; align-items: center; gap: 4px; }
    .detail-name { font-size: 15px; font-weight: 700; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--ink3); }

    .popup-overlay { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
    .popup-overlay.open { display: block; }
    .popup-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 55vh; overflow-y: auto; }
    .popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
    .popup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .popup-stat { border-radius: 10px; padding: 10px; text-align: center; }
    .popup-stat-label { font-size: 10px; margin-bottom: 2px; }
    .popup-stat-value { font-size: 18px; font-weight: 700; }
    .chart-container { padding: 12px 16px; height: 240px; position: relative; }
    </style>
  </head>
  <body>
    <div id="app">読み込み中...</div>
    <div id="toast" class="toast"></div>

    <div id="studentPanelOverlay" class="student-panel-overlay" onclick="closeStudentDetailPanel(event)">
      <div class="student-panel" onclick="event.stopPropagation()">
        <div class="student-panel-header">
          <div class="student-panel-avatar"><img id="studentPanelAvatar" src="" onerror="this.style.display='none'" /></div>
          <div class="flex-col" style="flex:1;min-width:0">
            <div class="student-panel-name" id="studentPanelName"></div>
            <div class="student-line" id="studentPanelLine"></div>
          </div>
          <button class="student-panel-close" onclick="closeStudentDetailPanel()">✕</button>
        </div>
        <div id="studentPanelContent"><div class="empty-state">読み込み中...</div></div>
      </div>
    </div>

    <div id="pointDetailPopup" class="popup-overlay">
      <div class="popup-sheet">
        <button class="popup-close" onclick="closePointDetail()">✕</button>
        <div style="font-family:'Kaisei Tokumin',serif;font-size:16px;font-weight:700;margin-bottom:16px">回答詳細</div>
        <div id="pointDetailContent"></div>
        <div id="pointDetailActions" style="display:flex;flex-direction:column;gap:8px;margin-top:16px"></div>
      </div>
    </div>

    <div id="rescoreModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-title">模範解答を修正して再採点</div>
        <div style="font-size:12px;color:var(--ink3);margin-bottom:10px">修正後の模範解答を入力してください。全学生の該当回答をGPTで再採点し、LINEで通知します。</div>
        <textarea id="rescoreInput" style="width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;resize:vertical;box-sizing:border-box"></textarea>
        <div class="modal-btns" style="margin-top:14px">
          <button class="modal-btn-cancel" onclick="closeRescoreModal()">キャンセル</button>
          <button class="modal-btn-save" onclick="submitRescore()">再採点する</button>
        </div>
      </div>
    </div>

    <div id="pauseModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-title" style="color:var(--warning)">授業に集中させる</div>
            <div style="font-size:14px;line-height:1.6;color:var(--ink2);margin-bottom:20px">
                このサービスを使っている余裕がないので、問題配信はしません。授業に集中させます。
            </div>
            <div class="modal-btns">
                <button class="modal-btn-cancel" onclick="closePauseModal()">キャンセル</button>
                <button class="modal-btn-save" style="background:var(--warning)" onclick="confirmPause()">確認</button>
            </div>
        </div>
    </div>

    <div id="myPageSelectorOverlay" class="mypage-selector-overlay" onclick="closeMyPageSelector(event)">
      <div class="mypage-selector-sheet" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="mypage-selector-title">マイページを表示</div>
          <button onclick="closeMyPageSelector()" style="background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer">✕</button>
        </div>
        <div id="myPageStudentList"><div class="empty-state">読み込み中...</div></div>
      </div>
    </div>

    <script>
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec';
      const LIFF_ID = '2009739219-9qVGb0Xm';

      let SUBJECTS = [];
      function addOneHour(t) {
        const [h, m] = t.split(':').map(Number);
        return `${String(h + 1).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      }
      let activeSemester = { grade: 4, semester: 'spring' };
      let selectedDay     = null;
      let selectedSubject = null;
      let selectedSession = null;
      let isSessionActive  = false;
      let activeSessionInfo = null;
      let isDeliveryPaused = false;

      // ランキング
      let adminCurrentQuestionId = null;
      let adminCurrentQuestionText = null;
      let adminCurrentModelAnswer = null;
      let adminRankingTimer = null;
      let lastEndedSessionId = null;

      // マイページセレクター
      let myPageSelectorStudents = [];

      // 自動終了タイマー
      let autoEndTimer = null;
      function scheduleAutoEnd(sessionStartTimeEpoch) {
          clearAutoEndTimer();
          const endAt = sessionStartTimeEpoch + 90 * 60 * 1000;
          const remaining = endAt - Date.now();
          if (remaining > 0) {
              autoEndTimer = setTimeout(endSession, remaining);
          } else {
              endSession();
          }
      }
      function clearAutoEndTimer() {
          if (autoEndTimer) { clearTimeout(autoEndTimer); autoEndTimer = null; }
      }

      // ダッシュボード用
      let activeTab = 'session';
      let studentListData = null;
      let selectedStudentId = null;
      let selectedSessionId = null;
      let studentSessionsData = null;
      let sessionDetailData = null;
      let adminSubjectOpen = null;
      let adminChart = null;
      let billingListData = null;

      let dashboardFilter = null;
      const FILTER_KEY = 'dashboardFilter';
      let sessionSemesterEditing = false;

      const _busy = new Set();
      async function guardedAction(key, fn) {
        if (_busy.has(key)) return;
        _busy.add(key);
        try { await fn(); } finally { _busy.delete(key); }
      }

      async function checkVersion() {
          try {
              const r = await fetch('version.json?_=' + Date.now(), { cache: 'no-store' });
              const { v } = await r.json();
              const stored = localStorage.getItem('appVersion');
              localStorage.setItem('appVersion', v);
              if (stored && stored !== v) {
                  const url = new URL(location.href);
                  url.searchParams.set('_', Date.now());
                  location.replace(url.toString());
                  return false;
              }
          } catch (e) {}
          return true;
      }

      async function init() {
          if (!await checkVersion()) return;
          try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                // localStorageからフィルタ復元（アプリを閉じても保持）
                const saved = localStorage.getItem(FILTER_KEY);
                if (saved) {
                    try { dashboardFilter = JSON.parse(saved); } catch (e) { dashboardFilter = null; }
                }

                // 1リクエストで全初期データ取得（30秒タイムアウト）
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);
                const res = await fetch(`${GAS_URL}?action=getInitData`, { signal: controller.signal });
                clearTimeout(timeout);
                const data = await res.json();
                SUBJECTS          = data.subjects || [];
                activeSemester    = data.semesterData || { grade: 4, semester: 'spring' };
                const session     = data.activeSession || {};
                isSessionActive   = session.isActive || false;
                activeSessionInfo = session.session || null;
                isDeliveryPaused  = session.isPaused || false;
                adminCurrentQuestionId = (activeSessionInfo && activeSessionInfo.currentQuestionId) || null;

                // フィルタ未設定の場合はactiveSemesterを自動適用
                if (!dashboardFilter) {
                    dashboardFilter = { grade: activeSemester.grade, semester: activeSemester.semester };
                    localStorage.setItem(FILTER_KEY, JSON.stringify(dashboardFilter));
                }
                // 最終終了セッションをlocalStorageから復元
                if (!isSessionActive) lastEndedSessionId = localStorage.getItem('lastEndedSessionId') || null;
                renderApp();
                if (!isSessionActive && lastEndedSessionId) fetchAndShowSessionRanking(lastEndedSessionId);
                if (isSessionActive) {
                    startAdminRankingPoll();
                    if (activeSessionInfo && activeSessionInfo.sessionStartTimeEpoch) {
                        scheduleAutoEnd(activeSessionInfo.sessionStartTimeEpoch);
                    }
                }
          } catch (err) {
                showError(err.message);
          }
      }

      function semesterLabel(sem) {
          return sem === 'spring' ? '春学期' : '秋学期';
      }

      async function softRefresh() {
          try {
              const res = await fetch(`${GAS_URL}?action=getInitData`);
              const data = await res.json();
              SUBJECTS          = data.subjects || [];
              activeSemester    = data.semesterData || activeSemester;
              const session     = data.activeSession || {};
              isSessionActive   = session.isActive || false;
              activeSessionInfo = session.session || null;
              isDeliveryPaused  = session.isPaused || false;
              adminCurrentQuestionId = (activeSessionInfo && activeSessionInfo.currentQuestionId) || null;
              if (!isSessionActive) {
                  stopAdminRankingPoll();
                  lastEndedSessionId = localStorage.getItem('lastEndedSessionId') || null;
              } else {
                  startAdminRankingPoll();
              }
              // タブ依存データをリセットして再取得
              studentListData = null;
              billingListData = null;
              examListData = null;
              selectedStudentId = null;
              studentSessionsData = null;
              selectedSessionId = null;
              sessionDetailData = null;

              if (!isSessionActive && lastEndedSessionId) fetchAndShowSessionRanking(lastEndedSessionId);

      function renderAdminRankingSection() {
        if (!adminCurrentQuestionId) {
          return isSessionActive
            ? '<div style="padding:14px;font-size:13px;color:var(--ink3);text-align:center">問題が出題されると回答状況が表示されます</div>'
            : '';

        if (!el) return '<div id="adminRankingSection" style="padding:14px;font-size:13px;color:var(--ink3);text-align:center">読み込み中...</div>';
        return el.outerHTML;
      }

      async function pollAdminRanking() {
        if (!adminCurrentQuestionId) return;
        try {
          const r = await fetch(`${GAS_URL}?action=getQuestionRanking&questionId=${encodeURIComponent(adminCurrentQuestionId)}`);
          const d = await r.json();
          adminCurrentQuestionText = d.currentQuestionText || adminCurrentQuestionText;
          adminCurrentModelAnswer  = d.currentModelAnswer  || adminCurrentModelAnswer;
          const el = document.getElementById('adminRankingSection');
          if (!el) return;
          const rows = (d.ranking || []);
          const qHtml = adminCurrentQuestionText ? `
            <div style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2)">
              <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">出題中の問題</div>
              <div style="font-size:13px;line-height:1.5;margin-bottom:6px">${adminCurrentQuestionText}</div>
              ${adminCurrentModelAnswer ? `<div style="font-size:10px;color:var(--ink3);margin-bottom:2px">模範解答</div><div style="font-size:12px;color:var(--ink2);line-height:1.4">${adminCurrentModelAnswer}</div>` : ''}
            </div>` : '';
          el.innerHTML = qHtml + (rows.length > 0
            ? rows.map(buildAdminRankRowHTML).join('')
            : '<div style="padding:14px;font-size:13px;color:var(--ink3);text-align:center">まだ誰も回答していません</div>');
        } catch (e) {}
      }

      function startAdminRankingPoll() {
        if (adminRankingTimer) clearInterval(adminRankingTimer);
        pollAdminRanking();
        adminRankingTimer = setInterval(pollAdminRanking, 5000);
      }

      function stopAdminRankingPoll() {
        if (adminRankingTimer) { clearInterval(adminRankingTimer); adminRankingTimer = null; }
      }

      async function fetchAndShowSessionRanking(sessionId) {
        try {
          const r = await fetch(`${GAS_URL}?action=getSessionRanking&sessionId=${encodeURIComponent(sessionId)}`);
          const d = await r.json();
          const el = document.getElementById('adminRankingSection');
          if (!el) return;
          const rows = d.ranking || [];
          el.innerHTML = rows.length > 0
            ? rows.map(item => buildAdminSessionRankRowHTML(item, sessionId)).join('')
            : '<div style="padding:14px;font-size:13px;color:var(--ink3);text-align:center">回答データがありません</div>';
        } catch (e) {}
      }

      async function openStudentDetailPanel(userId, sessionId) {
        const overlay = document.getElementById('studentPanelOverlay');
        const content = document.getElementById('studentPanelContent');
        const nameEl  = document.getElementById('studentPanelName');
        const lineEl  = document.getElementById('studentPanelLine');
        const avatarEl = document.getElementById('studentPanelAvatar');

        const student = studentListData && studentListData.students
          ? studentListData.students.find(s => s.userId === userId) : null;
        if (student) {
          nameEl.textContent  = student.displayName || '学生';
          lineEl.textContent  = '';
          avatarEl.src        = student.avatarUrl || '';
        } else {
          nameEl.textContent = '学生';
          lineEl.textContent = '';
          avatarEl.src = '';
        }
        content.innerHTML = '<div class="empty-state">読み込み中...</div>';
        overlay.classList.add('open');

        if (!sessionId) { content.innerHTML = '<div class="empty-state">セッションIDが不明です</div>'; return; }

        function drawPanelChart(answers) {
          content.innerHTML = `<div style="position:relative;height:220px;padding:8px 0"><canvas id="studentPanelChart"></canvas></div>`;
          setTimeout(() => {
            const ctx = document.getElementById('studentPanelChart');
            if (!ctx) return;
            new Chart(ctx, {
              type: 'line',
              data: { datasets: [{ data: answers.map(a => ({ x: a.minutesElapsed, y: a.concentrationScore })), borderColor: '#1a6bbd', backgroundColor: 'rgba(26,107,189,0.1)', pointRadius: 5, pointHoverRadius: 7, tension: 0.3, fill: true }] },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                  x: { type: 'linear', min: 0, max: 90, ticks: { color: '#888', font: { size: 10 }, stepSize: 15, callback: v => `${v}分` } },
                  y: { min: 0, max: 100, ticks: { color: '#888', font: { size: 10 }, stepSize: 25 } }
                }
              }
            });
          }, 100);
        }

        async function fallbackToDashboard() {
          try {
            const dr = await fetch(`${GAS_URL}?action=getDashboard&userId=${encodeURIComponent(userId)}`);
            const dd = await dr.json();
            const subjects = (dd && dd.subjects) || [];
            let timeline = null;
            for (const subj of subjects) {
              if (activeSessionInfo && subj.name === activeSessionInfo.subject) {
                const sess = (subj.sessions || []).find(s => s.sessionNumber === activeSessionInfo.sessionNumber);
                if (sess && sess.timeline && sess.timeline.length > 0) { timeline = sess.timeline; break; }
              }
            }
            if (!timeline) {
              for (const subj of subjects) {
                for (const sess of (subj.sessions || [])) {
                  if (sess.timeline && sess.timeline.length > 0) { timeline = sess.timeline; break; }
                }
                if (timeline) break;
              }
            }
            if (timeline && timeline.length > 0) {
              drawPanelChart(timeline);
            } else {
              content.innerHTML = '<div class="empty-state">この授業の回答データがありません</div>';
            }
          } catch (e) {
            content.innerHTML = '<div class="empty-state">データ取得失敗</div>';
          }
        }

        try {

      async function switchTab(tab) {
          activeTab = tab;
          document.getElementById('pointDetailPopup').classList.remove('open');
          if (tab === 'session' && isSessionActive) startAdminRankingPoll();
          else if (tab === 'session' && lastEndedSessionId) fetchAndShowSessionRanking(lastEndedSessionId);
          else stopAdminRankingPoll();
          if (tab === 'exam') {
              if (!examListData) {
                  renderLoadingScreen('exam');
                  try {
                      const res = await fetch(`${GAS_URL}?action=getExamSchedule`);
                      examListData = await res.json();
                  } catch (err) {
                      showToast('❌ データ取得失敗');
                      activeTab = 'session';
                  }
              }
              renderApp();
              return;
          }
          if (tab === 'billing') {
              if (!billingListData) {
                  renderLoadingScreen('billing');
                  try {
                      const res = await fetch(`${GAS_URL}?action=getAdminStudentListWithBilling`);
                      const data = await res.json();
                      if (!data.students) throw new Error(data.error || 'students undefined');
                      billingListData = data;
                  } catch (err) {
                      showToast('❌ データ取得失敗: ' + err.message);
                      activeTab = 'session';
                  }
              }
              renderApp();
              return;
          }
          if (tab === 'dashboard') {
              // フィルタが未確定の場合はフィルタ選択画面を表示（データ取得不要）
              if (!dashboardFilter) {
                  selectedStudentId = null;
                  selectedSessionId = null;
                  studentSessionsData = null;
                  sessionDetailData = null;
                  studentListData = null;
                  if (adminChart) { adminChart.destroy(); adminChart = null; }
                  renderApp();
                  return;
              }
              // フィルタ確定済みでデータ未取得の場合は取得
              if (!studentListData) {
                  renderLoadingScreen('dashboard');
                  try {
                      const url = `${GAS_URL}?action=getStudentsByGradeAndSemester&grade=${dashboardFilter.grade}&semester=${encodeURIComponent(dashboardFilter.semester)}`;
                      const res = await fetch(url);
                      studentListData = await res.json();
                  } catch (err) {
                      showToast('❌ データ取得失敗');
                      activeTab = 'session';
                      renderApp();
                      return;
                  }
              }
          }
          selectedStudentId = null;
          selectedSessionId = null;
          studentSessionsData = null;
          sessionDetailData = null;
          if (adminChart) { adminChart.destroy(); adminChart = null; }
          renderApp();
      }

      function renderStudentSessionsHTML() {
          const student = studentListData.students.find(s => s.userId === selectedStudentId);
          const name = student ? (student.displayName || '名前なし') : '学生';

          if (!studentSessionsData) {
              return `

          }

          const sessions = studentSessionsData.sessions || [];
          const subjectMap = {};
          sessions.forEach(s => {
              if (!subjectMap[s.subject]) subjectMap[s.subject] = { sessions: [], latestAnswerAt: 0 };
              subjectMap[s.subject].sessions.push(s);
              if ((s.latestAnswerAt || 0) > subjectMap[s.subject].latestAnswerAt)
                  subjectMap[s.subject].latestAnswerAt = s.latestAnswerAt || 0;
          });

          const subjEntries = Object.entries(subjectMap)
              .sort(([, a], [, b]) => b.latestAnswerAt - a.latestAnswerAt);

          const listHTML = sessions.length === 0
              ? '<div class="empty-state">授業データがありません</div>'
              : subjEntries.map(([subj, data], idx) => {
                  const isOpen = adminSubjectOpen === idx;
                  const latestScore = data.sessions.length > 0 ? data.sessions[data.sessions.length - 1].sustainScore : 0;
                  const sessionRows = isOpen ? data.sessions.slice().reverse().map(s => `
                      <div style="border-top:1px solid var(--border)">
                          <div class="student-item" onclick="showSessionDetail('${s.sessionId}')" style="margin:0;border-radius:0;border:none;background:transparent">
                              <div class="student-info">
                                  <div class="student-name">第${s.sessionNumber}回</div>
                                  <div class="student-meta">${s.answerCount}問回答</div>
                              </div>
                              <div class="student-score ${scoreClass(s.sustainScore)}">${s.sustainScore}</div>
                          </div>
                      </div>`).join('') : '';
                  return `
                      <div style="margin:0 0 8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
                          <div onclick="toggleAdminSubject(${idx})" style="display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer">
                              <div style="flex:1">
                                  <div style="font-size:14px;font-weight:700;color:var(--ink)">${subj}</div>
                                  <div style="font-size:11px;color:var(--ink3);margin-top:2px">${data.sessions.length}回授業</div>
                              </div>
                              <div style="text-align:right;margin-right:6px">
                                  <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">直近維持スコア</div>
                                  <div class="student-score ${scoreClass(latestScore)}" style="font-size:20px">${latestScore}</div>
                              </div>
                              <div style="font-size:12px;color:var(--ink3);transform:${isOpen ? 'rotate(180deg)' : 'none'}">▼</div>
                          </div>
                          ${sessionRows}
                      </div>`;
              }).join('');

          return `
              <div class="detail-header">
                  <button class="back-btn" onclick="backToStudentList()">← 一覧</button>
                  <div class="student-avatar" style="width:30px;height:30px;font-size:13px">
                      ${student && student.avatarUrl ? `<img src="${student.avatarUrl}" alt="">` : '👤'}
                  </div>
                  <div class="detail-name">${name}</div>
              </div>
              <div class="student-list" style="margin-top:8px">${listHTML}</div>
          `;
      }

      function drawAdminChart() {
          const canvas = document.getElementById('adminChartCanvas');
          if (!canvas || !sessionDetailData) return;
          if (adminChart) { adminChart.destroy(); adminChart = null; }

          const answers = sessionDetailData.answers || [];
          if (answers.length === 0) return;

          // x軸は実際の経過分（比例配置）。index 0はダミー起点
          const chartData = [
              { x: 0, y: null },
              ...answers.map(a => ({ x: a.minutesElapsed, y: a.concentrationScore }))
          ];

          const pausedAt = sessionDetailData.pausedAt;

          adminChart = new Chart(canvas, {
              type: 'line',
              data: {
                  datasets: [{
                      data: chartData,
                      borderColor: '#2d5a3d',
                      backgroundColor: 'rgba(45,90,61,0.08)',
                      pointBackgroundColor: '#2d5a3d',
                      pointRadius: 10,
                      pointHoverRadius: 13,
                      hitRadius: 22,
                      borderWidth: 2,
                      fill: true,
                      tension: 0.3,
                  }],
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                      legend: { display: false },
                      tooltip: {
                          callbacks: {
                              title: (items) => {
                                  const idx = items[0].dataIndex - 1;
                                  if (idx < 0) return '';
                                  return `問${idx + 1}（${items[0].parsed.x}分）`;
                              },
                              label: (item) => {
                                  const a = answers[item.dataIndex - 1];
                                  if (!a) return [];
                                  const lines = [`集中度: ${a.concentrationScore}/100`, `回答正当度: ${a.accuracyScore}/100`];
                                  if (a.responseTimeSec != null) lines.push(`回答時間: ${a.responseTimeSec}秒`);
                                  else lines.push('未回答');
                                  return lines;
                              },
                          },
                      },
                  },
                  scales: {
                      x: {
                          type: 'linear',
                          min: 0,
                          max: 90,
                          title: { display: true, text: '授業開始からの経過時間（分）', font: { size: 11 } },
                          grid: { color: 'rgba(0,0,0,0.05)' },
                          ticks: {
                              font: { size: 11 },
                              stepSize: 15,
                              callback: (v) => `${v}分`,
                          },
                      },
                      y: {
                          min: 0, max: 100,
                          title: { display: true, text: '集中度スコア（点）', font: { size: 11 } },
                          grid: { color: 'rgba(0,0,0,0.05)' },
                          ticks: { font: { size: 11 }, stepSize: 25 },
                      },
                  },
                  onClick: (e, elements) => {
                      if (elements.length > 0 && elements[0].index > 0) showPointDetail(elements[0].index - 1);
                  },
              },
              plugins: [{
                  id: 'pauseLine',
                  afterDraw(chart) {
                      if (pausedAt === null || pausedAt === undefined) return;
                      const { ctx, scales: { x, y } } = chart;
                      const xPixel = x.getPixelForValue(pausedAt);
                      ctx.save();
                      ctx.beginPath();
                      ctx.moveTo(xPixel, y.top);
                      ctx.lineTo(xPixel, y.bottom);
                      ctx.strokeStyle = 'rgba(150,100,0,0.6)';
                      ctx.lineWidth = 2;
                      ctx.setLineDash([6, 3]);
                      ctx.stroke();
                      ctx.fillStyle = 'rgba(150,100,0,0.8)';
                      ctx.font = '11px sans-serif';
                      ctx.fillText('配信停止', xPixel + 4, y.top + 14);
                      ctx.restore();
                  },
              }],
          });
      }

      function backToSessions() {
          selectedSessionId = null;

              <button onclick="deleteQuestion()" style="width:100%;padding:10px;background:var(--danger);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🗑️ この問題を全員分削除する</button>
          `;
          document.getElementById('pointDetailPopup').classList.add('open');

      let currentPointDetailIndex = -1;

      function openRescoreModal() {
          if (currentPointDetailIndex < 0 || !sessionDetailData) return;
          const a = sessionDetailData.answers[currentPointDetailIndex];
          document.getElementById('rescoreInput').value = a.modelAnswer || '';
          closePointDetail();
          document.getElementById('rescoreModal').classList.add('open');
      }

      function closeRescoreModal() {
          document.getElementById('rescoreModal').classList.remove('open');
      }

      async function submitRescore() {
          if (currentPointDetailIndex < 0 || !sessionDetailData) return;
          const a = sessionDetailData.answers[currentPointDetailIndex];
          if (!a.questionId) return;
          const newModelAnswer = document.getElementById('rescoreInput').value.trim();
          if (!newModelAnswer) { showToast('❌ 模範解答を入力してください'); return; }
          closeRescoreModal();
          showToast('⏳ 再採点中...');
          try {
              const res = await fetch(`${GAS_URL}?action=rescoreByModelAnswer&questionId=${encodeURIComponent(a.questionId)}&newModelAnswer=${encodeURIComponent(newModelAnswer)}`);
              const d = await res.json();
              if (!d.success) { showToast('❌ 再採点失敗: ' + (d.error || '')); return; }
              // ローカルの模範解答を更新
              sessionDetailData.answers.forEach(ans => {
                  if (ans.questionId === a.questionId) ans.modelAnswer = newModelAnswer;
              });
              showToast(`✅ 再採点完了（${d.updatedCount}名）`);
              drawAdminChart();
          } catch (e) { showToast('❌ 通信エラー'); }
      }

      async function deleteQuestion() {
          if (currentPointDetailIndex < 0 || !sessionDetailData) return;
          const a = sessionDetailData.answers[currentPointDetailIndex];
          if (!a.questionId) return;
          if (!confirm('この問題と全ユーザーの回答データを完全に削除します。\nこの操作は取り消せません。よろしいですか？')) return;
          try {
              const res = await fetch(`${GAS_URL}?action=deleteQuestion&questionId=${encodeURIComponent(a.questionId)}`);
              const d = await res.json();
              if (!d.success) { showToast('❌ 削除失敗: ' + (d.error || '')); return; }
              // ローカルデータから該当問題を除去
              sessionDetailData.answers = sessionDetailData.answers.filter(ans => ans.questionId !== a.questionId);
              showToast('✅ 削除しました');
              closePointDetail();
              drawAdminChart();
          } catch (e) { showToast('❌ 通信エラー'); }
      }

      function closePointDetail() {
          document.getElementById('pointDetailPopup').classList.remove('open');
      }

      }
      async function saveSessionSemester() {
          await guardedAction('saveSessionSemester', async () => {
              const grade    = parseInt(document.getElementById('sessionGrade').value);
              const semester = document.getElementById('sessionSemester').value;
              try {
                  const res = await fetch(`${GAS_URL}?action=setActiveSemester&grade=${grade}&semester=${encodeURIComponent(semester)}`);
                  const result = await res.json();
                  if (result.success) {
                      activeSemester = { grade, semester };
                      const subjectsRes = await fetch(`${GAS_URL}?action=getSubjectMaster`);
                      SUBJECTS = (await subjectsRes.json()).subjects || [];
                      selectedDay = selectedSubject = selectedSession = null;
                      sessionSemesterEditing = false;
                      showToast(`✅ ${grade}年生 ${semesterLabel(semester)}に切り替えました`);
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function selectDay(day) {
          selectedDay     = day;
          selectedSubject = null;
          selectedSession = null;
          renderApp();
      }
      function selectSubject(subject) {
          selectedSubject = subject;
          selectedSession = null;
          renderApp();
      }
      function selectSession(num) {
          selectedSession = num;
          renderApp();
      }

      async function startSession() {
          if (!selectedSubject || !selectedSession) return;
          await guardedAction('startSession', async () => {
              try {
                  const res = await fetch(
                      `${GAS_URL}?action=adminStartSession` +
                      `&subject=${encodeURIComponent(selectedSubject)}` +
                      `&sessionNumber=${selectedSession}`
                  );
                  const result = await res.json();
                  if (result.success) {
                      isSessionActive   = true;
                      const startEpoch = result.sessionStartTimeEpoch || Date.now();
                      activeSessionInfo = { subject: selectedSubject, sessionNumber: selectedSession, sessionStartTimeEpoch: startEpoch };
                      scheduleAutoEnd(startEpoch);
                      selectedDay = selectedSubject = selectedSession = null;
                      showToast(`✅ ${activeSessionInfo.subject} 第${activeSessionInfo.sessionNumber}回 開始しました`);
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function endSession() {
          clearAutoEndTimer();
          await guardedAction('endSession', async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=adminEndSession`);
                  const result = await res.json();
                  if (result.success) {
                      lastEndedSessionId = activeSessionInfo ? activeSessionInfo.sessionId : null;
                      if (lastEndedSessionId) localStorage.setItem('lastEndedSessionId', lastEndedSessionId);
                      isSessionActive = false;
                      activeSessionInfo = null;
                      isDeliveryPaused = false;
                      adminCurrentQuestionId = null;
                      stopAdminRankingPoll();
                      if (lastEndedSessionId) fetchAndShowSessionRanking(lastEndedSessionId);
                      showToast('✅ 授業を終了しました');
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function broadcastQuestion() {
          const question    = document.getElementById('questionText').value.trim();
          const modelAnswer = document.getElementById('modelAnswer').value.trim();
          if (!question || !modelAnswer) { showToast('⚠️ 問題文と模範解答を入力してください'); return; }
          await guardedAction('broadcastQuestion', async () => {
              const btn = document.querySelector('.btn-question');
              if (btn) { btn.disabled = true; btn.textContent = '配信中...'; }
              try {
                  const res = await fetch(
                      `${GAS_URL}?action=adminBroadcast` +
                      `&question=${encodeURIComponent(question)}` +
                      `&modelAnswer=${encodeURIComponent(modelAnswer)}`
                  );
                  const result = await res.json();
                  if (result.success) {
                      document.getElementById('questionText').value  = '';
                      document.getElementById('modelAnswer').value   = '';
                      adminCurrentQuestionId = result.questionId || null;
                      startAdminRankingPoll();
                      showToast(`📢 ${result.studentCount}名に配信しました`);
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              } finally {
                  if (btn) { btn.disabled = false; btn.textContent = '📢 全学生に出題する'; }
              }
          });
      }

      function openPauseModal() {
          document.getElementById('pauseModal').classList.add('open');
      }
      function closePauseModal() {
          document.getElementById('pauseModal').classList.remove('open');
      }
      async function confirmPause() {
          closePauseModal();
          await guardedAction('confirmPause', async () => {
              try {
                  const sessionId = activeSessionInfo ? activeSessionInfo.sessionId : '';
                  const res = await fetch(`${GAS_URL}?action=pauseQuestionDelivery&sessionId=${encodeURIComponent(sessionId)}`);
                  const result = await res.json();
                  if (result.success) {
                      isDeliveryPaused = true;
                      showToast('⚠️ 配信停止しました。学生にLINEを送信しました。');
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }
      async function resumeDelivery() {
          await guardedAction('resumeDelivery', async () => {
              try {
                  const sessionId = activeSessionInfo ? activeSessionInfo.sessionId : '';
                  const res = await fetch(`${GAS_URL}?action=resumeQuestionDelivery&sessionId=${encodeURIComponent(sessionId)}`);
                  const result = await res.json();
                  if (result.success) {
                      isDeliveryPaused = false;
                      showToast('✅ 配信を再開しました');

                      showToast('❌ エラー: ' + result.error);

              } catch (err) {
                  showToast('❌ 通信エラー');

          });
      }

                  <div class="student-info">
                      <div class="student-name">${s.displayName || '名前なし'}${s.nickname ? `<span style="font-size:11px;font-weight:400;color:var(--ink3);margin-left:5px">(${s.nickname})</span>` : ''}</div>
                      <div class="student-meta">未登録</div>

                  <button onclick="grantFreeAccess('${s.userId}')"

                  if (result.success) {
                      billingListData = null;
                      await switchTab('billing');
                      showToast('✅ 登録を解除しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);

      // ===== 学習計画タブ =====
      let editingExamId = null;
      let editingLastClassDate = false;

      function formatExamDate(dateStr) {
          if (!dateStr) return '—';
          const d = new Date(dateStr + 'T00:00:00');
          const days = ['日','月','火','水','木','金','土'];
          return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
      }

      function renderExamHTML() {
          const exams = (examListData && examListData.exams) || [];
          const lastClassDate = (examListData && examListData.lastClassDate) || '';
          const registeredSubjects = new Set(exams.map(e => e.subjectName));
          const availableSubjects = SUBJECTS.filter(s => !registeredSubjects.has(s.name));

          // 時間割グリッド構築
          const sortedDates = [...new Set(exams.map(e => e.examDate))].sort();
          const cellMap = {};
          exams.forEach(e => { cellMap[`${e.examDate}_${e.startTime || ''}`] = e; });
          const startTimes = [...new Set(exams.map(e => e.startTime || '').filter(Boolean))].sort();

          let tableHTML;
          if (exams.length === 0) {
              tableHTML = '<div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">学習計画はまだ登録されていません</div>';
          } else {
              const ACCENT_BG   = '#e0d5c8';
              const STRONG_LINE = '2px solid #a89880';
              const cell  = `border:1px solid var(--border);padding:8px 10px;text-align:center;box-sizing:border-box`;
              const hCell = `${cell};background:${ACCENT_BG};border-bottom:${STRONG_LINE}`;
              const tCell = `${cell};background:${ACCENT_BG};border-right:${STRONG_LINE};font-weight:700;font-size:12px;color:var(--ink2);white-space:nowrap`;
              const dCell = `${cell};width:100px`;

              const dateHeaders = sortedDates.map(d =>
                  `<th style="${hCell};font-weight:600;color:var(--ink2);font-size:12px;white-space:nowrap">${formatExamDate(d)}</th>`
              ).join('');
              const bodyRows = startTimes.map(st => {
                  const cells = sortedDates.map(d => {
                      const e = cellMap[`${d}_${st}`];
                      if (!e) return `<td style="${dCell}"></td>`;
                      const isEditing = editingExamId === e.examId;
                      if (isEditing) return `<td style="${dCell};background:var(--bg-sub)"></td>`;
                      return `<td style="${dCell}">
                          <div style="font-weight:600;font-size:12px;margin-bottom:4px;white-space:nowrap">${e.subjectName}</div>
                          <div style="font-size:10px;color:var(--ink3);margin-bottom:4px">${e.reviewMinutes}分/回${e.requiredSessions ? `・${e.requiredSessions}コマ` : ''}</div>
                          <div style="display:flex;gap:4px;justify-content:center">
                              <button onclick="startEditExam('${e.examId}')" style="background:none;border:1px solid var(--border);border-radius:5px;color:var(--ink2);font-size:10px;padding:2px 6px;cursor:pointer">編集</button>
                              <button onclick="deleteExam('${e.examId}')" style="background:none;border:1px solid #e0695a;border-radius:5px;color:#e0695a;font-size:10px;padding:2px 6px;cursor:pointer">削除</button>
                          </div>
                      </td>`;
                  }).join('');
                  return `<tr>
                      <td style="${tCell}">${st}〜${addOneHour(st)}</td>
                      ${cells}
                  </tr>`;
              }).join('');
              tableHTML = `
                  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
                      <table style="border-collapse:collapse;font-size:13px;border:1px solid var(--border)">
                          <thead>
                              <tr>
                                  <th style="${hCell};border-right:${STRONG_LINE};color:var(--ink3);font-size:12px;white-space:nowrap">時刻</th>
                                  ${dateHeaders}
                              </tr>
                          </thead>
                          <tbody>${bodyRows}</tbody>
                      </table>
                  </div>`;
          }

          // 編集フォーム（editingExamId が設定されている場合）
          const editingExam = exams.find(e => e.examId === editingExamId);
          const editFormHTML = editingExam ? `
              <div style="margin-top:12px;background:var(--bg-sub);border:1px solid var(--border);border-radius:12px;padding:14px 16px">
                  <div style="font-weight:600;font-size:13px;margin-bottom:10px;color:var(--ink2)">${editingExam.subjectName}（編集中）</div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">試験日</div>
                          <input id="editExamDate_${editingExam.examId}" type="date" class="modal-select" style="width:100%;box-sizing:border-box" value="${editingExam.examDate}" />
                      </div>
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">開始時間</div>
                          <input id="editExamStartTime_${editingExam.examId}" type="time" class="modal-select" style="width:100%;box-sizing:border-box" value="${editingExam.startTime || ''}" />
                      </div>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習時間（分/回）</div>
                          <input id="editReviewMin_${editingExam.examId}" type="number" value="${editingExam.reviewMinutes}" min="10" max="120" class="modal-select" style="width:100%;box-sizing:border-box" />
                      </div>
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習コマ数</div>
                          <select id="editReqSessions_${editingExam.examId}" class="modal-select">
                              <option value="">全回</option>
                              ${Array.from({length:15},(_,i)=>`<option value="${i+1}" ${editingExam.requiredSessions === i+1 ? 'selected' : ''}>${i+1}コマ</option>`).join('')}
                          </select>
                      </div>
                  </div>
                  <div style="display:flex;gap:8px">
                      <button onclick="saveEditExam('${editingExam.examId}')" class="action-btn btn-start" style="flex:1;padding:8px;font-size:13px">保存</button>
                      <button onclick="cancelEditExam()" style="flex:1;padding:8px;font-size:13px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer">キャンセル</button>
                  </div>
              </div>` : '';

          const addFormHTML = availableSubjects.length === 0
              ? '<div style="padding:12px;background:var(--bg-sub);border-radius:10px;font-size:13px;color:var(--ink3);text-align:center">全科目の学習計画が登録済みです</div>'
              : `
                  <div style="margin-bottom:10px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">科目名</div>
                      <select id="examSubject" class="modal-select">
                          ${availableSubjects.map(s => `<option value="${s.name}">${s.name}</option>`).join('')}
                      </select>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">試験日</div>
                          <input id="examDate" type="date" class="modal-select" style="width:100%;box-sizing:border-box" />
                      </div>
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">開始時間</div>
                          <input id="examStartTime" type="time" class="modal-select" style="width:100%;box-sizing:border-box" value="09:00" />
                      </div>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習時間（分/回）</div>
                          <input id="examReviewMin" type="number" value="45" min="10" max="120" class="modal-select" style="width:100%;box-sizing:border-box" />
                      </div>
                      <div style="min-width:0">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習コマ数</div>
                          <select id="examReqSessions" class="modal-select">
                              <option value="">全回</option>
                              ${Array.from({length:15},(_,i)=>`<option value="${i+1}">${i+1}コマ</option>`).join('')}
                          </select>
                      </div>
                  </div>
                  <button class="action-btn btn-start" onclick="addExam()" style="margin-bottom:20px">追加</button>`;

          const lastClassSection = lastClassDate && !editingLastClassDate
              ? `<div style="display:flex;align-items:center;justify-content:space-between">
                     <div>
                         <div style="font-size:11px;color:var(--ink3);margin-bottom:2px">授業最終日（全科目共通）</div>
                         <div style="font-weight:700;font-size:15px;color:var(--ink)">${formatExamDate(lastClassDate)}</div>
                     </div>
                     <button onclick="editingLastClassDate=true;renderApp()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--ink2);font-size:12px;padding:5px 12px;cursor:pointer">編集</button>
                 </div>`
              : `<div>
                     <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">授業最終日（全科目共通）</div>
                     <div style="display:flex;gap:8px;align-items:center">
                         <input id="lastClassDateInput" type="date" class="modal-select" style="flex:1;box-sizing:border-box" value="${lastClassDate}" />
                         <button onclick="saveLastClassDate()" class="action-btn btn-start" style="white-space:nowrap;padding:10px 14px">保存</button>
                     </div>
                     <div style="font-size:11px;color:var(--ink3);margin-top:4px">学習計画の開始日算出に使用します</div>
                 </div>`;

          return `
              <div style="padding:16px">
                  <div style="background:var(--bg-sub);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:18px">
                      ${lastClassSection}
                  </div>
                  <div style="font-family:'Kaisei Tokumin',serif;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--ink)">試験日程を追加</div>
                  ${addFormHTML}
                  <div style="font-family:'Kaisei Tokumin',serif;font-size:15px;font-weight:700;margin-bottom:10px;color:var(--ink)">登録済み試験日程（${exams.length}件）</div>
                  <div class="card" style="padding:0;overflow:hidden">${tableHTML}</div>
                  ${editFormHTML}
              </div>
          `;
      }

      async function saveLastClassDate() {
          await guardedAction('saveLastClassDate', async () => {
              const date = document.getElementById('lastClassDateInput').value;
              try {
                  const res = await fetch(`${GAS_URL}?action=setLastClassDate&date=${encodeURIComponent(date)}`);
                  const result = await res.json();
                  if (result.success) {
                      if (examListData) examListData.lastClassDate = date;
                      editingLastClassDate = false;
                      renderApp();
                      showToast('✅ 授業最終日を保存しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function addExam() {
          const subjectName = document.getElementById('examSubject').value;
          const examDate = document.getElementById('examDate').value;
          const startTime = document.getElementById('examStartTime').value;
          const reviewMinutes = document.getElementById('examReviewMin').value;
          const reqSessions = document.getElementById('examReqSessions').value;
          if (!subjectName || !examDate) { showToast('❌ 科目名と試験日を入力してください'); return; }
          await guardedAction('addExam', async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=addExamDate&subjectName=${encodeURIComponent(subjectName)}&examDate=${encodeURIComponent(examDate)}&startTime=${encodeURIComponent(startTime)}&reviewMinutes=${reviewMinutes}&requiredSessions=${reqSessions}`);
                  const result = await res.json();
                  if (result.success) {
                      examListData.exams.push({ examId: result.examId, subjectName, examDate, startTime, reviewMinutes: parseInt(reviewMinutes), requiredSessions: reqSessions ? parseInt(reqSessions) : null });
                      renderApp();
                      showToast('✅ 学習計画を追加しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function startEditExam(examId) {
          editingExamId = examId;
          renderApp();
      }

      function cancelEditExam() {
          editingExamId = null;
          renderApp();
      }

      async function saveEditExam(examId) {
          const examDate = document.getElementById(`editExamDate_${examId}`).value;
          const startTime = document.getElementById(`editExamStartTime_${examId}`).value;
          const reviewMinutes = document.getElementById(`editReviewMin_${examId}`).value;
          const reqSessions = document.getElementById(`editReqSessions_${examId}`).value;
          if (!examDate) { showToast('❌ 試験日を入力してください'); return; }
          await guardedAction('saveEditExam_' + examId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=updateExamDate&examId=${encodeURIComponent(examId)}&examDate=${encodeURIComponent(examDate)}&startTime=${encodeURIComponent(startTime)}&reviewMinutes=${reviewMinutes}&requiredSessions=${reqSessions}`);
                  const result = await res.json();
                  if (result.success) {
                      const exam = examListData.exams.find(e => e.examId === examId);
                      if (exam) { exam.examDate = examDate; exam.startTime = startTime; exam.reviewMinutes = parseInt(reviewMinutes); exam.requiredSessions = reqSessions ? parseInt(reqSessions) : null; }
                      editingExamId = null;
                      renderApp();
                      showToast('✅ 学習計画を更新しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function deleteExam(examId) {
          if (!confirm('この学習計画を削除しますか？')) return;
          await guardedAction('deleteExam_' + examId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=deleteExamDate&examId=${encodeURIComponent(examId)}`);
                  const result = await res.json();
                  if (result.success) {
                      examListData.exams = examListData.exams.filter(e => e.examId !== examId);
                      editingExamId = null;
                      renderApp();
                      showToast('✅ 削除しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function showToast(msg) {
          const toast = document.getElementById('toast');
          toast.textContent = msg;
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 3000);
      }
      function showError(msg) {
          document.getElementById('app').innerHTML = `
              <div style="text-align:center;padding:80px 20px;color:var(--ink3)">
                    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
                          <div>読み込みに失敗しました</div>
                                <div style="font-size:12px;margin-top:8px">${msg}</div>
                                    </div>`;
      }

      init();
    </script>
  </body>
</html>
