<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>授業管理パネル</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
        --bg: #f5f0e8;
        --surface: #ffffff;
        --surface2: #faf7f2;
        --border: #e0d8cc;
        --ink: #1a1208;
        --ink2: #4a3f2f;
        --ink3: #8a7a68;
        --accent: #2d5a3d;
        --accent-light: #e8f2eb;
        --danger: #8b2020;
        --danger-light: #fdeaea;
        --warning: #7a5a10;
        --warning-light: #fef8e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Noto Sans JP', sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        padding-bottom: 40px;
    }
    .header {
        background: var(--accent);
        color: white;
        padding: 16px 20px 12px;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .header-label { font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }
    .header-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; }

    .semester-bar {
        background: var(--warning-light);
        border-bottom: 1px solid #e8d89a;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .semester-info {
        flex: 1;
        font-size: 13px;
        color: var(--warning);
        font-weight: 500;
    }
    .semester-info strong { font-weight: 700; }
    .btn-semester-change {
        padding: 5px 12px;
        background: var(--warning);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 500;
        cursor: pointer;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 100;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
        background: var(--surface);
        border-radius: 16px;
        padding: 24px 20px;
        width: calc(100% - 40px);
        max-width: 360px;
    }
    .modal-title {
        font-family: 'Kaisei Tokumin', serif;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 12px; color: var(--ink3); margin-bottom: 6px; }
    .modal-select {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px;
        background: var(--surface2);
        color: var(--ink);
        appearance: none;
        box-sizing: border-box;
    }
    input[type="date"].modal-select {
        -webkit-appearance: textfield;
        appearance: auto;
        min-height: 44px;
    }
    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .modal-btn-cancel {
        flex: 1; padding: 12px; border: 1.5px solid var(--border);
        background: var(--surface); border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
        color: var(--ink2); cursor: pointer;
    }
    .modal-btn-save {
        flex: 1; padding: 12px; border: none;
        background: var(--accent); border-radius: 10px;
        font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
        color: white; font-weight: 700; cursor: pointer;
    }

    .status-bar {
        display: flex; align-items: center; gap: 10px;
        background: var(--surface); margin: 12px 16px;
        padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.active  { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    .status-dot.inactive { background: var(--ink3); }
    .status-text { font-size: 13px; color: var(--ink2); flex: 1; line-height: 1.4; }

    .section { margin: 0 16px 12px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-left: 2px; }
    .section-num {
        width: 24px; height: 24px; border-radius: 50%;
        background: var(--accent); color: white;
        font-size: 12px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
    }
    .section-title { font-size: 14px; font-weight: 700; color: var(--ink2); }
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .disabled-section { opacity: 0.4; pointer-events: none; }

    .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
    .day-btn {
        padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .day-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
    .subject-btn {
        padding: 12px 8px; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 12px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; text-align: center; line-height: 1.3;
    }
    .subject-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

    .session-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
    .session-btn {
        aspect-ratio: 1; border-radius: 10px; border: 1.5px solid var(--border);
        background: var(--surface2); font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px; font-weight: 500; color: var(--ink2); cursor: pointer;
        transition: all 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .session-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 700; }

    .action-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .btn-start { background: var(--accent); color: white; }
    .btn-start:disabled { background: var(--border); color: var(--ink3); cursor: not-allowed; }
    .btn-end { background: var(--danger); color: white; }
    .btn-question { background: var(--ink); color: white; }

    .form-field { padding: 0 14px; }
    .form-label { font-size: 12px; color: var(--ink3); margin-bottom: 6px; }
    .form-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; background: var(--surface2); color: var(--ink); resize: vertical; line-height: 1.5; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--ink); color: white; padding: 12px 20px;
        border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 200;
        transition: transform 0.3s ease; white-space: nowrap; max-width: calc(100% - 40px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .tab-nav { display: flex; background: var(--accent); border-top: 1px solid rgba(255,255,255,0.15); }
    .tab-btn { flex: 1; padding: 10px 4px; background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab-btn.active { color: white; border-bottom-color: white; font-weight: 700; }

    .student-list { padding: 8px 16px 40px; }
    .student-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
    .student-item:active { opacity: 0.7; }
    .student-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .student-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .student-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .student-score { font-size: 20px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .student-score.mid { color: var(--warning); }
    .student-score.low { color: var(--danger); }

    .detail-header { display: flex; align-items: center; gap: 4px; padding: 8px 16px 0; }
    .back-btn { background: none; border: none; font-size: 13px; color: var(--ink2); cursor: pointer; padding: 8px 4px; display: flex; align-items: center; gap: 4px; }
    .detail-name { font-size: 15px; font-weight: 700; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--ink3); }

    .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .popup-overlay.open { display: flex; }
    .popup-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
    .popup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .popup-stat { border-radius: 10px; padding: 10px; text-align: center; }
    .popup-stat-label { font-size: 10px; margin-bottom: 2px; }
    .popup-stat-value { font-size: 18px; font-weight: 700; }
    .chart-container { padding: 12px 16px; height: 240px; position: relative; }
    </style>
  </head>
  <body>
    <div id="app">読み込み中...</div>
    <div id="toast" class="toast"></div>

    <div id="pointDetailPopup" class="popup-overlay">
      <div class="popup-sheet">
        <button class="popup-close" onclick="closePointDetail()">✕</button>
        <div style="font-family:'Kaisei Tokumin',serif;font-size:16px;font-weight:700;margin-bottom:16px">回答詳細</div>
        <div id="pointDetailContent"></div>
      </div>
    </div>

    <div id="pauseModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-title" style="color:var(--warning)">授業に集中させる</div>
            <div style="font-size:14px;line-height:1.6;color:var(--ink2);margin-bottom:20px">
                このサービスを使っている余裕がないので、問題配信はしません。授業に集中させます。
            </div>
            <div class="modal-btns">
                <button class="modal-btn-cancel" onclick="closePauseModal()">キャンセル</button>
                <button class="modal-btn-save" style="background:var(--warning)" onclick="confirmPause()">確認</button>
            </div>
        </div>
    </div>

    <script>
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec';
      const LIFF_ID = '2009739219-9qVGb0Xm';

      let SUBJECTS = [];
      const PERIOD_TIMES = [
        { period: 1, time: '9:00-10:00' },
        { period: 2, time: '10:30-11:30' },
        { period: 3, time: '12:00-13:00' },
        { period: 4, time: '13:30-14:30' },
        { period: 5, time: '15:00-16:00' },
        { period: 6, time: '16:00-17:00' },
      ];
      let activeSemester = { grade: 4, semester: 'spring' };
      let selectedDay     = null;
      let selectedSubject = null;
      let selectedSession = null;
      let isSessionActive  = false;
      let activeSessionInfo = null;
      let isDeliveryPaused = false;

      // ダッシュボード用
      let activeTab = 'session';
      let studentListData = null;
      let selectedStudentId = null;
      let selectedSessionId = null;
      let studentSessionsData = null;
      let sessionDetailData = null;
      let adminChart = null;
      let billingListData = null;

      let dashboardFilter = null;
      const FILTER_KEY = 'dashboardFilter';
      let sessionSemesterEditing = false;

      const _busy = new Set();
      async function guardedAction(key, fn) {
        if (_busy.has(key)) return;
        _busy.add(key);
        try { await fn(); } finally { _busy.delete(key); }
      }

      async function init() {
          try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                // localStorageからフィルタ復元（アプリを閉じても保持）
                const saved = localStorage.getItem(FILTER_KEY);
                if (saved) {
                    try { dashboardFilter = JSON.parse(saved); } catch (e) { dashboardFilter = null; }
                }

                // 1リクエストで全初期データ取得（30秒タイムアウト）
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 30000);
                const res = await fetch(`${GAS_URL}?action=getInitData`, { signal: controller.signal });
                clearTimeout(timeout);
                const data = await res.json();
                SUBJECTS          = data.subjects || [];
                activeSemester    = data.semesterData || { grade: 4, semester: 'spring' };
                const session     = data.activeSession || {};
                isSessionActive   = session.isActive || false;
                activeSessionInfo = session.session || null;
                isDeliveryPaused  = session.isPaused || false;

                // フィルタ未設定の場合はactiveSemesterを自動適用
                if (!dashboardFilter) {
                    dashboardFilter = { grade: activeSemester.grade, semester: activeSemester.semester };
                    localStorage.setItem(FILTER_KEY, JSON.stringify(dashboardFilter));
                }
                renderApp();
          } catch (err) {
                showError(err.message);
          }
      }

      function semesterLabel(sem) {
          return sem === 'spring' ? '春学期' : '秋学期';
      }

      function renderApp() {
          document.getElementById('app').innerHTML = `
            <div class="header">
              <div class="header-label">Admin Panel</div>
              <div class="header-title">授業管理パネル</div>
              <div class="tab-nav">
                <button class="tab-btn ${activeTab === 'session' ? 'active' : ''}" onclick="switchTab('session')">授業管理</button>
                <button class="tab-btn ${activeTab === 'dashboard' ? 'active' : ''}" onclick="switchTab('dashboard')">学生ダッシュボード</button>
                <button class="tab-btn ${activeTab === 'billing' ? 'active' : ''}" onclick="switchTab('billing')">登録管理</button>
                <button class="tab-btn ${activeTab === 'exam' ? 'active' : ''}" onclick="switchTab('exam')">試験日程</button>
              </div>
            </div>
            ${activeTab === 'billing' ? renderBillingHTML() : activeTab === 'dashboard' ? renderDashboardHTML() : activeTab === 'exam' ? renderExamHTML() : renderSessionHTML()}
          `;
      }

      function renderSessionSemesterEditHTML() {
          const g = activeSemester.grade;
          const s = activeSemester.semester;
          return `
              <div style="padding:20px 16px">
                  <div style="font-family:'Kaisei Tokumin',serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)">学年・学期を選択</div>
                  <div style="margin-bottom:14px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:6px">学年</div>
                      <select id="sessionGrade" class="modal-select">
                          ${[1,2,3,4,5,6].map(n => `<option value="${n}" ${n === g ? 'selected' : ''}>${n}年生</option>`).join('')}
                      </select>
                  </div>
                  <div style="margin-bottom:20px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:6px">学期</div>
                      <select id="sessionSemester" class="modal-select">
                          <option value="spring" ${s === 'spring' ? 'selected' : ''}>春学期</option>
                          <option value="fall" ${s === 'fall' ? 'selected' : ''}>秋学期</option>
                      </select>
                  </div>
                  <div style="display:flex;gap:10px">
                      <button class="action-btn" style="background:var(--ink3)" onclick="cancelSessionSemesterEdit()">キャンセル</button>
                      <button class="action-btn btn-start" onclick="saveSessionSemester()">確定</button>
                  </div>
              </div>
          `;
      }

      function renderSessionHTML() {
          if (sessionSemesterEditing) return renderSessionSemesterEditHTML();
          return `
                                  <div class="semester-bar">
                                        <div class="semester-info">
                                                表示中：<strong>${activeSemester.grade}年生 · ${semesterLabel(activeSemester.semester)}</strong>
                                                      </div>
                                                            <button class="btn-semester-change" onclick="openSessionSemesterEdit()">変更</button>
                                                                </div>
                                                                    <div class="status-bar">
                                                                          <div class="status-dot ${isSessionActive ? 'active' : 'inactive'}"></div>
                                                                                <div class="status-text">
                                                                                        ${isSessionActive
                                                                                                    ? `<strong>${activeSessionInfo.subject} 第${activeSessionInfo.sessionNumber}回</strong>授業進行中`
                                                                                                    : '<strong>授業なし</strong>待機中'}
                                                                                                          </div>
                                                                                                                ${isSessionActive ? `
                                                                                                                        <button class="action-btn btn-end"
                                                                                                                                  style="width:auto;padding:8px 14px;font-size:12px;border-radius:10px"
                                                                                                                                            onclick="endSession()">終了</button>
                                                                                                                                                  ` : ''}
                                                                                                                                                      </div>
                                                                                                                                                          <div class="section ${isSessionActive ? 'disabled-section' : ''}" id="step1">
                                                                                                                                                                <div class="section-header">
                                                                                                                                                                        <div class="section-num">1</div>
                                                                                                                                                                                <div class="section-title">曜日を選択</div>
                                                                                                                                                                                      </div>
                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                    <div class="day-grid">
                                                                                                                                                                                                              ${['月','火','水','木','金'].map(d => `
                                                                                                                                                                                                                          <button class="day-btn ${d === selectedDay ? 'selected' : ''}"
                                                                                                                                                                                                                                        onclick="selectDay('${d}')">${d}</button>
                                                                                                                                                                                                                                                  `).join('')}
                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                        <div class="section ${isSessionActive ? 'disabled-section' : ''}"
                                                                                                                                                                                                                                                                              style="${selectedDay ? '' : 'display:none'}">
                                                                                                                                                                                                                                                                                    <div class="section-header">
                                                                                                                                                                                                                                                                                            <div class="section-num">2</div>
                                                                                                                                                                                                                                                                                                    <div class="section-title">授業を選択</div>
                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                <div class="card">
                                                                                                                                                                                                                                                                                                                        <div class="subject-grid">
                                                                                                                                                                                                                                                                                                                                  ${selectedDay ? SUBJECTS.filter(s => s.day === selectedDay).map(s => `
                                                                                                                                                                                                                                                                                                                                              <button class="subject-btn ${s.name === selectedSubject ? 'selected' : ''}"
                                                                                                                                                                                                                                                                                                                                                            onclick="selectSubject('${s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${s.name}</button>
                                                                                                                                                                                                                                                                                                                                                                      `).join('') : ''}
                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                            <div class="section ${isSessionActive ? 'disabled-section' : ''}"
                                                                                                                                                                                                                                                                                                                                                                                                  style="${selectedSubject ? '' : 'display:none'}">
                                                                                                                                                                                                                                                                                                                                                                                                        <div class="section-header">
                                                                                                                                                                                                                                                                                                                                                                                                                <div class="section-num">3</div>
                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="section-title">授業回数を選択</div>
                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="session-grid">
                                                                                                                                                                                                                                                                                                                                                                                                                                                      ${Array.from({length: 15}, (_, i) => i + 1).map(n => `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button class="session-btn ${n === selectedSession ? 'selected' : ''}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                onclick="selectSession(${n})">${n}</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          `).join('')}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="section ${isSessionActive ? 'disabled-section' : ''}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="section-header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="section-num">4</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="section-title">授業を開始</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button class="action-btn btn-start" onclick="startSession()" ${selectedSubject && selectedSession ? '' : 'disabled'}>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          授業開始
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                  renderLoadingScreen('exam');

                      const res = await fetch(`${GAS_URL}?action=getExamSchedule`);
                      examListData = await res.json();
                  } catch (err) {
                      showToast('❌ データ取得失敗');
                      activeTab = 'session';
                  }
              }
              renderApp();
              return;
          }
          if (tab === 'billing') {
              if (!billingListData) {
                  renderLoadingScreen('billing');
                  try {
                      const res = await fetch(`${GAS_URL}?action=getAdminStudentListWithBilling`);
                      const data = await res.json();
                      if (!data.students) throw new Error(data.error || 'students undefined');
                      billingListData = data;
                  } catch (err) {
                      showToast('❌ データ取得失敗: ' + err.message);
                      activeTab = 'session';
                  }
              }
              renderApp();
              return;
          }
          if (tab === 'dashboard') {
              // フィルタが未確定の場合はフィルタ選択画面を表示（データ取得不要）
              if (!dashboardFilter) {
                  selectedStudentId = null;
                  selectedSessionId = null;
                  studentSessionsData = null;
                  sessionDetailData = null;
                  studentListData = null;
                  if (adminChart) { adminChart.destroy(); adminChart = null; }
                  renderApp();
                  return;

                      studentListData = await res.json();

          selectedSessionId = null;
          studentSessionsData = null;
          sessionDetailData = null;
          if (adminChart) { adminChart.destroy(); adminChart = null; }
          renderApp();

      function renderSessionDetailHTML() {
          const student = studentListData.students.find(s => s.userId === selectedStudentId);
          const studentName = student ? (student.displayName || '名前なし') : '学生';
          const session = studentSessionsData && studentSessionsData.sessions

          if (!sessionDetailData) {

                      <button class="back-btn" onclick="backToSessions()">← 授業一覧</button>
                      <div class="detail-name">${sessionLabel}</div>

          }

          const answers = sessionDetailData.answers || [];
          return `
              <div class="detail-header">
                  <button class="back-btn" onclick="backToSessions()">← 授業一覧</button>
                  <div class="detail-name">${studentName} · ${sessionLabel}</div>
              </div>
              <div style="padding:8px 16px 4px;font-size:12px;color:var(--ink3)">集中度スコアの推移（回答正当度×速度）（点をタップで詳細）</div>
              <div class="chart-container">
                  <canvas id="adminChartCanvas"></canvas>
              </div>
              ${answers.length === 0 ? '<div class="empty-state">回答データなし</div>' : ''}
          `;
      }

      function drawAdminChart() {
          const canvas = document.getElementById('adminChartCanvas');
          if (!canvas || !sessionDetailData) return;
          if (adminChart) { adminChart.destroy(); adminChart = null; }

          const answers = sessionDetailData.answers || [];
          if (answers.length === 0) return;

          const labels = ['0分', ...answers.map(a => `${a.minutesElapsed}分`)];
          const scores = [null, ...answers.map(a => a.concentrationScore)];

          const pausedAt = sessionDetailData.pausedAt; // 配信停止時刻（分単位の経過時間）

          adminChart = new Chart(canvas, {
              type: 'line',
              data: {
                  labels,
                  datasets: [{
                      data: scores,
                      borderColor: '#2d5a3d',
                      backgroundColor: 'rgba(45,90,61,0.08)',
                      pointBackgroundColor: '#2d5a3d',
                      pointRadius: 8,
                      pointHoverRadius: 10,
                      borderWidth: 2,
                      fill: true,
                      tension: 0.3,
                  }],
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                      legend: { display: false },
                      tooltip: {
                          callbacks: {
                              title: (items) => `問${items[0].dataIndex + 1}（${items[0].label}）`,
                              label: (item) => {
                                  const a = answers[item.dataIndex];
                                  const lines = [`集中度: ${a.concentrationScore}/100`, `回答正当度: ${a.accuracyScore}/100`];
                                  if (a.responseTimeSec != null) lines.push(`回答時間: ${a.responseTimeSec}秒`);
                                  else lines.push('未回答');
                                  return lines;
                              },
                          },
                      },
                  },
                  scales: {
                      x: {
                          title: { display: true, text: '授業開始からの経過時間', font: { size: 11 } },
                          grid: { color: 'rgba(0,0,0,0.05)' },
                          ticks: { font: { size: 11 } },
                      },
                      y: {
                          min: 0, max: 100,
                          title: { display: true, text: '集中度スコア（点）', font: { size: 11 } },
                          grid: { color: 'rgba(0,0,0,0.05)' },
                          ticks: { font: { size: 11 }, stepSize: 25 },
                      },
                  },
                  onClick: (e, elements) => {
                      if (elements.length > 0) showPointDetail(elements[0].index);
                  },
              },
              plugins: [{
                  id: 'pauseLine',
                  afterDraw(chart) {
                      if (pausedAt === null || pausedAt === undefined) return;
                      const { ctx, scales: { x, y } } = chart;
                      const minuteValues = answers.map(a => a.minutesElapsed);
                      if (minuteValues.length === 0) return;
                      const minVal = 0;
                      const maxVal = minuteValues[minuteValues.length - 1];
                      if (maxVal === minVal) return;
                      const clampedPause = Math.max(minVal, Math.min(maxVal, pausedAt));
                      const ratio = (clampedPause - minVal) / (maxVal - minVal);
                      const xPixel = x.left + ratio * (x.right - x.left);
                      ctx.save();
                      ctx.beginPath();
                      ctx.moveTo(xPixel, y.top);
                      ctx.lineTo(xPixel, y.bottom);
                      ctx.strokeStyle = 'rgba(150,100,0,0.6)';
                      ctx.lineWidth = 2;
                      ctx.setLineDash([6, 3]);
                      ctx.stroke();
                      ctx.fillStyle = 'rgba(150,100,0,0.8)';
                      ctx.font = '11px sans-serif';
                      ctx.fillText('配信停止', xPixel + 4, y.top + 14);
                      ctx.restore();
                  },
              }],
          });
      }

                  const res = await fetch(`${GAS_URL}?action=setActiveSemester&grade=${grade}&semester=${encodeURIComponent(semester)}`);

                  if (result.success) {
                      activeSemester = { grade, semester };

              } catch (err) {
                  showToast('❌ 通信エラー');

          });

          if (!selectedSubject || !selectedSession) return;
          await guardedAction('startSession', async () => {
              try {
                  const res = await fetch(
                      `${GAS_URL}?action=adminStartSession` +
                      `&subject=${encodeURIComponent(selectedSubject)}` +
                      `&sessionNumber=${selectedSession}`
                  );
                  const result = await res.json();
                  if (result.success) {
                      isSessionActive   = true;
                      activeSessionInfo = { subject: selectedSubject, sessionNumber: selectedSession };
                      selectedDay = selectedSubject = selectedSession = null;
                      showToast(`✅ ${activeSessionInfo.subject} 第${activeSessionInfo.sessionNumber}回 開始しました`);
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function endSession() {
          await guardedAction('endSession', async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=adminEndSession`);
                  const result = await res.json();
                  if (result.success) {
                      isSessionActive = false;
                      activeSessionInfo = null;
                      isDeliveryPaused = false;
                      showToast('✅ 授業を終了しました');
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function broadcastQuestion() {
          const question    = document.getElementById('questionText').value.trim();
          const modelAnswer = document.getElementById('modelAnswer').value.trim();
          if (!question || !modelAnswer) { showToast('⚠️ 問題文と模範解答を入力してください'); return; }
          await guardedAction('broadcastQuestion', async () => {
              const btn = document.querySelector('.btn-question');
              if (btn) { btn.disabled = true; btn.textContent = '配信中...'; }
              try {
                  const res = await fetch(
                      `${GAS_URL}?action=adminBroadcast` +
                      `&question=${encodeURIComponent(question)}` +
                      `&modelAnswer=${encodeURIComponent(modelAnswer)}`
                  );
                  const result = await res.json();
                  if (result.success) {
                      document.getElementById('questionText').value  = '';
                      document.getElementById('modelAnswer').value   = '';
                      showToast(`📢 ${result.studentCount}名に配信しました`);
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              } finally {
                  if (btn) { btn.disabled = false; btn.textContent = '📢 全学生に出題する'; }
              }
          });
      }

      function openPauseModal() {
          document.getElementById('pauseModal').classList.add('open');
      }
      function closePauseModal() {
          document.getElementById('pauseModal').classList.remove('open');
      }
      async function confirmPause() {
          closePauseModal();
          await guardedAction('confirmPause', async () => {
              try {
                  const sessionId = activeSessionInfo ? activeSessionInfo.sessionId : '';
                  const res = await fetch(`${GAS_URL}?action=pauseQuestionDelivery&sessionId=${encodeURIComponent(sessionId)}`);
                  const result = await res.json();
                  if (result.success) {
                      isDeliveryPaused = true;
                      showToast('⚠️ 配信停止しました。学生にLINEを送信しました。');
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }
      async function resumeDelivery() {
          await guardedAction('resumeDelivery', async () => {
              try {
                  const sessionId = activeSessionInfo ? activeSessionInfo.sessionId : '';
                  const res = await fetch(`${GAS_URL}?action=resumeQuestionDelivery&sessionId=${encodeURIComponent(sessionId)}`);
                  const result = await res.json();
                  if (result.success) {
                      isDeliveryPaused = false;
                      showToast('✅ 配信を再開しました');
                      renderApp();
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function renderBillingHTML() {
          if (!billingListData) return '<div class="empty-state">読み込み中...</div>';
          const students = billingListData.students || [];
          const registered = students.filter(s => s.billingStatus === '課金有効' || s.billingStatus === '管理者承認');
          const unregistered = students.filter(s => s.billingStatus !== '課金有効' && s.billingStatus !== '管理者承認');

          const renderRegistered = (s) => `
              <div class="student-item" style="cursor:default">
                  <div class="student-avatar">
                      ${s.pictureUrl ? `<img src="${s.pictureUrl}" alt="">` : '👤'}
                  </div>
                  <div class="student-info">
                      <div class="student-name">${s.displayName || '名前なし'}</div>
                      <div class="student-meta">${s.billingStatus}</div>
                  </div>
                  <button onclick="revokeAccess('${s.userId}')"
                      style="padding:6px 12px;background:var(--danger);color:white;border:none;border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;flex-shrink:0">
                      登録手動解除
                  </button>
              </div>`;

          const renderUnregistered = (s) => `
              <div class="student-item" style="cursor:default">
                  <div class="student-avatar">
                      ${s.pictureUrl ? `<img src="${s.pictureUrl}" alt="">` : '👤'}
                  </div>
                  <div class="student-info">
                      <div class="student-name">${s.displayName || '名前なし'}</div>
                      <div class="student-meta">未登録</div>
                  </div>
                  <button onclick="grantFreeAccess('${s.userId}')"
                      style="padding:6px 12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;flex-shrink:0">
                      手動登録
                  </button>
              </div>`;

          return `
              <div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--ink3)">
                  登録済み（${registered.length}名）
              </div>
              <div class="student-list" style="padding-bottom:4px">
                  ${registered.length === 0
                    ? '<div style="text-align:center;padding:16px;color:var(--ink3);font-size:13px">なし</div>'
                    : registered.map(renderRegistered).join('')}
              </div>
              <div style="padding:8px 16px 4px;font-size:12px;font-weight:700;color:var(--ink3)">
                  未登録（${unregistered.length}名）
              </div>
              <div class="student-list">
                  ${unregistered.length === 0
                    ? '<div style="text-align:center;padding:16px;color:var(--ink3);font-size:13px">なし</div>'
                    : unregistered.map(renderUnregistered).join('')}
              </div>`;
      }

      async function grantFreeAccess(userId) {
          await guardedAction('grantFreeAccess_' + userId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=adminGrantFreeAccess&targetUserId=${encodeURIComponent(userId)}`);
                  const result = await res.json();
                  if (result.success) {
                      billingListData = null;
                      await switchTab('billing');
                      showToast('✅ 手動登録しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function revokeAccess(userId) {
          if (!confirm('登録を解除しますか？この学生はデモ画面のみ利用可能になります。')) return;
          await guardedAction('revokeAccess_' + userId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=adminRevokeAccess&targetUserId=${encodeURIComponent(userId)}`);
                  const result = await res.json();
                  if (result.success) {
                      billingListData = null;
                      await switchTab('billing');
                      showToast('✅ 登録を解除しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      // ===== 試験日程タブ =====
      let editingExamId = null;

      function formatExamDate(dateStr) {
          if (!dateStr) return '—';
          const d = new Date(dateStr + 'T00:00:00');
          const days = ['日','月','火','水','木','金','土'];
          return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
      }

      function renderExamHTML() {
          const exams = (examListData && examListData.exams) || [];
          const lastClassDate = (examListData && examListData.lastClassDate) || '';
          const registeredSubjects = new Set(exams.map(e => e.subjectName));
          const availableSubjects = SUBJECTS.filter(s => !registeredSubjects.has(s.name));

          // 時間割グリッド構築
          const sortedDates = [...new Set(exams.map(e => e.examDate))].sort();
          const cellMap = {};
          exams.forEach(e => { cellMap[`${e.examDate}_${e.period || 1}`] = e; });

          let tableHTML;
          if (exams.length === 0) {
              tableHTML = '<div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">試験日程はまだ登録されていません</div>';
          } else {
              const cellStyle = `border:1px solid var(--border2);padding:8px 10px;text-align:center`;
              const dateHeaders = sortedDates.map(d =>
                  `<th style="${cellStyle};font-weight:600;color:var(--ink2);font-size:12px;white-space:nowrap;min-width:90px;background:var(--bg-sub)">${formatExamDate(d)}</th>`
              ).join('');
              const bodyRows = PERIOD_TIMES.map(pt => {
                  const cells = sortedDates.map(d => {
                      const e = cellMap[`${d}_${pt.period}`];
                      if (!e) return `<td style="${cellStyle}"></td>`;
                      const isEditing = editingExamId === e.examId;
                      if (isEditing) return `<td style="${cellStyle};background:var(--bg-sub)"></td>`;
                      return `<td style="${cellStyle}">
                          <div style="font-weight:600;font-size:12px;margin-bottom:4px;white-space:nowrap">${e.subjectName}</div>
                          <div style="font-size:10px;color:var(--ink3);margin-bottom:4px">${e.reviewMinutes}分/回</div>
                          <div style="display:flex;gap:4px;justify-content:center">
                              <button onclick="startEditExam('${e.examId}')" style="background:none;border:1px solid var(--border2);border-radius:5px;color:var(--ink2);font-size:10px;padding:2px 6px;cursor:pointer">編集</button>
                              <button onclick="deleteExam('${e.examId}')" style="background:none;border:1px solid #e0695a;border-radius:5px;color:#e0695a;font-size:10px;padding:2px 6px;cursor:pointer">削除</button>
                          </div>
                      </td>`;
                  }).join('');
                  return `<tr>
                      <td style="${cellStyle};font-weight:700;font-size:14px;color:var(--ink2);background:var(--bg-sub);width:36px">${pt.period}</td>
                      ${cells}
                  </tr>`;
              }).join('');
              tableHTML = `
                  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
                      <table style="border-collapse:collapse;font-size:13px;border:1px solid var(--border2)">
                          <thead>
                              <tr>
                                  <th style="${cellStyle};font-weight:600;color:var(--ink3);font-size:12px;background:var(--bg-sub)">コマ</th>
                                  ${dateHeaders}
                              </tr>
                          </thead>
                          <tbody>${bodyRows}</tbody>
                      </table>
                  </div>`;
          }

          // 編集フォーム（editingExamId が設定されている場合）
          const editingExam = exams.find(e => e.examId === editingExamId);
          const editFormHTML = editingExam ? `
              <div style="margin-top:12px;background:var(--bg-sub);border:1px solid var(--border2);border-radius:12px;padding:14px 16px">
                  <div style="font-weight:600;font-size:13px;margin-bottom:10px;color:var(--ink2)">${editingExam.subjectName}（編集中）</div>
                  <div style="margin-bottom:8px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">試験日</div>
                      <input id="editExamDate_${editingExam.examId}" type="date" class="modal-select" style="width:100%;box-sizing:border-box" value="${editingExam.examDate}" />
                  </div>
                  <div style="margin-bottom:8px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">コマ</div>
                      <select id="editExamPeriod_${editingExam.examId}" class="modal-select">
                          ${PERIOD_TIMES.map(pt => `<option value="${pt.period}" ${(editingExam.period || 1) == pt.period ? 'selected' : ''}>${pt.period}コマ（${pt.time}）</option>`).join('')}
                      </select>
                  </div>
                  <div style="margin-bottom:12px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習標準時間（分/回）</div>
                      <input id="editReviewMin_${editingExam.examId}" type="number" value="${editingExam.reviewMinutes}" min="10" max="120" class="modal-select" style="width:100%;box-sizing:border-box" />
                  </div>
                  <div style="display:flex;gap:8px">
                      <button onclick="saveEditExam('${editingExam.examId}')" class="action-btn btn-start" style="flex:1;padding:8px;font-size:13px">保存</button>
                      <button onclick="cancelEditExam()" style="flex:1;padding:8px;font-size:13px;background:none;border:1px solid var(--border2);border-radius:10px;cursor:pointer">キャンセル</button>
                  </div>
              </div>` : '';

          const addFormHTML = availableSubjects.length === 0
              ? '<div style="padding:12px;background:var(--bg-sub);border-radius:10px;font-size:13px;color:var(--ink3);text-align:center">全科目の試験日程が登録済みです</div>'
              : `
                  <div style="margin-bottom:10px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">科目名</div>
                      <select id="examSubject" class="modal-select">
                          ${availableSubjects.map(s => `<option value="${s.name}">${s.name}</option>`).join('')}
                      </select>
                  </div>
                  <div style="margin-bottom:10px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">試験日</div>
                      <input id="examDate" type="date" class="modal-select" style="width:100%;box-sizing:border-box" />
                  </div>
                  <div style="margin-bottom:10px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">コマ</div>
                      <select id="examPeriod" class="modal-select">
                          ${PERIOD_TIMES.map(pt => `<option value="${pt.period}">${pt.period}コマ（${pt.time}）</option>`).join('')}
                      </select>
                  </div>
                  <div style="margin-bottom:14px">
                      <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">復習標準時間（分/回）</div>
                      <input id="examReviewMin" type="number" value="45" min="10" max="120" class="modal-select" style="width:100%;box-sizing:border-box" />
                  </div>
                  <button class="action-btn btn-start" onclick="addExam()" style="margin-bottom:20px">追加</button>`;

          return `
              <div style="padding:16px">
                  <div style="background:var(--bg-sub);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:18px">
                      <div style="margin-bottom:10px">
                          <div style="font-size:12px;color:var(--ink3);margin-bottom:4px">授業最終日（全科目共通）</div>
                          <input id="lastClassDateInput" type="date" class="modal-select" style="width:100%" value="${lastClassDate}" />
                          <div style="font-size:11px;color:var(--ink3);margin-top:4px">学習計画の開始日算出に使用します</div>
                      </div>
                      <button onclick="saveLastClassDate()" class="action-btn btn-start" style="width:100%">保存</button>
                  </div>
                  <div style="font-family:'Kaisei Tokumin',serif;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--ink)">試験日程を追加</div>
                  ${addFormHTML}
                  <div style="font-family:'Kaisei Tokumin',serif;font-size:15px;font-weight:700;margin-bottom:10px;color:var(--ink)">登録済み試験日程（${exams.length}件）</div>
                  <div class="card" style="padding:0;overflow:hidden">${tableHTML}</div>
                  ${editFormHTML}
              </div>
          `;
      }

      async function saveLastClassDate() {
          await guardedAction('saveLastClassDate', async () => {
              const date = document.getElementById('lastClassDateInput').value;
              try {
                  const res = await fetch(`${GAS_URL}?action=setLastClassDate&date=${encodeURIComponent(date)}`);
                  const result = await res.json();
                  if (result.success) {
                      if (examListData) examListData.lastClassDate = date;
                      showToast('✅ 授業最終日を保存しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function addExam() {
          const subjectName = document.getElementById('examSubject').value;
          const examDate = document.getElementById('examDate').value;
          const period = document.getElementById('examPeriod').value;
          const reviewMinutes = document.getElementById('examReviewMin').value;
          if (!subjectName || !examDate) { showToast('❌ 科目名と試験日を入力してください'); return; }
          await guardedAction('addExam', async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=addExamDate&subjectName=${encodeURIComponent(subjectName)}&examDate=${encodeURIComponent(examDate)}&period=${period}&reviewMinutes=${reviewMinutes}`);
                  const result = await res.json();
                  if (result.success) {
                      examListData = null;
                      await switchTab('exam');
                      showToast('✅ 試験日程を追加しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function startEditExam(examId) {
          editingExamId = examId;
          renderApp();
      }

      function cancelEditExam() {
          editingExamId = null;
          renderApp();
      }

      async function saveEditExam(examId) {
          const examDate = document.getElementById(`editExamDate_${examId}`).value;
          const period = document.getElementById(`editExamPeriod_${examId}`).value;
          const reviewMinutes = document.getElementById(`editReviewMin_${examId}`).value;
          if (!examDate) { showToast('❌ 試験日を入力してください'); return; }
          await guardedAction('saveEditExam_' + examId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=updateExamDate&examId=${encodeURIComponent(examId)}&examDate=${encodeURIComponent(examDate)}&period=${period}&reviewMinutes=${reviewMinutes}`);
                  const result = await res.json();
                  if (result.success) {
                      examListData = null;
                      editingExamId = null;
                      await switchTab('exam');
                      showToast('✅ 試験日程を更新しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      async function deleteExam(examId) {
          if (!confirm('この試験日程を削除しますか？')) return;
          await guardedAction('deleteExam_' + examId, async () => {
              try {
                  const res = await fetch(`${GAS_URL}?action=deleteExamDate&examId=${encodeURIComponent(examId)}`);
                  const result = await res.json();
                  if (result.success) {
                      examListData = null;
                      editingExamId = null;
                      await switchTab('exam');
                      showToast('✅ 削除しました');
                  } else {
                      showToast('❌ エラー: ' + result.error);
                  }
              } catch (err) {
                  showToast('❌ 通信エラー');
              }
          });
      }

      function showToast(msg) {
          const toast = document.getElementById('toast');
          toast.textContent = msg;
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 3000);
      }
      function showError(msg) {
          document.getElementById('app').innerHTML = `
              <div style="text-align:center;padding:80px 20px;color:var(--ink3)">
                    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
                          <div>読み込みに失敗しました</div>
                                <div style="font-size:12px;margin-top:8px">${msg}</div>
                                    </div>`;
      }

      init();
    </script>
  </body>
</html>
