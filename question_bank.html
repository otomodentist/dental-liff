<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>問題バンク管理 | 授業のOtomo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #4a7c59; --accent-light: #e8f2eb; --surface: #ffffff; --surface2: #f5f7f5;
    --border: #dde5de; --ink: #2c3e2d; --ink2: #4a5e4b; --ink3: #8a9e8b;
    --danger: #c0392b; --danger-light: #fdf0ef;
    font-family: 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--surface2); color: var(--ink); min-height: 100vh; }

  /* ===== VIEWS ===== */
  .view { display: none; min-height: 100vh; }
  .view.active { display: block; }

  /* ===== LOGIN ===== */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; }
  .login-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .login-logo span { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; color: var(--ink); }
  .login-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 18px; }
  .form-label { font-size: 11px; color: var(--ink3); font-weight: 700; margin-bottom: 5px; display: block; }
  .form-select, .form-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; background: var(--surface2); color: var(--ink); outline: none; margin-bottom: 14px; }
  .form-select:focus, .form-input:focus { border-color: var(--accent); }
  .form-textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--ink); outline: none; resize: vertical; line-height: 1.5; }
  .form-textarea:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--ink2); cursor: pointer; font-family: inherit; }
  .error-msg { font-size: 12px; color: var(--danger); background: var(--danger-light); border: 1px solid rgba(192,57,43,0.2); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }

  /* ===== MAIN VIEW ===== */
  .main-header { background: var(--accent); color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .main-header-title { font-family: 'Kaisei Tokumin', serif; font-size: 16px; font-weight: 700; flex: 1; }
  .header-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; font-size: 12px; font-weight: 700; padding: 4px 10px; cursor: pointer; font-family: inherit; }

  .filter-bar { padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-chip { border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--ink3); font-family: inherit; }
  .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 700; }

  .questions-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .q-card-header { padding: 10px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .q-sess-badge { background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .q-card-body { padding: 10px 14px; }
  .q-text { font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 6px; }
  .q-answer { font-size: 12px; color: var(--ink3); line-height: 1.4; }
  .q-img-tag { font-size: 11px; color: var(--accent); margin-top: 4px; }
  .q-actions { display: flex; gap: 8px; padding: 0 14px 12px; }
  .q-btn-edit { flex: 1; border: 1px solid var(--border); background: none; border-radius: 8px; padding: 7px; font-size: 12px; color: var(--ink2); cursor: pointer; font-family: inherit; }
  .q-btn-delete { border: 1px solid rgba(192,57,43,0.3); background: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; color: var(--danger); cursor: pointer; font-family: inherit; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--ink3); font-size: 14px; }

  .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: white; font-size: 26px; line-height: 52px; text-align: center; cursor: pointer; box-shadow: 0 4px 12px rgba(74,124,89,0.4); border: none; z-index: 20; }

  /* ===== BOTTOM SHEET MODAL ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .overlay.open { display: flex; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-height: 90vh; overflow-y: auto; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .sheet-hint { font-size: 10px; color: var(--ink3); line-height: 1.8; margin-top: 6px; margin-bottom: 14px; }

  /* ===== SETTINGS ===== */
  .settings-section { margin: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .settings-header { padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--ink3); letter-spacing: 0.05em; }
  .settings-row { padding: 14px; }
  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: rgba(44,62,45,0.9); color: white; border-radius: 20px; padding: 8px 18px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ===== LOGIN VIEW ===== -->
<div id="loginView" class="view active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="otomo_logo_litegreen.png" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'" />
        <span>授業のOtomo</span>
      </div>
      <div class="login-title">問題バンク管理</div>
      <label class="form-label">担当講義</label>
      <select id="subjectSelect" class="form-select">
        <option value="">読み込み中...</option>
      </select>
      <label class="form-label">パスワード</label>
      <input id="passwordInput" class="form-input" type="password" placeholder="パスワードを入力" style="margin-bottom:6px" onkeydown="if(event.key==='Enter')doLogin()" />
      <div id="loginError" class="error-msg"></div>
      <button class="btn-primary" onclick="doLogin()">ログイン</button>
    </div>
  </div>
</div>

<!-- ===== FIRST LOGIN: CHANGE PASSWORD VIEW ===== -->
<div id="changePwView" class="view">
  <div class="login-wrap">
    <div class="login-card">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px">🔑 初回ログイン</div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:18px;line-height:1.6">初期パスワードから新しいパスワードに変更してください（4文字以上）</div>
      <label class="form-label">新しいパスワード</label>
      <input id="newPw1" class="form-input" type="password" placeholder="新しいパスワード" />
      <label class="form-label">確認</label>
      <input id="newPw2" class="form-input" type="password" placeholder="もう一度入力" style="margin-bottom:6px" onkeydown="if(event.key==='Enter')doFirstChangePw()" />
      <div id="changePwError" class="error-msg"></div>
      <button class="btn-primary" onclick="doFirstChangePw()">設定して始める</button>
    </div>
  </div>
</div>

<!-- ===== MAIN VIEW ===== -->
<div id="mainView" class="view">
  <div class="main-header">
    <div class="main-header-title" id="mainSubjectLabel"></div>
    <button class="header-btn" onclick="showView('settingsView')">⚙️ 設定</button>
    <button class="header-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div id="questionsList" class="questions-list"></div>
  <button class="fab" onclick="openEditModal(null)" title="問題を追加">＋</button>
</div>

<!-- ===== SETTINGS VIEW ===== -->
<div id="settingsView" class="view">
  <div class="main-header">
    <div class="main-header-title">設定</div>
    <button class="header-btn" onclick="showView('mainView')">← 戻る</button>
  </div>
  <div class="settings-section">
    <div class="settings-header">パスワード変更</div>
    <div class="settings-row">
      <label class="form-label">現在のパスワード</label>
      <input id="curPw" class="form-input" type="password" placeholder="現在のパスワード" />
      <label class="form-label">新しいパスワード（4文字以上）</label>
      <input id="setPw1" class="form-input" type="password" placeholder="新しいパスワード" />
      <label class="form-label">確認</label>
      <input id="setPw2" class="form-input" type="password" placeholder="もう一度入力" style="margin-bottom:6px" />
      <div id="settingsPwError" class="error-msg"></div>
      <button class="btn-primary" onclick="doChangePw()">パスワードを変更</button>
    </div>
  </div>
</div>

<!-- ===== EDIT MODAL ===== -->
<div id="editOverlay" class="overlay" onclick="closeEditModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="editModalTitle">問題を追加</div>
    <input type="hidden" id="editRowIndex" value="0" />
    <label class="form-label">授業回数</label>
    <input id="editSessionNum" class="form-input" type="number" min="1" max="30" placeholder="例: 3" />
    <label class="form-label">問題文</label>
    <textarea id="editQuestionText" class="form-textarea" rows="3" placeholder="問題文を入力..." style="margin-bottom:14px"></textarea>
    <label class="form-label">模範解答</label>
    <textarea id="editModelAnswer" class="form-textarea" rows="2" placeholder="模範解答を入力..." style="margin-bottom:4px"></textarea>
    <div class="sheet-hint">
      <b>複数必須</b>：<code style="background:var(--surface2);padding:1px 4px;border-radius:3px">A,B,C</code>　すべて必要<br>
      <b>どれでもOK</b>：<code style="background:var(--surface2);padding:1px 4px;border-radius:3px">A/B/C</code>　いずれか一つ<br>
      <b>複数＋別解あり</b>：<code style="background:var(--surface2);padding:1px 4px;border-radius:3px">A,B/C/D,E</code>
    </div>
    <label class="form-label">画像URL（任意）</label>
    <input id="editImageUrl" class="form-input" type="url" placeholder="https://..." />
    <div id="editError" class="error-msg"></div>
    <button class="btn-primary" onclick="saveQuestion()" style="margin-bottom:10px">保存</button>
    <button class="btn-secondary" onclick="closeEditModal()" style="width:100%;text-align:center">キャンセル</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const COHORT_CONFIG = {
    '23': { gasUrl: 'https://script.google.com/macros/s/AKfycbwx7XFQHALQSD7UMBsVXKdxqgH9yktleZOjV3HN-qStmlod8ifpNw6_FazO4-jI6mWiug/exec' },
    '24': { gasUrl: '' },
    '25': { gasUrl: '' },
    '26': { gasUrl: '' },
  };
  const COHORT = new URLSearchParams(location.search).get('cohort') || '23';
  const GAS_URL = (COHORT_CONFIG[COHORT] || COHORT_CONFIG['23']).gasUrl;

  let currentSubject = '';
  let authToken = '';
  let questions = [];
  let sessionFilter = null;

  const STORAGE_KEY = 'qb_token_' + COHORT;
  const SUBJECT_KEY = 'qb_subject_' + COHORT;

  // ===== 初期化 =====
  async function init() {
    await loadSubjectList();
    // 既存トークンがあれば自動復元
    const saved = sessionStorage.getItem(STORAGE_KEY);
    const savedSubject = sessionStorage.getItem(SUBJECT_KEY);
    if (saved && savedSubject) {
      authToken = saved;
      currentSubject = savedSubject;
      const res = await fetch(`${GAS_URL}?action=qbGetQuestions&subjectName=${enc(currentSubject)}&token=${enc(authToken)}`).then(r => r.json()).catch(() => ({ error: 'network' }));
      if (!res.error) {
        questions = res;
        showMain();
        return;
      }
    }
    showView('loginView');
  }

  async function loadSubjectList() {
    try {
      const subjects = await fetch(`${GAS_URL}?action=qbGetSubjectList`).then(r => r.json());
      const sel = document.getElementById('subjectSelect');
      if (!subjects || subjects.length === 0) {
        sel.innerHTML = '<option value="">（設定済みの講義がありません）</option>';
        return;
      }
      sel.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    } catch(e) {
      document.getElementById('subjectSelect').innerHTML = '<option value="">（読み込み失敗）</option>';
    }
  }

  // ===== ログイン =====
  async function doLogin() {
    const subjectName = document.getElementById('subjectSelect').value;
    const password = document.getElementById('passwordInput').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    if (!subjectName || !password) { showErr(errEl, '講義とパスワードを入力してください'); return; }

    const res = await fetch(`${GAS_URL}?action=qbLogin&subjectName=${enc(subjectName)}&password=${enc(password)}`).then(r => r.json()).catch(() => ({ success: false, error: 'network' }));
    if (!res.success) {
      const msgs = { invalid: 'パスワードが違います', not_configured: 'この講義はまだ設定されていません', required: '入力してください', network: '通信エラー' };
      showErr(errEl, msgs[res.error] || 'ログイン失敗');
      return;
    }
    currentSubject = subjectName;
    authToken = res.token;
    sessionStorage.setItem(STORAGE_KEY, authToken);
    sessionStorage.setItem(SUBJECT_KEY, currentSubject);

    if (res.isFirstLogin) {
      showView('changePwView');
    } else {
      await loadQuestionsAndShow();
    }
  }

  // ===== 初回パスワード変更 =====
  async function doFirstChangePw() {
    const p1 = document.getElementById('newPw1').value;
    const p2 = document.getElementById('newPw2').value;
    const errEl = document.getElementById('changePwError');
    errEl.style.display = 'none';
    if (p1.length < 4) { showErr(errEl, '4文字以上で設定してください'); return; }
    if (p1 !== p2) { showErr(errEl, 'パスワードが一致しません'); return; }
    const res = await fetch(`${GAS_URL}?action=qbChangePassword&subjectName=${enc(currentSubject)}&token=${enc(authToken)}&newPassword=${enc(p1)}`).then(r => r.json()).catch(() => ({ error: 'network' }));
    if (res.error) { showErr(errEl, '変更に失敗しました'); return; }
    showToast('パスワードを設定しました');
    await loadQuestionsAndShow();
  }

  // ===== ログアウト =====
  function doLogout() {
    authToken = ''; currentSubject = '';
    sessionStorage.removeItem(STORAGE_KEY);
    sessionStorage.removeItem(SUBJECT_KEY);
    document.getElementById('passwordInput').value = '';
    showView('loginView');
  }

  // ===== メイン =====
  async function loadQuestionsAndShow() {
    questions = await fetch(`${GAS_URL}?action=qbGetQuestions&subjectName=${enc(currentSubject)}&token=${enc(authToken)}`).then(r => r.json()).catch(() => []);
    showMain();
  }

  function showMain() {
    document.getElementById('mainSubjectLabel').textContent = currentSubject;
    renderFilterBar();
    renderQuestions();
    showView('mainView');
  }

  function renderFilterBar() {
    const sessions = [...new Set(questions.map(q => q.sessionNumber))].sort((a, b) => a - b);
    const bar = document.getElementById('filterBar');
    bar.innerHTML = `<button class="filter-chip ${sessionFilter === null ? 'active' : ''}" onclick="setFilter(null)">全て</button>` +
      sessions.map(s => `<button class="filter-chip ${sessionFilter === s ? 'active' : ''}" onclick="setFilter(${s})">第${s}回</button>`).join('');
  }

  function setFilter(s) { sessionFilter = s; renderFilterBar(); renderQuestions(); }

  function renderQuestions() {
    const list = document.getElementById('questionsList');
    const filtered = sessionFilter === null ? questions : questions.filter(q => q.sessionNumber == sessionFilter);
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">登録された問題がありません<br><span style="font-size:12px">＋ボタンで追加できます</span></div>';
      return;
    }
    list.innerHTML = filtered.map(q => `
      <div class="q-card">
        <div class="q-card-header">
          <span class="q-sess-badge">第${q.sessionNumber}回</span>
        </div>
        <div class="q-card-body">
          <div class="q-text">${escHtml(q.questionText)}</div>
          <div class="q-answer">模範: ${escHtml(q.modelAnswer)}</div>
          ${q.imageUrl ? '<div class="q-img-tag">🖼️ 画像あり</div>' : ''}
        </div>
        <div class="q-actions">
          <button class="q-btn-edit" onclick="openEditModal(${q.rowIndex})">✏️ 編集</button>
          <button class="q-btn-delete" onclick="deleteQuestion(${q.rowIndex})">🗑️</button>
        </div>
      </div>`).join('');
  }

  // ===== 追加・編集 =====
  function openEditModal(rowIndex) {
    const q = rowIndex ? questions.find(q => q.rowIndex === rowIndex) : null;
    document.getElementById('editModalTitle').textContent = q ? '問題を編集' : '問題を追加';
    document.getElementById('editRowIndex').value = rowIndex || 0;
    document.getElementById('editSessionNum').value = q ? q.sessionNumber : (sessionFilter || '');
    document.getElementById('editQuestionText').value = q ? q.questionText : '';
    document.getElementById('editModelAnswer').value = q ? q.modelAnswer : '';
    document.getElementById('editImageUrl').value = q ? q.imageUrl : '';
    document.getElementById('editError').style.display = 'none';
    document.getElementById('editOverlay').classList.add('open');
  }

  function closeEditModal(e) {
    if (e && e.target !== document.getElementById('editOverlay')) return;
    document.getElementById('editOverlay').classList.remove('open');
  }

  async function saveQuestion() {
    const rowIndex = parseInt(document.getElementById('editRowIndex').value);
    const sessionNumber = document.getElementById('editSessionNum').value.trim();
    const questionText = document.getElementById('editQuestionText').value.trim();
    const modelAnswer = document.getElementById('editModelAnswer').value.trim();
    const imageUrl = document.getElementById('editImageUrl').value.trim();
    const errEl = document.getElementById('editError');
    errEl.style.display = 'none';
    if (!sessionNumber || !questionText || !modelAnswer) { showErr(errEl, '授業回数・問題文・模範解答は必須です'); return; }

    const body = JSON.stringify({ action: 'qbSaveQuestion', subjectName: currentSubject, token: authToken, rowIndex, sessionNumber, questionText, modelAnswer, imageUrl });
    const res = await fetch(GAS_URL, { method: 'POST', body }).then(r => r.json()).catch(() => ({ error: 'network' }));
    if (!res.success) { showErr(errEl, res.error === 'unauthorized' ? 'セッション切れです。ログインし直してください' : '保存に失敗しました'); return; }

    document.getElementById('editOverlay').classList.remove('open');
    showToast(rowIndex ? '更新しました' : '追加しました');
    await loadQuestionsAndShow();
  }

  // ===== 削除 =====
  async function deleteQuestion(rowIndex) {
    if (!confirm('この問題を削除しますか？')) return;
    const res = await fetch(`${GAS_URL}?action=qbDeleteQuestion&subjectName=${enc(currentSubject)}&token=${enc(authToken)}&rowIndex=${rowIndex}`).then(r => r.json()).catch(() => ({ error: 'network' }));
    if (!res.success) { showToast('削除に失敗しました'); return; }
    showToast('削除しました');
    await loadQuestionsAndShow();
  }

  // ===== パスワード変更（設定画面） =====
  async function doChangePw() {
    const curPw = document.getElementById('curPw').value;
    const p1 = document.getElementById('setPw1').value;
    const p2 = document.getElementById('setPw2').value;
    const errEl = document.getElementById('settingsPwError');
    errEl.style.display = 'none';
    if (!curPw || !p1 || !p2) { showErr(errEl, '全て入力してください'); return; }
    if (p1.length < 4) { showErr(errEl, '4文字以上で設定してください'); return; }
    if (p1 !== p2) { showErr(errEl, 'パスワードが一致しません'); return; }

    // 現パスワード確認のため再ログイン
    const loginRes = await fetch(`${GAS_URL}?action=qbLogin&subjectName=${enc(currentSubject)}&password=${enc(curPw)}`).then(r => r.json()).catch(() => ({ success: false }));
    if (!loginRes.success) { showErr(errEl, '現在のパスワードが違います'); return; }

    // 新パスワードを設定（新トークン使用）
    authToken = loginRes.token;
    sessionStorage.setItem(STORAGE_KEY, authToken);
    const res = await fetch(`${GAS_URL}?action=qbChangePassword&subjectName=${enc(currentSubject)}&token=${enc(authToken)}&newPassword=${enc(p1)}`).then(r => r.json()).catch(() => ({ error: 'network' }));
    if (res.error) { showErr(errEl, '変更に失敗しました'); return; }

    document.getElementById('curPw').value = '';
    document.getElementById('setPw1').value = '';
    document.getElementById('setPw2').value = '';
    showToast('パスワードを変更しました');
  }

  // ===== ユーティリティ =====
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function enc(s) { return encodeURIComponent(s); }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
