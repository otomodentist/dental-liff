<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デモ体験 | 授業のオトモ</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #faf7f2;
      --border: #e0d8cc;
      --ink: #1a1208;
      --ink2: #4a3f2f;
      --ink3: #8a7a68;
      --accent: #2d5a3d;
      --accent-light: #e8f2eb;
      --danger: #8b2020;
      --warning: #7a5a10;
      --warning-light: #fef8e6;
      --demo: #1a3a6b;
      --demo-light: #e8eef8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 80px; }

    .demo-banner {
      background: var(--demo);
      color: white;
      padding: 10px 16px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .demo-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      margin-right: 6px;
      font-size: 11px;
    }

    .header {
      background: var(--accent);
      color: white;
      padding: 16px 20px 12px;
    }
    .header-label { font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }
    .header-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; }

    .profile-card {
      background: var(--surface);
      margin: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .profile-name { font-size: 16px; font-weight: 700; }
    .profile-meta { font-size: 12px; color: var(--ink3); margin-top: 2px; }
    .demo-label {
      margin-left: auto;
      background: var(--demo-light);
      color: var(--demo);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .section-label {
      padding: 8px 16px 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink3);
      letter-spacing: 0.05em;
    }

    .subject-card {
      background: var(--surface);
      margin: 0 16px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .subject-card:active { opacity: 0.7; }
    .subject-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .subject-name { font-size: 14px; font-weight: 700; flex: 1; }
    .subject-meta { font-size: 12px; color: var(--ink3); }
    .subject-score { font-size: 20px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    .session-item {
      background: var(--surface);
      margin: 0 16px 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-item:active { opacity: 0.7; }
    .session-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .session-info { flex: 1; }
    .session-title { font-size: 14px; font-weight: 700; }
    .session-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .session-score { font-size: 20px; font-weight: 700; flex-shrink: 0; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 6px;
    }
    .back-btn {
      background: none; border: none;
      font-size: 13px; color: var(--ink2);
      cursor: pointer; padding: 6px 4px;
      display: flex; align-items: center; gap: 4px;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .detail-title { font-size: 14px; font-weight: 700; }

    .chart-container { padding: 4px 16px 8px; height: 220px; position: relative; }

    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .popup-overlay.open { display: flex; }
    .popup-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
    .popup-label { font-size: 12px; color: var(--ink3); margin-bottom: 4px; }
    .popup-value { font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .popup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .popup-stat { border-radius: 10px; padding: 10px; text-align: center; }
    .popup-stat-label { font-size: 10px; margin-bottom: 2px; }
    .popup-stat-value { font-size: 18px; font-weight: 700; }

    .cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid var(--border);
    }
    .cta-btn {
      width: 100%; padding: 15px;
      background: var(--demo);
      color: white; border: none;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
    }
    .cta-sub { font-size: 11px; opacity: 0.8; font-weight: 400; }

    .score-high { color: var(--accent); }
    .score-mid { color: var(--warning); }
    .score-low { color: var(--danger); }

    /* ===== Study Plan ===== */
    .plan-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--accent); color: white;
    }
    .plan-back-btn {
      background: none; border: none; color: white; font-size: 14px;
      cursor: pointer; padding: 4px; font-family: 'Noto Sans JP', sans-serif;
    }
    .plan-title { font-family: 'Kaisei Tokumin', serif; font-size: 16px; font-weight: 700; }

    .theory-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; margin: 0 16px 12px; padding: 14px 16px;
    }
    .theory-title { font-size: 12px; font-weight: 700; color: var(--ink2); margin-bottom: 8px; }
    .theory-step { font-size: 11px; color: var(--ink3); line-height: 1.8; }

    .plan-exam-card {
      background: var(--surface); margin: 0 16px 10px;
      border-radius: 12px; border: 1px solid var(--border); overflow: hidden;
    }
    .plan-exam-header { padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; }
    .plan-exam-name { font-size: 14px; font-weight: 700; }
    .plan-exam-date { font-size: 11px; color: var(--ink3); margin-top: 2px; }

    .plan-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-top: 1px solid var(--border);
    }
    .plan-item-done { opacity: 0.45; }
    .plan-item-date { font-size: 11px; color: var(--ink3); width: 72px; flex-shrink: 0; }
    .plan-item-label { font-size: 12px; flex: 1; }
    .plan-item-btn {
      background: var(--accent-light); border: none; border-radius: 8px;
      color: var(--accent); font-size: 11px; padding: 4px 8px;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0;
    }
    .plan-item-btn.done { background: var(--surface2); color: var(--ink3); cursor: default; }
    .plan-generate-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--ink2); font-size: 12px;
      padding: 5px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
    }

    .blocks-row { display: flex; gap: 2px; }
    .block { flex: 1; height: 10px; border-radius: 2px; border: 1px solid var(--border); }
    .block.reviewed { background: #c8c8c8; border-color: #b0b0b0; }
    .block.pending { background: linear-gradient(135deg, #4caf50, #2196f3); border-color: transparent; }
    .block.unattended { background: var(--surface2); }

    .study-plan-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; width: 100%;
      margin-bottom: 8px; font-family: 'Noto Sans JP', sans-serif; text-align: left;
    }
    .study-plan-btn-icon { font-size: 22px; flex-shrink: 0; }
    .study-plan-btn-text { flex: 1; }
    .study-plan-btn-title { font-size: 14px; font-weight: 700; }
    .study-plan-btn-desc { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .dev-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: #f0f0f0; color: #888; flex-shrink: 0;
    }
  </style>
</head>

// ===== レンダリング =====
function render() {

}

function buildHTML() {
  const bannerHTML = `
    <div class="demo-banner">
      <span class="demo-badge">DEMO</span>サービス体験中 — これはサンプルデータです
    </div>`;
  const headerHTML = `
    <div class="header">
      <div class="header-label">授業のオトモ</div>
      <div class="header-title">マイページ（デモ）</div>
    </div>`;
  const profileHTML = `
    <div class="profile-card">
      <div class="profile-avatar">👤</div>
      <div>
        <div class="profile-name">${DEMO_STUDENT.name}</div>
        <div class="profile-meta">${DEMO_STUDENT.grade}</div>
      </div>
      <div class="demo-label">デモユーザー</div>
    </div>`;

  if (view === 'subjects') return bannerHTML + headerHTML + profileHTML + buildSubjectsHTML();
  if (view === 'sessions') return bannerHTML + headerHTML + buildSessionsHTML();
  if (view === 'chart') return bannerHTML + headerHTML + buildChartHTML();
  if (view === 'studyPlan') return buildStudyPlanHTML();
  return '';
}

function scoreClass(s) {
  return s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low';
}

function buildSubjectsHTML() {
  const avgAll = Math.round(
    DEMO_SUBJECTS.reduce((sum, subj) => {
      const allScores = subj.sessions.flatMap(s => s.answers.map(a => a.concentrationScore));
      return sum + allScores.reduce((a, b) => a + b, 0) / allScores.length;
    }, 0) / DEMO_SUBJECTS.length
  );
  const html = DEMO_SUBJECTS.map((subj, idx) => {
    const allScores = subj.sessions.flatMap(s => s.answers.map(a => a.concentrationScore));
    const avg = Math.round(allScores.reduce((a, b) => a + b, 0) / allScores.length);
    return `
      <div class="subject-card" onclick="selectSubject(${idx})">
        <div class="subject-icon">${subj.icon}</div>
        <div style="flex:1">
          <div class="subject-name">${subj.name}</div>
          <div class="subject-meta">${subj.sessions.length}回授業 / 平均集中度</div>
        </div>
        <div class="subject-score ${scoreClass(avg)}">${avg}</div>
      </div>`;
  }).join('');
  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin:0 16px 12px;padding:14px 16px;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--ink3);margin-bottom:2px">総合集中度スコア</div>
        <div style="font-family:'Kaisei Tokumin',serif;font-size:32px;font-weight:700;color:var(--accent)">${avgAll}<span style="font-size:14px;font-weight:400;margin-left:2px">/100</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--ink3)">参加授業</div>
        <div style="font-size:20px;font-weight:700">${DEMO_SUBJECTS.reduce((n, s) => n + s.sessions.length, 0)}回</div>
      </div>
    </div>
    <div class="section-label">科目一覧</div>
    ${html}
    <div class="section-label" style="margin-top:4px">試験対策</div>
    <div style="padding:0 16px 16px">
      <button onclick="view='studyPlan';render()" class="study-plan-btn">
        <div class="study-plan-btn-icon">📚</div>
        <div class="study-plan-btn-text">
          <div class="study-plan-btn-title">定期試験対策</div>
          <div class="study-plan-btn-desc">3年生 春学期 · 9科目 · 学習計画を見る</div>
        </div>
        <div style="color:var(--ink3);font-size:20px">›</div>
      </button>
      <button onclick="alert('CBT対策機能は現在開発中です！')" class="study-plan-btn" style="opacity:0.65">
        <div class="study-plan-btn-icon">📖</div>
        <div class="study-plan-btn-text">
          <div class="study-plan-btn-title">CBT対策</div>
          <div class="study-plan-btn-desc">4年生進級時の共用試験対策</div>
        </div>
        <span class="dev-badge">開発中</span>
      </button>
      <button onclick="alert('国試対策機能は現在開発中です！')" class="study-plan-btn" style="opacity:0.65">
        <div class="study-plan-btn-icon">🏥</div>
        <div class="study-plan-btn-text">
          <div class="study-plan-btn-title">国試対策</div>
          <div class="study-plan-btn-desc">歯科医師国家試験対策</div>

function buildSessionsHTML() {
  const subj = DEMO_SUBJECTS[selectedSubjectIdx];

    const avg = sess.avgScore;
    return `
      <div class="session-item" onclick="selectSession(${idx})">
        <div class="session-num">第${sess.sessionNumber}</div>
        <div class="session-info">
          <div class="session-title">第${sess.sessionNumber}回授業</div>
          <div class="session-meta">${sess.answerCount}問回答</div>
        </div>
        <div class="session-score ${scoreClass(avg)}">${avg}</div>
      </div>`;
  }).join('');
  return `
    <div class="detail-header">
      <button class="back-btn" onclick="goBack('subjects')">← 科目一覧</button>
      <div class="detail-title">${subj.name}</div>

function buildChartHTML() {
  const subj = DEMO_SUBJECTS[selectedSubjectIdx];
  const sess = subj.sessions[selectedSessionIdx];
  return `
    <div class="detail-header">
      <button class="back-btn" onclick="goBack('sessions')">← 授業一覧</button>
      <div class="detail-title">${subj.name} 第${sess.sessionNumber}回</div>
    </div>
    <div style="padding:4px 16px 0;font-size:12px;color:var(--ink3)">採点結果の推移（点をタップで詳細）</div>
    <div class="chart-container">
      <canvas id="demoChartCanvas"></canvas>
    </div>
    <div style="padding:0 16px 8px;font-size:12px;font-weight:700;color:var(--ink3)">回答一覧</div>
    ${sess.answers.map((a, i) => `
      <div class="session-item" onclick="showPointDetail(${i})">
        <div class="session-num" style="background:var(--surface2);color:var(--ink2);font-size:11px">問${i+1}</div>
        <div class="session-info">
          <div class="session-title" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.questionText}</div>
          <div class="session-meta">回答時間: ${a.responseTimeSec}秒</div>
        </div>
        <div class="session-score ${scoreClass(a.accuracyScore)}" style="font-size:16px">${a.accuracyScore}</div>
      </div>`).join('')}`;
}

function drawChart() {
  const canvas = document.getElementById('demoChartCanvas');
  if (!canvas) return;
  if (demoChart) { demoChart.destroy(); demoChart = null; }
  const sess = DEMO_SUBJECTS[selectedSubjectIdx].sessions[selectedSessionIdx];
  const answers = sess.answers;
  demoChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: answers.map(a => `${a.minutesElapsed}分`),
      datasets: [{
        data: answers.map(a => a.accuracyScore),
        borderColor: '#2d5a3d',
        backgroundColor: 'rgba(45,90,61,0.08)',
        pointBackgroundColor: '#2d5a3d',
        pointRadius: 8,
        pointHoverRadius: 10,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => `問${items[0].dataIndex + 1}（${items[0].label}）`,
            label: (item) => {
              const a = answers[item.dataIndex];
              return [`採点: ${a.accuracyScore}/100`, `回答時間: ${a.responseTimeSec}秒`];
            },
          },
        },
      },
      scales: {
        x: {
          title: { display: true, text: '授業開始からの経過時間', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 } },
        },
        y: {
          min: 0, max: 100,
          title: { display: true, text: '採点結果（点）', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, stepSize: 25 },
        },
      },
      onClick: (e, elements) => {
        if (elements.length > 0) showPointDetail(elements[0].index);
      },
    },
  });
}

function showPointDetail(idx) {
  const sess = DEMO_SUBJECTS[selectedSubjectIdx].sessions[selectedSessionIdx];
  const a = sess.answers[idx];
  document.getElementById('popupContent').innerHTML = `
    <div class="popup-label">問題文</div>
    <div class="popup-value">${a.questionText}</div>
    <div class="popup-label">模範解答</div>
    <div class="popup-value">${a.modelAnswer}</div>
    <div class="popup-label">山田さんの回答</div>
    <div class="popup-value">${a.answerText}</div>
    <div class="popup-row">
      <div class="popup-stat" style="background:var(--accent-light)">
        <div class="popup-stat-label" style="color:var(--accent)">採点結果</div>
        <div class="popup-stat-value" style="color:var(--accent)">${a.accuracyScore}/100</div>
      </div>
      <div class="popup-stat" style="background:var(--surface2)">
        <div class="popup-stat-label" style="color:var(--ink3)">回答時間</div>
        <div class="popup-stat-value">${a.responseTimeSec}秒</div>
      </div>
    </div>`;
  document.getElementById('pointDetailPopup').classList.add('open');
}

function closePopup() {
  document.getElementById('pointDetailPopup').classList.remove('open');
}

function selectSubject(idx) {
  selectedSubjectIdx = idx;
  view = 'sessions';
  render();
}

function selectSession(idx) {

function goBack(to) {
  if (demoChart) { demoChart.destroy(); demoChart = null; }
  view = to;
  render();
}

function demoAction() {
  alert('デモ版では操作できません。\n本番版ではこの機能が使えます。');
}

function buildStudyPlanHTML() {
  const typeLabel = { 'review': '復習', 're-review': '再復習' };

  const examCardsHTML = DEMO_EXAMS.map(exam => {
    // 実施コマ バッジ（15コマ全参加）
    const attendedHTML = Array.from({ length: 15 }, (_, i) =>
      `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:10px;font-weight:600">第${i+1}回</span>`
    ).join(' ');

    // 復習進捗ブロック
    const p = DEMO_PROGRESS_BLOCKS[exam.subjectName];
    const progressHTML = p ? `
      <div style="padding:10px 16px;border-top:1px solid var(--border);background:var(--bg)">
        <div style="font-size:11px;color:var(--ink3);margin-bottom:6px">復習進捗：残り${p.remaining}コマ / ${p.attended}コマ参加済み</div>
        <div class="blocks-row">
          ${Array.from({ length: 15 }, (_, i) => {
            if (i < p.reviewed) return '<div class="block reviewed"></div>';
            if (i < p.attended) return '<div class="block pending"></div>';
            return '<div class="block unattended"></div>';
          }).join('')}
        </div>
      </div>` : '';

    // 計画アイテム（日付グループ）
    const groups = DEMO_PLAN_GROUPS[exam.examId] || [];
    const doneTotal = groups.reduce((s, g) => s + g.doneCount, 0);
    const totalSessions = groups.reduce((s, g) => s + g.count, 0);

    const planItemsHTML = groups.map(g => {
      const allDone = g.doneCount >= g.count;
      const min = g.type === 'review'
        ? g.count * exam.reviewMinutes
        : g.count * Math.round(exam.reviewMinutes / 3);
      return `
        <div class="plan-item ${allDone ? 'plan-item-done' : ''}">
          <div class="plan-item-date">${g.date}</div>
          <div class="plan-item-label">${typeLabel[g.type]} ×${g.count}コマ（${min}分）</div>
          <button class="plan-item-btn ${allDone ? 'done' : ''}" onclick="demoAction()">
            ${allDone ? '完了✓' : '学習済み'}
          </button>
        </div>`;
    }).join('');

    return `
      <div class="plan-exam-card">
        <div class="plan-exam-header">
          <div style="flex:1;min-width:0">
            <div class="plan-exam-name">${exam.subjectName}</div>
            <div class="plan-exam-date">試験日：${exam.examDate}　復習：${exam.reviewMinutes}分/回</div>
            <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${attendedHTML}</div>
            <div style="font-size:11px;color:var(--ink3);margin-top:6px">${doneTotal}/${totalSessions}コマ完了</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;margin-left:10px">
            <button class="plan-generate-btn" onclick="demoAction()">リプラン</button>
            <button class="plan-generate-btn" style="background:var(--accent-light);color:var(--accent);border-color:transparent" onclick="demoAction()">再生成</button>
          </div>
        </div>
        ${progressHTML}
        ${planItemsHTML}
      </div>`;
  }).join('');

  return `
    <div class="demo-banner">
      <span class="demo-badge">DEMO</span>サービス体験中 — サンプルデータ（2025年8月12日時点）
    </div>
    <div class="plan-header">
      <button class="plan-back-btn" onclick="goBack('subjects')">← 戻る</button>
      <div class="plan-title">定期試験対策（デモ）</div>
    </div>
    <div style="padding:10px 20px 4px;font-size:12px;color:var(--ink3)">
      表示中：3年生 春学期の科目（9件）
    </div>
    <div class="theory-card">
      <div class="theory-title">反復学習による効率化の根拠</div>
      <div class="theory-step">ステップ1（授業）：集中度スコアで授業の集中の質を向上</div>
      <div class="theory-step">ステップ2（復習）：復習時間を約1/2に短縮しつつ定着の質を向上</div>
      <div class="theory-step">ステップ3（再復習）：復習時間を約1/3に短縮しながらさらに定着を強化</div>
    </div>
    ${examCardsHTML}
    <div style="height:100px"></div>
  `;
}

// ===== LIFF初期化 & デモアクセス記録 =====
async function initLiffAndRecord() {
  if (!DEMO_LIFF_ID) { render(); return; }
  try {
    await liff.init({ liffId: DEMO_LIFF_ID });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      const userId = profile.userId;
      // 1セッションにつき1回だけGASに記録（決済案内メッセージ3が送信される）
      if (!sessionStorage.getItem('demoAccessRecorded')) {
        sessionStorage.setItem('demoAccessRecorded', '1');
        fetch(`${GAS_URL}?action=recordDemoAccess&userId=${encodeURIComponent(userId)}`)
          .catch(() => {}); // 失敗してもデモは表示
      }
    } else {
      liff.login();
      return;
    }
  } catch (e) {
    // LIFF未設定またはLIFF外からのアクセス → そのまま表示
  }
  render();
}

initLiffAndRecord();
