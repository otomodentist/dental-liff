<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デモ体験 | 授業のオトモ</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #faf7f2;
      --border: #e0d8cc;
      --ink: #1a1208;
      --ink2: #4a3f2f;
      --ink3: #8a7a68;
      --accent: #2d5a3d;
      --accent-light: #e8f2eb;
      --danger: #8b2020;
      --warning: #7a5a10;
      --warning-light: #fef8e6;
      --demo: #1a3a6b;
      --demo-light: #e8eef8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 80px; }

    .demo-banner {
      background: var(--demo);
      color: white;
      padding: 10px 16px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .demo-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      margin-right: 6px;
      font-size: 11px;
    }

    .header {
      background: var(--accent);
      color: white;
      padding: 16px 20px 12px;
    }
    .header-label { font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }
    .header-title { font-family: 'Kaisei Tokumin', serif; font-size: 18px; font-weight: 700; }

    .profile-card {
      background: var(--surface);
      margin: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .profile-name { font-size: 16px; font-weight: 700; }
    .profile-meta { font-size: 12px; color: var(--ink3); margin-top: 2px; }
    .demo-label {
      margin-left: auto;
      background: var(--demo-light);
      color: var(--demo);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .section-label {
      padding: 8px 16px 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink3);
      letter-spacing: 0.05em;
    }

    .subject-card {
      background: var(--surface);
      margin: 0 16px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .subject-card:active { opacity: 0.7; }
    .subject-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .subject-name { font-size: 14px; font-weight: 700; flex: 1; }
    .subject-meta { font-size: 12px; color: var(--ink3); }
    .subject-score { font-size: 20px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    .session-item {
      background: var(--surface);
      margin: 0 16px 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-item:active { opacity: 0.7; }
    .session-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .session-info { flex: 1; }
    .session-title { font-size: 14px; font-weight: 700; }
    .session-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .session-score { font-size: 20px; font-weight: 700; flex-shrink: 0; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 6px;
    }
    .back-btn {
      background: none; border: none;
      font-size: 13px; color: var(--ink2);
      cursor: pointer; padding: 6px 4px;
      display: flex; align-items: center; gap: 4px;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .detail-title { font-size: 14px; font-weight: 700; }

    .chart-container { padding: 4px 16px 8px; height: 220px; position: relative; }

    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .popup-overlay.open { display: flex; }
    .popup-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .popup-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
    .popup-label { font-size: 12px; color: var(--ink3); margin-bottom: 4px; }
    .popup-value { font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .popup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .popup-stat { border-radius: 10px; padding: 10px; text-align: center; }
    .popup-stat-label { font-size: 10px; margin-bottom: 2px; }
    .popup-stat-value { font-size: 18px; font-weight: 700; }

    .cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid var(--border);
    }
    .cta-btn {
      width: 100%; padding: 15px;
      background: var(--demo);
      color: white; border: none;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
    }
    .cta-sub { font-size: 11px; opacity: 0.8; font-weight: 400; }

    .score-high { color: var(--accent); }
    .score-mid { color: var(--warning); }
    .score-low { color: var(--danger); }

    /* ===== Study Plan ===== */
    .plan-header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--accent); color: white;
    }
    .plan-back-btn {
      background: none; border: none; color: white; font-size: 14px;
      cursor: pointer; padding: 4px; font-family: 'Noto Sans JP', sans-serif;
    }
    .plan-title { font-family: 'Kaisei Tokumin', serif; font-size: 16px; font-weight: 700; }

    .plan-exam-card {
      background: var(--surface); margin: 0 16px 10px;
      border-radius: 12px; border: 1px solid var(--border); overflow: hidden;
    }
    .plan-exam-header { padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; }
    .plan-exam-name { font-size: 14px; font-weight: 700; }
    .plan-exam-date { font-size: 11px; color: var(--ink3); margin-top: 2px; }

    .plan-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-top: 1px solid var(--border);
    }
    .plan-item-done { opacity: 0.45; }
    .plan-item-date { font-size: 11px; color: var(--ink3); width: 72px; flex-shrink: 0; }
    .plan-item-label { font-size: 12px; flex: 1; }
    .plan-item-btn {
      background: var(--accent-light); border: none; border-radius: 8px;
      color: var(--accent); font-size: 11px; padding: 4px 8px;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0;
    }
    .plan-item-btn.done { background: var(--surface2); color: var(--ink3); cursor: default; }
    .plan-generate-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--ink2); font-size: 12px;
      padding: 5px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
    }


    .study-plan-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; width: 100%;
      margin-bottom: 8px; font-family: 'Noto Sans JP', sans-serif; text-align: left;
    }
    .study-plan-btn-icon { font-size: 22px; flex-shrink: 0; }
    .study-plan-btn-text { flex: 1; }
    .study-plan-btn-title { font-size: 14px; font-weight: 700; }
    .study-plan-btn-desc { font-size: 11px; color: var(--ink3); margin-top: 1px; }
    .dev-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: #f0f0f0; color: #888; flex-shrink: 0;
    }

    /* ===== ランキング ===== */
    .live-card { margin: 0 16px 12px; background: var(--surface); border: 1.5px solid var(--accent); border-radius: 12px; overflow: hidden; }
    .live-card-header { background: var(--accent); padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
    .live-badge { background: rgba(0,0,0,0.2); color: white; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }
    .live-question { font-size: 13px; font-weight: 600; color: white; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .rank-row:last-child { border-bottom: none; }
    .rank-row.me { background: var(--accent-light); }
    .rank-num { font-weight: 800; font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; color: var(--ink2); }
    .rank-num.gold { color: #c9a227; }
    .rank-num.silver { color: #7a8a96; }
    .rank-num.bronze { color: #8c5a2f; }
    .rank-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
    .rank-sub { font-size: 10px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .rank-score { font-size: 18px; font-weight: 800; flex-shrink: 0; }
    .rank-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--ink3); }
    .rank-section-header { padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }

    /* ニックネームモーダル */
    .nickname-modal { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:24px; }
    .nickname-modal.open { display:flex; }
    .nickname-modal-card { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:380px; }
    .nickname-modal-title { font-family:'Kaisei Tokumin',serif;font-size:18px;font-weight:700;margin-bottom:8px; }
    .nickname-warning { font-size:12px;color:#c0392b;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:8px;padding:8px 12px;margin-bottom:16px;line-height:1.5; }
    .nickname-input { width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:15px;font-family:inherit;margin-bottom:14px;outline:none; }
    .nickname-input:focus { border-color:var(--primary); }
    .nickname-save-btn { width:100%;background:var(--primary);border:none;border-radius:10px;color:white;font-size:15px;font-weight:700;padding:13px;cursor:pointer;margin-bottom:10px; }
    .nickname-skip-btn { width:100%;background:none;border:none;color:var(--ink3);font-size:13px;cursor:pointer;padding:4px; }
  </style>
</head>
<body>

<div id="demoNicknameModal" class="nickname-modal">
  <div class="nickname-modal-card">
    <div class="nickname-modal-title" id="nicknameModalTitle">ユーザーネームを設定</div>
    <input id="demoNicknameInput" class="nickname-input" type="text" maxlength="20" placeholder="例: ぽんすけ、タロ" />
    <div class="nickname-warning">⚠️ 他の受講者が不快に感じるような表現は使用しないでください</div>
    <div id="nicknameFirstNote" style="text-align:center;font-size:11px;color:var(--ink3);margin-top:10px;margin-bottom:2px">ユーザーネームは後から変更できます</div>
    <button class="nickname-save-btn" id="nicknameSaveBtn" onclick="saveDemoNickname()" style="margin-top:14px">登録</button>
  </div>
</div>

<div id="pointDetailPopup" class="popup-overlay">
  <div class="popup-sheet">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div style="font-family:'Kaisei Tokumin',serif;font-size:16px;font-weight:700;margin-bottom:16px">回答詳細</div>
    <div id="popupContent"></div>
  </div>
</div>

<div id="app"></div>

<div class="cta-bar">
  <button class="cta-btn" onclick="openRegister()">
    利用登録して授業で使う<br><span class="cta-sub">登録後すぐに授業内で問題を受け取れます</span>
  </button>
</div>

<script>
// ===== サンプルデータ =====
const DEMO_STUDENT = { name: 'デモユーザー', nickname: 'ぽんすけ', grade: '3年生' };

const DEMO_SUBJECTS = [
  {
    name: '口腔解剖学',

      {
        sessionNumber: 1, avgScore: 71, answerCount: 4,
        answers: [
          { minutesElapsed: 12, accuracyScore: 80, concentrationScore: 80, responseTimeSec: 42,
            questionText: '上顎第一大臼歯の歯根数を答えなさい',
            modelAnswer: '3根（近心頬側根・遠心頬側根・口蓋根）',
            answerText: '3本の根があります' },
          { minutesElapsed: 31, accuracyScore: 65, concentrationScore: 59, responseTimeSec: 82,

            answerText: '6程度' },
          { minutesElapsed: 58, accuracyScore: 90, concentrationScore: 90, responseTimeSec: 38,
            questionText: '象牙細管の内径は何μmか',

          { minutesElapsed: 79, accuracyScore: 45, concentrationScore: 34, responseTimeSec: 135,
            questionText: 'セメント質の主な機能を答えなさい',

        ]
      },
      {
        sessionNumber: 2, avgScore: 63, answerCount: 4,

          { minutesElapsed: 15, accuracyScore: 85, concentrationScore: 85, responseTimeSec: 30,

            modelAnswer: '20本',
            answerText: '20本' },
          { minutesElapsed: 34, accuracyScore: 70, concentrationScore: 65, responseTimeSec: 72,
            questionText: '永久歯の本数は（親知らず含む）',
            modelAnswer: '32本',
            answerText: '32本' },
          { minutesElapsed: 62, accuracyScore: 55, concentrationScore: 50, responseTimeSec: 65,

          { minutesElapsed: 83, accuracyScore: 35, concentrationScore: 23, responseTimeSec: 160,
            questionText: '下顎第一大臼歯の歯根数と特徴を答えなさい',
            modelAnswer: '2根（近心根・遠心根）。近心根には2根管（近心頬側・近心舌側）があることが多い',

        ]
      },
      {
        sessionNumber: 3, avgScore: 78, answerCount: 4,
        answers: [
          { minutesElapsed: 18, accuracyScore: 88, concentrationScore: 88, responseTimeSec: 28,

            modelAnswer: '約0.2mm（0.15〜0.38mm）',
            answerText: '0.2ミリくらい' },
          { minutesElapsed: 42, accuracyScore: 75, concentrationScore: 71, responseTimeSec: 63,
            questionText: '固有歯槽骨の別名を答えなさい',

          { minutesElapsed: 67, accuracyScore: 82, concentrationScore: 74, responseTimeSec: 70,

        ]
      },
      {
        sessionNumber: 4, avgScore: 83, answerCount: 4,
        answers: [
          { minutesElapsed: 11, accuracyScore: 92, concentrationScore: 92, responseTimeSec: 28,

            answerText: '歯列と歯肉' },
          { minutesElapsed: 38, accuracyScore: 78, concentrationScore: 75, responseTimeSec: 62,
            questionText: '顎下腺の開口部（ワルトン管）はどこか',

      {

            modelAnswer: '上顎第一大臼歯の近心舌側咬頭',
            answerText: '上顎第一大臼歯の近心舌側咬頭' },
        ]
      },
    ]
  },
  {
    name: '口腔生理学',
    icon: '🧠',
    sessions: [
      {
        sessionNumber: 1, avgScore: 72, answerCount: 4,
        answers: [
          { minutesElapsed: 13, accuracyScore: 80, concentrationScore: 80, responseTimeSec: 38,
            questionText: '唾液の1日の平均分泌量はおよそ何mLか',
            modelAnswer: '1,000〜1,500mL（安静時は約0.3mL/分）',
            answerText: '1000〜1500mLです' },
          { minutesElapsed: 32, accuracyScore: 65, concentrationScore: 59, responseTimeSec: 85,
            questionText: '嚥下の3段階を順に答えなさい',

            answerText: '口腔期、咽頭期、食道期' },
          { minutesElapsed: 60, accuracyScore: 75, concentrationScore: 75, responseTimeSec: 45,
            questionText: '耳下腺の分泌腺の種類を答えよ',
            modelAnswer: '純漿液腺（セロシア性）',
            answerText: '漿液腺です' },
          { minutesElapsed: 84, accuracyScore: 68, concentrationScore: 51, responseTimeSec: 120,

function formatDuration(min) {
  if (min < 60) return `${min}分`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `${h}時間` : `${h}時間${m}分`;
}

function buildDemoRankRowHTML(item) {
  const unanswered = item.concentrationScore === null;
  const numCls = rankNumClass(item.rank);
  const score = item.concentrationScore;
  const scoreColor = score >= 70 ? 'var(--accent)' : score >= 40 ? 'var(--warning)' : 'var(--danger)';
  const answerSlice = item.answerText ? item.answerText.slice(0, 40) + (item.answerText.length > 40 ? '…' : '') : '';
  return `
    <div class="rank-row${item.isMe ? ' me' : ''}${unanswered ? '' : ''}">
      <div class="rank-num ${numCls}">${unanswered ? '—' : item.rank}</div>
      <div class="rank-avatar">${item.avatar}</div>
      <div class="rank-info">
        <div class="rank-name">${item.nickname || item.displayName}${item.isMe ? ' 👤' : ''}</div>
        <div class="rank-sub">${unanswered ? '未回答' : answerSlice}</div>

      <div class="rank-score" style="color:${unanswered ? 'var(--ink3)' : scoreColor};font-size:${unanswered ? '12px' : '18px'}">${unanswered ? '未回答' : score}</div>

function scoreClass(s) {
  return s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low';
}

function geoMean(scores) {
  if (!scores.length) return 0;
  const logSum = scores.reduce((s, v) => s + Math.log(Math.max(v, 1)), 0);
  return Math.round(Math.exp(logSum / scores.length));
}

    type: 'line',

    options: {
      responsive: true,
      maintainAspectRatio: false,

function buildDemoScheduleHTML(targetDate, label, accentColor) {
  const typeLabel = { 'review': '復習', 're-review': '再復習' };
  const rows = [];
  DEMO_EXAMS.forEach(exam => {
    const groups = DEMO_PLAN_GROUPS[exam.examId] || [];
    let offset = 0;
    groups.forEach(g => {
      const start = offset + 1;
      const end   = offset + g.count;
      if (g.date === targetDate) {
        const min = g.type === 'review'
          ? g.count * exam.reviewMinutes
          : g.count * Math.round(exam.reviewMinutes / 3);
        rows.push({ subject: exam.subjectName, start, end, type: g.type, min });
      }
      offset += g.count;
    });
  });
  if (rows.length === 0) return '';
  const total = rows.reduce((s, r) => s + r.min, 0);
  const rowsHTML = rows.map(r => `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px">
      <div style="font-size:13px;font-weight:700;color:var(--ink)">${r.subject}</div>
      <div style="font-size:11px;color:var(--ink3);margin-top:3px">第${r.start}〜${r.end}回　${typeLabel[r.type]}　${formatDuration(r.min)}</div>
    </div>`).join('');
  return `
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:${accentColor};margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <span>${label}</span><span style="font-size:11px;font-weight:400;color:var(--ink3)">計 ${formatDuration(total)}</span>
    </div>
    ${rowsHTML}`;
}

function buildReviewBarChartHTML(exams, progressBlocks, onClickFn) {
  if (!exams || exams.length === 0) return '';
  const maxRemaining = Math.max(1, ...exams.map(e => {
    const p = progressBlocks[e.subjectName];
    return p ? p.remaining : 0;
  }));
  const MAX_H = 80;
  const sortedExams = [...exams].sort((a, b) => {
    const aDone = (progressBlocks[a.subjectName]?.remaining ?? 0) === 0 ? 1 : 0;
    const bDone = (progressBlocks[b.subjectName]?.remaining ?? 0) === 0 ? 1 : 0;
    return aDone - bDone;
  });
  const cols = sortedExams.map(exam => {
    const p = progressBlocks[exam.subjectName];
    const remaining = p ? p.remaining : 0;
    const total = p ? p.attended : 0;
    const barH = remaining > 0 ? Math.max(6, Math.round((remaining / maxRemaining) * MAX_H)) : 0;
    const color = remaining === 0 ? '#22c55e' : remaining >= total ? '#f87171' : '#f59e0b';
    const label = exam.subjectName.replace(/[（(][^）)]+[）)]/g, '').slice(0, 6);
    const clickAttr = onClickFn ? `onclick="${onClickFn}('${exam.examId}')" style="cursor:pointer;-webkit-tap-highlight-color:transparent"` : '';
    return `<div ${clickAttr} style="width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center">
        <div style="height:${MAX_H}px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;width:100%">
          ${barH > 0
            ? `<div style="font-size:9px;font-weight:700;color:var(--ink2);margin-bottom:2px">${remaining}</div>
               <div style="width:34px;height:${barH}px;background:${color};border-radius:4px 4px 0 0"></div>`
            : `<div style="font-size:11px;color:#22c55e;margin-bottom:4px">✓</div>
               <div style="width:34px;height:3px;background:#22c55e;border-radius:4px 4px 0 0;opacity:0.4"></div>`
          }
        </div>
        <div style="width:52px;height:1px;background:var(--border)"></div>
        <div style="margin-top:5px;font-size:9px;color:var(--ink3);text-align:center;line-height:1.4;word-break:break-all">${label}</div>
        <div style="font-size:10px;font-weight:600;color:var(--ink2);margin-top:2px">${remaining}/${total}</div>
      </div>`;
  }).join('');
  return `<div style="margin:8px 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 14px 12px;overflow:hidden">
      <div style="font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:12px;letter-spacing:0.5px">復習残コマ数</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px">
        <div style="display:flex;gap:6px;min-width:max-content">
          ${cols}
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--ink3)">
        <span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:3px;vertical-align:middle"></span>完了</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#f59e0b;border-radius:2px;margin-right:3px;vertical-align:middle"></span>途中</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#f87171;border-radius:2px;margin-right:3px;vertical-align:middle"></span>未着手</span>
      </div>
    </div>`;
}

function addOneHour(t) {
  const [h, m] = t.split(':').map(Number);
  return `${String(h + 1).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function buildExamTimetableHTML(exams) {
  if (!exams || exams.length === 0) return '';
  const sortedDates = [...new Set(exams.map(e => e.examDate))].sort();
  const cellMap = {};
  exams.forEach(e => { cellMap[`${e.examDate}_${e.startTime || ''}`] = e; });
  const startTimes = [...new Set(exams.map(e => e.startTime || '').filter(Boolean))].sort();
  if (startTimes.length === 0) return '';
  const DAYS = ['日','月','火','水','木','金','土'];
  function fmtD(d) {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getMonth()+1}/${dt.getDate()}（${DAYS[dt.getDay()]}）`;
  }
  const STRONG = '2px solid var(--border)';
  const hBg = 'var(--surface2)';
  const dateHeaders = sortedDates.map(d =>
    `<th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;white-space:nowrap;font-weight:600;color:var(--ink2)">${fmtD(d)}</th>`
  ).join('');
  const bodyRows = startTimes.map(st => {
    const cells = sortedDates.map(d => {
      const e = cellMap[`${d}_${st}`];
      if (!e) return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px"></td>`;
      return `<td style="border:1px solid var(--border);padding:6px 8px;min-width:80px;background:var(--surface)">
        <div style="font-size:10px;font-weight:600;line-height:1.4;color:var(--ink)">${e.subjectName}</div>
      </td>`;
    }).join('');
    return `<tr>
      <td style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;font-weight:700;border-right:${STRONG};white-space:nowrap;color:var(--ink2)">${st}〜${addOneHour(st)}</td>
      ${cells}
    </tr>`;
  }).join('');
  return `
    <div style="margin:0 16px 16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--ink3);margin-bottom:6px">試験時間割</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="border:1px solid var(--border);padding:6px 8px;background:${hBg};font-size:11px;color:var(--ink3);border-right:${STRONG};border-bottom:${STRONG};white-space:nowrap">時刻</th>
            ${dateHeaders}
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildStudyPlanHTML() {
  return `
    <div class="demo-banner">
      <span class="demo-badge">DEMO</span>サービス体験中 — サンプルデータ（2025年8月12日時点）
    </div>
    <div class="plan-header">
      <button class="plan-back-btn" onclick="goBack('subjects')">← 戻る</button>
      <div class="plan-title">定期試験対策（デモ）</div>
    </div>
    <div style="padding:10px 20px 4px;font-size:12px;color:var(--ink3)">
      表示中：3年生 春学期の科目（9件）　授業最終日：${DEMO_LAST_CLASS_DATE}
    </div>
    ${buildReviewBarChartHTML(DEMO_EXAMS, DEMO_PROGRESS_BLOCKS, 'openDemoExamDetail')}
    <div style="margin:0 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px">
      ${buildDemoScheduleHTML('8/12 (火)', '今日 8/12', '#2d5a3d')}
      ${buildDemoScheduleHTML('8/13 (水)', '明日 8/13', '#1a3a6b')}
    </div>
    ${buildExamTimetableHTML(DEMO_EXAMS)}
    <div style="height:100px"></div>
  `;
}

function openRegister() {
  const url = STRIPE_PAYMENT_LINK + (demoUserId ? '?client_reference_id=' + encodeURIComponent(demoUserId) : '');
  if (typeof liff !== 'undefined' && liff.isInClient()) {
    liff.openWindow({ url, external: true });
  } else {
    window.open(url, '_blank');
  }
}

// ===== LIFF初期化 & デモアクセス記録 =====
async function initLiffAndRecord() {
  if (!DEMO_LIFF_ID) { render(); return; }
  try {
    await liff.init({ liffId: DEMO_LIFF_ID });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      demoUserId = profile.userId;
      const userId = demoUserId;
      // 1セッションにつき1回だけGASに記録（決済案内メッセージ3が送信される）
      if (!sessionStorage.getItem('demoAccessRecorded')) {
        sessionStorage.setItem('demoAccessRecorded', '1');
        fetch(`${GAS_URL}?action=recordDemoAccess&userId=${encodeURIComponent(userId)}`)
          .catch(() => {}); // 失敗してもデモは表示
      }
    } else {
      liff.login();
      return;
    }
  } catch (e) {
    // LIFF未設定またはLIFF外からのアクセス → そのまま表示
  }
  render();
}

initLiffAndRecord();
</script>
</body>
</html>
